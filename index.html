  // ── Monthly table ──
  const th=(t,extra='')=>`<th style="position:sticky;top:0;background:var(--surface);z-index:2;padding:9px 10px;font-size:11px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);${extra}">${t}</th>`;
  let head=th('Month','text-align:left');
  inc.forEach(c=>head+=th(`<span style="color:${c.color}">${c.label}</span>`));
  head+=th('Income','border-left:1px solid var(--border)');

  let body='';
  cf.months.forEach(m=>{

    cells.push(`<td style="padding:8px 10px;font-weight:700;color:${m.net>=0?'var(--success)':'var(--danger)'}">${(m.net>=0?'+':'−')+D(Math.abs(m.net))}</td>`);
    cells.push(`<td style="padding:8px 10px;color:${m.running>=0?'var(--text)':'var(--danger)'}">${(m.running>=0?'':'−')+D(Math.abs(m.running))}</td>`);

    </div>
    <div style="padding:10px 14px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border)">Recurring income &amp; expenses are spread evenly across the year; one-time goal events land in their chosen month. This is a view of the annual model — it never changes the projection totals.</div>
  </div>`;

  html+=`</div>`;
  page.innerHTML=html;
  requestAnimationFrame(()=>{const c=document.getElementById('cf-chart');if(c)drawCashFlowChart(c,cf);});
  }catch(err){_showModelError(err);}
}

// Pure-SVG monthly net cash-flow chart (bars) + running-balance line. Theme-aware via CSS vars.
function drawCashFlowChart(container,cf){
  container.innerHTML='';
  const NS='http://www.w3.org/2000/svg';
  const W=container.offsetWidth||760,H=container.offsetHeight||230;
  const PADL=44,PADR=44,PADT=18,PADB=26;
  const cW=Math.max(10,W-PADL-PADR),cH=Math.max(10,H-PADT-PADB);
  const yft=cf.yearsFromToday;
  const netA=cf.months.map(m=>adjV(m.net,yft));
  const runA=cf.months.map(m=>adjV(m.running,yft));
  const maxAbs=Math.max(1,...netA.map(v=>Math.abs(v)));
  const zeroY=PADT+cH/2;
  const barY=v=>zeroY-(v/maxAbs)*(cH/2);
  const rmin=Math.min(0,...runA),rmax=Math.max(0,...runA),rSpan=Math.max(1,rmax-rmin);
  const runY=v=>PADT+cH-((v-rmin)/rSpan)*cH;
  const step=cW/12,barW=step*0.56;
  const el=(tag,attrs={})=>{const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;};
  const txt=(c,x,y,o={})=>{const t=el('text',{x,y,'font-size':o.size||10,'text-anchor':o.anchor||'middle',fill:o.fill||'var(--text-muted)'});if(o.weight)t.setAttribute('font-weight',o.weight);t.textContent=c;return t;};
  const svg=el('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});svg.style.display='block';svg.style.width='100%';
  // Zero baseline
  svg.appendChild(el('line',{x1:PADL,y1:zeroY,x2:PADL+cW,y2:zeroY,stroke:'var(--border)','stroke-width':'1'}));
  // Bars + month labels
  cf.months.forEach((m,i)=>{
    const cx=PADL+step*i+step/2;
    const v=netA[i],y=barY(v),h=Math.abs(zeroY-y);
    const pos=v>=0;
    svg.appendChild(el('rect',{x:cx-barW/2,y:pos?y:zeroY,width:barW,height:Math.max(0.5,h),rx:3,fill:pos?'var(--success)':'var(--danger)',opacity:'.85'}));
    svg.appendChild(txt(m.label,cx,H-8,{size:9}));
  });
  // Running-balance line
  let d='';
  cf.months.forEach((m,i)=>{const cx=PADL+step*i+step/2,y=runY(runA[i]);d+=(i?'L':'M')+cx+' '+y+' ';});
  svg.appendChild(el('path',{d:d.trim(),fill:'none',stroke:'var(--accent,#4a9eff)','stroke-width':'2','stroke-linejoin':'round'}));
  cf.months.forEach((m,i)=>{const cx=PADL+step*i+step/2,y=runY(runA[i]);svg.appendChild(el('circle',{cx,cy:y,r:2.5,fill:'var(--accent,#4a9eff)'}));});
  // Y labels (net scale left, running scale right endpoints)
  svg.appendChild(txt(fmtK(maxAbs),PADL-6,PADT+4,{anchor:'end',size:9}));
  svg.appendChild(txt(fmtK(-maxAbs),PADL-6,PADT+cH+2,{anchor:'end',size:9,fill:'var(--danger)'}));
  svg.appendChild(txt('0',PADL-6,zeroY+3,{anchor:'end',size:9}));
  svg.appendChild(txt(fmtK(rmax),PADL+cW+6,runY(rmax)+3,{anchor:'start',size:9,fill:'var(--accent,#4a9eff)'}));
  container.appendChild(svg);
}

/* ================================================================
   RENDER: INVESTMENT ANALYTICS TAB (Phase 10 — RIQ.Analytics)
   KPI cards + pure-SVG charts (allocation donut, glide-path stacked area,
   tax-treatment bars) derived from the deterministic model. Dollar figures
   respect the Today's/Future $ toggle; all colors use theme CSS vars.

function renderAnalytics(){
  const page=document.getElementById('page-analytics');
  try{
  if(!_model||!_model.rows||!_model.rows.length){page.innerHTML='<div style="padding:48px;color:var(--text-muted)">No model data yet.</div>';return;}
  const A=RIQ.Analytics.compute(_model);
  const alloc=A.currentAlloc,br=A.blendedReturn,vol=A.volatility,sh=A.sharpe,fee=A.feeDrag,seq=A.sequence,dv=A.diversification;
  const BM=RIQ.Analytics.BUCKET_META,AM=RIQ.Analytics.ASSET_META;
  const stillAccum=A.accYrs>0;
  const headReturn=stillAccum?br.accum:br.retire;
  const headVol=stillAccum?vol.accum:vol.retire;
  const headSharpe=stillAccum?sh.accum:sh.retire;
  const phaseLbl=stillAccum?'accumulation':'retirement';
  const feeYft=fee.yearsToEnd||_model.rows.length;
  const D=(v,y)=>displayMoney(v,y);
  const pct=(v)=>(v>=0?'':'−')+Math.abs(v).toFixed(1)+'%';

  const kpi=(label,val,color,sub,tip)=>`<div style="flex:1;min-width:160px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px"${tip?` data-tip="${escHtml(tip)}"`:''}>

    ${sub?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px">${sub}</div>`:''}
  </div>`;

  const sharpeColor=headSharpe>=0.5?'var(--success)':headSharpe>=0.25?'var(--warning)':'var(--danger)';
  const feeColor=fee.deltaEstate>0?'var(--danger)':'var(--text-faint)';

  let html=`<div style="padding:24px 32px 48px">
  <div class="proj-header-row">
    <div>
      <div class="proj-title">Investment Analytics</div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:3px">Portfolio-level metrics derived from your glide path &amp; model · headline figures reflect the <strong>${phaseLbl}</strong> phase · ${state.moneyMode==='today'?`today's $ (${cy()} purchasing power)`:'future (nominal) $'}</div>
    </div>
    <div class="money-toggle">
      <button class="mt-opt${state.moneyMode==='today'?' active':''}" onclick="setMoneyMode('today');renderAnalytics()">Today's $</button>
      <button class="mt-opt${state.moneyMode==='future'?' active':''}" onclick="setMoneyMode('future');renderAnalytics()">Future $</button>
    </div>
  </div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px">
    ${kpi('Blended Return',headReturn.toFixed(2)+'%',(headReturn>=0?'var(--success)':'var(--danger)'),`${phaseLbl} · ~${(stillAccum?br.eqWAccum:br.eqWRetire).toFixed(0)}% equity`,'Allocation-weighted expected return = the glide-path blend of equity, bond ('+(+state.bondRate||4).toFixed(1)+'%) and cash (2%) returns, averaged over the phase — the same blend the engine grows balances with.')}
    ${kpi('Volatility (σ)',headVol.toFixed(1)+'%','var(--purple)',`equity σ ${(stillAccum?vol.eqVolAccum:vol.eqVolRetire).toFixed(0)}% × equity weight`,'Estimated annual standard deviation = average equity weight × the equity-sleeve volatility used by the Monte Carlo engine ('+vol.eqVolAccum.toFixed(0)+'% accumulation / '+vol.eqVolRetire.toFixed(0)+'% retirement). Bonds & cash are treated as ~0 volatility, consistent with the stochastic model.')}
    ${kpi('Sharpe Ratio',headSharpe.toFixed(2),sharpeColor,`vs ${sh.riskFree.toFixed(1)}% risk-free`,'Risk-adjusted return = (blended return − risk-free rate) ÷ volatility. Higher is better; ≈0.5+ is solid for an equity-heavy plan. Risk-free rate is an editable assumption below.')}
    ${kpi('Fee Drag',fee.deltaEstate>0?'−'+D(fee.deltaEstate,feeYft):'—',feeColor,fee.feePct>0?`${fee.feePct.toFixed(2)}% ER · ${pct(-fee.deltaPct)} of estate`:'0% expense ratio','Lifetime dollar impact of your weighted expense ratio on the ENDING estate, from an isolated model run with returns reduced by the fee. Analytics-only — it never changes your headline projection.')}
    ${kpi('Equity Now',alloc.equityPct.toFixed(0)+'%','var(--accent)',`age ${alloc.age} · ${alloc.bondPct}% bond / ${alloc.cashPct}% cash`,'Current asset-class allocation read directly from the glide path at your current age.')}
  </div>
  <div style="font-size:11px;color:var(--text-faint);margin:2px 0 18px">Return, volatility &amp; Sharpe are forward-looking assumptions from your growth &amp; glide-path settings — not realized performance. Fees affect only this analytics comparison, never the headline estate.</div>

  <!-- Assumptions -->
  <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:20px">
    <div>
      <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Weighted Expense Ratio</div>
      <div class="input-wrap" style="width:120px"><input type="number" min="0" max="5" step="0.01" data-key="feeExpenseRatio" data-numeric="1" value="${state.feeExpenseRatio}"><span class="input-suffix">%</span></div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Risk-Free Rate</div>
      <div class="input-wrap" style="width:120px"><input type="number" min="0" max="10" step="0.1" data-key="riskFreeRate" data-numeric="1" value="${state.riskFreeRate}"><span class="input-suffix">%</span></div>
    </div>
    <div style="flex:1;min-width:220px;font-size:11.5px;color:var(--text-muted);line-height:1.5">
      Expense ratio drives the fee-drag comparison only. Risk-free rate anchors the Sharpe ratio (a sensible default is the current ~4% T-bill / cash yield).
    </div>
  </div>

  <!-- Allocation charts -->
  <div style="display:grid;grid-template-columns:minmax(260px,1fr) minmax(260px,1.4fr);gap:16px;margin-bottom:16px" class="an-grid2">
    <div class="chart-wrap">
      <div class="chart-header"><div><div class="chart-title">Current Asset Allocation</div><div class="chart-sub">Glide path at age ${alloc.age}</div></div></div>
      <div id="an-donut" class="chart-container" style="height:230px;position:relative"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-header"><div><div class="chart-title">Allocation Glide Path</div><div class="chart-sub">Equity → bond/cash shift by age (stacked % of portfolio)</div></div></div>
      <div id="an-glide" class="chart-container" style="height:230px;position:relative"></div>
    </div>
  </div>

  <!-- Phase comparison + tax treatment -->
  <div style="display:grid;grid-template-columns:minmax(260px,1fr) minmax(260px,1.4fr);gap:16px;margin-bottom:16px" class="an-grid2">
    <div class="chart-wrap" style="padding:16px 18px">
      <div class="chart-title" style="margin-bottom:12px">Accumulation vs Retirement</div>
      <table style="width:100%;border-collapse:collapse;font-size:12.5px">
        <thead><tr>
          <th style="text-align:left;padding:6px 8px;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border)">Metric</th>
          <th style="text-align:right;padding:6px 8px;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border)">Accumulation</th>
          <th style="text-align:right;padding:6px 8px;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border)">Retirement</th>
        </tr></thead>
        <tbody>
          ${_anRow('Blended return',br.accum.toFixed(2)+'%',br.retire.toFixed(2)+'%')}
          ${_anRow('Avg equity weight',br.eqWAccum.toFixed(0)+'%',br.eqWRetire.toFixed(0)+'%')}
          ${_anRow('Volatility (σ)',vol.accum.toFixed(1)+'%',vol.retire.toFixed(1)+'%')}
          ${_anRow('Sharpe ratio',sh.accum.toFixed(2),sh.retire.toFixed(2))}
        </tbody>
      </table>
      <div style="font-size:11px;color:var(--text-faint);margin-top:10px">Retirement carries a lower equity weight and lower assumed volatility as the glide path de-risks — trading growth for stability of income.</div>
    </div>
    <div class="chart-wrap">
      <div class="chart-header"><div><div class="chart-title">Diversification by Tax Treatment</div><div class="chart-sub">Taxable vs tax-deferred vs tax-free — today &amp; at retirement</div></div></div>
      <div id="an-tax" class="chart-container" style="height:230px;position:relative"></div>
    </div>
  </div>`;

  // ── Fee drag + Sequence-of-returns detail cards ──
  const feeDetail=fee.feePct>0
    ? `Over ${feeYft} years, a <strong>${fee.feePct.toFixed(2)}%</strong> weighted expense ratio reduces your ending estate from <strong>${D(fee.baseEstate,feeYft)}</strong> to <strong>${D(fee.feeEstate,feeYft)}</strong> — a drag of <strong style="color:var(--danger)">${D(fee.deltaEstate,feeYft)}</strong> (${pct(-fee.deltaPct)}). Because your plan is floor/legacy-constrained, much of the fee also surfaces as reduced spending capacity along the way.`
    : `Your expense ratio is set to <strong>0%</strong>, so there is no modeled fee drag. Enter your blended fund/advisor fee above to see the lifetime cost.`;
  const seqCard=seq
    ? `<div style="display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;margin-bottom:8px">
         <span style="font-size:26px;font-weight:800;color:${seq.level==='high'?'var(--danger)':seq.level==='moderate'?'var(--warning)':'var(--success)'}">${seq.vuln.toFixed(0)}%</span>
         <span style="font-size:12px;color:var(--text-muted)">estate lost to a −${seq.drop}% crash at retirement (age ${seq.retAge})</span>
       </div>
       <div style="font-size:12.5px;color:var(--text);line-height:1.55">The same crash arriving <strong>${seq.retAge-seq.preAge} years earlier</strong> (age ${seq.preAge}) costs <strong>${D(seq.sorCost,seq.yearsToEnd)}</strong> less to your final estate — that gap is your sequence-of-returns exposure. Early-retirement losses are the most damaging because withdrawals lock them in before markets recover.</div>
       <div style="font-size:11px;color:var(--text-faint);margin-top:8px">Probes reuse the model's crash engine via isolated runs (no live state changed). Explore full stochastic outcomes on the Monte&nbsp;Carlo tab.</div>`
    : `<div style="font-size:12.5px;color:var(--text-muted)">Sequence-of-returns exposure needs at least one retirement year to evaluate.</div>`;

  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px" class="an-grid2">
    <div class="chart-wrap" style="padding:16px 18px">
      <div class="chart-title" style="margin-bottom:8px">Fee Drag Analysis</div>
      <div style="font-size:12.5px;color:var(--text);line-height:1.55">${feeDetail}</div>
    </div>
    <div class="chart-wrap" style="padding:16px 18px">
      <div class="chart-title" style="margin-bottom:8px">Sequence-of-Returns Exposure</div>
      ${seqCard}
    </div>
  </div>`;

  // ── Concentration flag + by-account table ──
  if(dv.flag){
    const fc=dv.flag.level==='high'?'var(--danger)':'var(--warning)';
    html+=`<div style="display:flex;gap:10px;align-items:flex-start;background:var(--surface2);border:1px solid ${fc};border-left:3px solid ${fc};border-radius:10px;padding:12px 16px;margin-bottom:16px">
      <span style="font-size:16px">⚠</span><div style="font-size:12.5px;color:var(--text);line-height:1.5"><strong style="color:${fc}">Concentration flag —</strong> ${dv.flag.text}</div></div>`;
  } else {
    html+=`<div style="display:flex;gap:10px;align-items:flex-start;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px">
      <span style="font-size:16px">✓</span><div style="font-size:12.5px;color:var(--text);line-height:1.5"><strong style="color:var(--success)">Well diversified —</strong> no single account exceeds 60% of today's portfolio (effective holdings ≈ ${dv.effN.toFixed(1)}).</div></div>`;
  }

  // By-account table (current balances, tax bucket, share)
  const accRowsHtml=dv.cur.slice().sort((a,b)=>b.bal-a.bal).map(a=>{
    const share=dv.curTotal>0?a.bal/dv.curTotal*100:0;
    const b=BM[a.bucket];
    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="text-align:left;padding:8px 10px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${a.color||b.color};margin-right:7px"></span>${escHtml(a.name)}</td>
      <td style="text-align:left;padding:8px 10px"><span style="color:${b.color};font-weight:600">${b.label}</span></td>
      <td style="padding:8px 10px">${D(a.bal,0)}</td>
      <td style="padding:8px 10px">${share.toFixed(1)}%</td>
      <td style="padding:8px 10px">${D(dv.ret.find(x=>x.id===a.id)?dv.ret.find(x=>x.id===a.id).bal:0,A.accYrs)}</td>
    </tr>`;
  }).join('');

  html+=`<div class="chart-wrap" style="padding:0;overflow:hidden">
    <div class="chart-header" style="padding:14px 18px 0"><div><div class="chart-title">Holdings by Account &amp; Tax Treatment</div><div class="chart-sub">Concentration and tax diversification across your accounts</div></div></div>
    <div style="overflow:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12.5px;text-align:center;margin-top:8px">
        <thead><tr>
          <th style="text-align:left;padding:9px 10px;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border)">Account</th>
          <th style="text-align:left;padding:9px 10px;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border)">Tax Treatment</th>
          <th style="padding:9px 10px;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border)">Balance Today</th>
          <th style="padding:9px 10px;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border)">% of Portfolio</th>
          <th style="padding:9px 10px;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border)">At Retirement</th>
        </tr></thead>
        <tbody>${accRowsHtml}</tbody>
      </table>
    </div>
    <div style="padding:10px 14px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border)">Tax-free = Roth &amp; HSA · Tax-deferred = 401(k) &amp; Traditional IRA · Taxable = brokerage &amp; other. A healthy mix across buckets gives you flexibility to manage taxes and RMDs in retirement.</div>
  </div>`;

  html+=`</div>`;
  page.innerHTML=html;
  requestAnimationFrame(()=>{
    const d=document.getElementById('an-donut');if(d)drawAllocDonut(d,alloc);
    const g=document.getElementById('an-glide');if(g)drawGlideArea(g,A.glide,A.retYrs>0?(+state.retireAge||0):0);
    const t=document.getElementById('an-tax');if(t)drawTaxTreatmentBars(t,dv);
  });
  }catch(err){_showModelError(err);}
}
function _anRow(label,a,b){return`<tr>
  <td style="text-align:left;padding:6px 8px;color:var(--text-muted)">${label}</td>
  <td style="text-align:right;padding:6px 8px;font-weight:600">${a}</td>
  <td style="text-align:right;padding:6px 8px;font-weight:600">${b}</td>
</tr>`;}

// ── Pure-SVG donut: equity / bond / cash. Center shows equity %. ──
function drawAllocDonut(container,alloc){
  container.innerHTML='';
  const NS='http://www.w3.org/2000/svg';
  const AM=RIQ.Analytics.ASSET_META;
  const W=container.offsetWidth||300,H=container.offsetHeight||230;
  const cx=W/2,cy=H/2,R=Math.min(W,H)/2-14,r=R*0.58;
  const el=(tag,attrs={})=>{const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;};
  const svg=el('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});svg.style.display='block';svg.style.width='100%';
  const segs=[{k:'equity',v:alloc.equityPct},{k:'bond',v:alloc.bondPct},{k:'cash',v:alloc.cashPct}].filter(s=>s.v>0);
  const total=segs.reduce((s,x)=>s+x.v,0)||100;
  // Single-segment (e.g. glide path off → 100% equity): a full-circle arc path is degenerate,
  // so render the annulus as two concentric circles instead.
  if(segs.length===1){
    svg.appendChild(el('circle',{cx,cy,r:R,fill:AM[segs[0].k].color,opacity:'.9'}));
    svg.appendChild(el('circle',{cx,cy,r,fill:'var(--surface)'}));
  }
  let ang=-Math.PI/2;
  const arc=(a0,a1)=>{
    const large=(a1-a0)>Math.PI?1:0;
    const x0=cx+R*Math.cos(a0),y0=cy+R*Math.sin(a0),x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
    const xi1=cx+r*Math.cos(a1),yi1=cy+r*Math.sin(a1),xi0=cx+r*Math.cos(a0),yi0=cy+r*Math.sin(a0);
    return`M ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1} L ${xi1} ${yi1} A ${r} ${r} 0 ${large} 0 ${xi0} ${yi0} Z`;
  };
  if(segs.length>1)segs.forEach(s=>{
    const a1=ang+(s.v/total)*Math.PI*2;
    svg.appendChild(el('path',{d:arc(ang,a1),fill:AM[s.k].color,opacity:'.9',stroke:'var(--surface)','stroke-width':'1.5'}));
    ang=a1;
  });
  const ctr=el('text',{x:cx,y:cy-2,'text-anchor':'middle','font-size':'26','font-weight':'800',fill:'var(--accent)'});ctr.textContent=alloc.equityPct.toFixed(0)+'%';
  const sub=el('text',{x:cx,y:cy+16,'text-anchor':'middle','font-size':'11',fill:'var(--text-muted)'});sub.textContent='equity';
  svg.appendChild(ctr);svg.appendChild(sub);
  container.appendChild(svg);
  // legend
  const lg=document.createElement('div');lg.style.cssText='position:absolute;bottom:6px;left:0;right:0;display:flex;justify-content:center;gap:14px;flex-wrap:wrap;font-size:11px';
  [{k:'equity',v:alloc.equityPct},{k:'bond',v:alloc.bondPct},{k:'cash',v:alloc.cashPct}].forEach(s=>{
    lg.innerHTML+=`<span style="color:var(--text-muted)"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${AM[s.k].color};margin-right:5px"></span>${AM[s.k].label} ${s.v}%</span>`;
  });
  container.appendChild(lg);
}

// ── Pure-SVG stacked-area glide path: equity (bottom) → bond → cash by age. ──
function drawGlideArea(container,series,retireAge){
  container.innerHTML='';
  if(!series||!series.length){container.innerHTML='<div style="padding:24px;color:var(--text-muted);font-size:12px">No glide data.</div>';return;}
  const NS='http://www.w3.org/2000/svg';
  const AM=RIQ.Analytics.ASSET_META;
  const W=container.offsetWidth||440,H=container.offsetHeight||230;
  const PADL=34,PADR=12,PADT=14,PADB=42;
  const cW=Math.max(10,W-PADL-PADR),cH=Math.max(10,H-PADT-PADB);
  const el=(tag,attrs={})=>{const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;};
  const txt=(c,x,y,o={})=>{const t=el('text',{x,y,'font-size':o.size||10,'text-anchor':o.anchor||'middle',fill:o.fill||'var(--text-muted)'});if(o.weight)t.setAttribute('font-weight',o.weight);t.textContent=c;return t;};
  const svg=el('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});svg.style.display='block';svg.style.width='100%';
  const n=series.length;
  const ageMin=series[0].age,ageMax=series[n-1].age,ageSpan=Math.max(1,ageMax-ageMin);
  const X=age=>PADL+((age-ageMin)/ageSpan)*cW;
  const Y=p=>PADT+cH-(p/100)*cH; // p is cumulative % (0..100)
  // Build cumulative bands: equity 0..eq ; bond eq..eq+bond ; cash ..100
  const layers=[{k:'equity',lo:s=>0,hi:s=>s.equityPct},
                {k:'bond',lo:s=>s.equityPct,hi:s=>s.equityPct+s.bondPct},
                {k:'cash',lo:s=>s.equityPct+s.bondPct,hi:s=>100}];
  layers.forEach(L=>{
    let d='M '+X(series[0].age)+' '+Y(L.lo(series[0]));
    for(let i=0;i<n;i++)d+=' L '+X(series[i].age)+' '+Y(L.hi(series[i]));
    for(let i=n-1;i>=0;i--)d+=' L '+X(series[i].age)+' '+Y(L.lo(series[i]));
    d+=' Z';
    svg.appendChild(el('path',{d,fill:AM[L.k].color,opacity:'.82'}));
  });
  // gridlines 0/50/100%
  [0,50,100].forEach(p=>{
    svg.appendChild(el('line',{x1:PADL,y1:Y(p),x2:PADL+cW,y2:Y(p),stroke:'var(--border)','stroke-width':'0.5',opacity:'.5'}));
    svg.appendChild(txt(p+'%',PADL-5,Y(p)+3,{anchor:'end',size:9}));
  });
  // retirement marker
  if(retireAge&&retireAge>=ageMin&&retireAge<=ageMax){
    const rx=X(retireAge);
    svg.appendChild(el('line',{x1:rx,y1:PADT,x2:rx,y2:PADT+cH,stroke:'var(--text)','stroke-width':'1','stroke-dasharray':'4 3',opacity:'.5'}));
    svg.appendChild(txt('Retire '+retireAge,rx,PADT+9,{size:9,fill:'var(--text-muted)'}));
  }
  // x axis age labels (~6 ticks)
  const ticks=6;
  for(let i=0;i<=ticks;i++){const age=Math.round(ageMin+ageSpan*i/ticks);svg.appendChild(txt(String(age),X(age),H-24,{size:9}));}
  container.appendChild(svg);
  // legend
  const lg=document.createElement('div');lg.style.cssText='position:absolute;bottom:4px;left:0;right:0;display:flex;justify-content:center;gap:16px;font-size:11px';
  ['equity','bond','cash'].forEach(k=>{lg.innerHTML+=`<span style="color:var(--text-muted)"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${AM[k].color};margin-right:5px"></span>${AM[k].label}</span>`;});
  container.appendChild(lg);
}

// ── Pure-SVG stacked horizontal bars: tax-treatment split, today vs at-retirement. ──
function drawTaxTreatmentBars(container,dv){
  container.innerHTML='';
  const NS='http://www.w3.org/2000/svg';
  const BM=RIQ.Analytics.BUCKET_META;
  const W=container.offsetWidth||440,H=container.offsetHeight||230;
  const el=(tag,attrs={})=>{const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;};
  const txt=(c,x,y,o={})=>{const t=el('text',{x,y,'font-size':o.size||10,'text-anchor':o.anchor||'start',fill:o.fill||'var(--text-muted)'});if(o.weight)t.setAttribute('font-weight',o.weight);t.textContent=c;return t;};
  const svg=el('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});svg.style.display='block';svg.style.width='100%';
  const PADL=90,PADR=14,barH=34,gap=30;
  const cW=Math.max(10,W-PADL-PADR);
  const order=['taxable','deferred','free'];
  const bars=[{label:'Today',buckets:dv.curBuckets,total:dv.curTotal},{label:'At Retirement',buckets:dv.retBuckets,total:dv.retTotal}];
  let y=26;
  bars.forEach(bar=>{
    svg.appendChild(txt(bar.label,10,y+barH/2+4,{size:11,fill:'var(--text)',weight:'600'}));
    let x=PADL;const total=bar.total||1;
    order.forEach(k=>{
      const v=bar.buckets[k]||0;const w=total>0?(v/total)*cW:0;
      if(w>0.5){
        svg.appendChild(el('rect',{x,y,width:Math.max(0.5,w),height:barH,fill:BM[k].color,opacity:'.88'}));
        if(w>34){const p=(v/total*100);svg.appendChild(txt(p>=8?p.toFixed(0)+'%':'',x+w/2,y+barH/2+4,{anchor:'middle',size:10,fill:'#0d1117',weight:'700'}));}
        x+=w;
      }
    });
    if(!bar.total){svg.appendChild(el('rect',{x:PADL,y,width:cW,height:barH,fill:'var(--surface3)'}));svg.appendChild(txt('—',PADL+cW/2,y+barH/2+4,{anchor:'middle',fill:'var(--text-faint)'}));}
    y+=barH+gap;
  });
  container.appendChild(svg);
  // legend
  const lg=document.createElement('div');lg.style.cssText='position:absolute;bottom:6px;left:0;right:0;display:flex;justify-content:center;gap:14px;flex-wrap:wrap;font-size:11px';
  order.forEach(k=>{lg.innerHTML+=`<span style="color:var(--text-muted)"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${BM[k].color};margin-right:5px"></span>${BM[k].label}</span>`;});
  container.appendChild(lg);
}

/* ================================================================
   RENDER: SCENARIOS TAB (Feature 5 — RIQ.Scenarios)
   Save / load / rename / delete named plan snapshots and compare 2+ side by
   side (deterministic metrics + optional Monte Carlo + net-worth overlay).
   ================================================================ */
let _scenSel=null;              // Set<id> selected for comparison (session-only)
let _scenIncludeLive=true;      // include the current live plan in the comparison
let _scenMCRunning=false,_scenMCCtrl=null,_scenMCProgress='';
const SCEN_COLORS=['#00bfb3','#a882ff','#f59e0b','#4a9eff','#22c55e','#ef4444','#e879f9','#f97316','#38bdf8'];

function scenSaveCurrent(){
  const name=prompt('Name this scenario:', 'Plan '+((RIQ.Scenarios.list().length)+1));
  if(name===null)return;
  const s=RIQ.Scenarios.save(name);
  if(_scenSel)_scenSel.add(s.id);
  saveState();renderScenarios();
  showToast('Saved scenario: '+s.name);
}
function scenLoad(id){
  const s=RIQ.Scenarios.find(id);if(!s)return;
  if(!confirm('Load "'+s.name+'"? This overwrites your current plan inputs. (Your saved scenarios are kept.)'))return;
  RIQ.Scenarios.load(id);
  saveState();
  _renderedTabs.delete('configure');
  RIQ.Report.invalidate&&RIQ.Report.invalidate();
  recalcNow(); // rebuilds model + re-renders the active (Scenarios) tab; also invalidates recs
  showToast('Loaded scenario: '+s.name);
}
function scenRename(id){
  const s=RIQ.Scenarios.find(id);if(!s)return;
  const name=prompt('Rename scenario:', s.name);
  if(name===null)return;
  RIQ.Scenarios.rename(id,name);saveState();renderScenarios();
}
function scenDelete(id){
  const s=RIQ.Scenarios.find(id);if(!s)return;
  if(!confirm('Delete "'+s.name+'"? This cannot be undone.'))return;
  RIQ.Scenarios.remove(id);if(_scenSel)_scenSel.delete(id);
  saveState();renderScenarios();showToast('Deleted scenario');
}
function scenToggleSel(id){if(!_scenSel)_scenSel=new Set();if(_scenSel.has(id))_scenSel.delete(id);else _scenSel.add(id);renderScenarios();}
function scenToggleLive(){_scenIncludeLive=!_scenIncludeLive;renderScenarios();}
function scenRunMC(){
  if(_scenMCRunning){if(_scenMCCtrl)_scenMCCtrl.cancel();_scenMCRunning=false;renderScenarios();return;}
  const scenarios=RIQ.Scenarios.list();
  const entries=[];
  if(_scenIncludeLive)entries.push({key:'__live__',live:true,plan:null});
  scenarios.filter(s=>_scenSel&&_scenSel.has(s.id)).forEach(s=>entries.push({key:s.id,live:false,plan:s}));
  if(!entries.length){showToast('Select at least one plan to simulate');return;}
  _scenMCRunning=true;_scenMCProgress='Starting…';renderScenarios();
  _scenMCCtrl=RIQ.Scenarios.runSuccess(entries,
    (key,res,done,total)=>{_scenMCProgress='Simulating '+done+'/'+total+'…';const el=document.getElementById('scen-mc-status');if(el)el.textContent=_scenMCProgress;},
    ()=>{_scenMCRunning=false;_scenMCCtrl=null;renderScenarios();},
    1500,97531);
}

function renderScenarios(){
  const page=document.getElementById('page-scenarios');
  try{
  const scenarios=RIQ.Scenarios.list();
  if(_scenSel===null)_scenSel=new Set(scenarios.map(s=>s.id)); // default: compare all saved
  _scenSel=new Set([..._scenSel].filter(id=>scenarios.some(s=>s.id===id))); // prune stale ids
  const mcRes=RIQ.Scenarios.mcResults();

  let html=`<div class="configure-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <div><div style="font-size:20px;font-weight:700;color:var(--text)">Scenario Manager</div><div style="font-size:13px;color:var(--text-muted);margin-top:3px">Save complete named plans and compare them side by side</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <div class="money-toggle"><button class="mt-opt${state.moneyMode==='today'?' active':''}" onclick="setMoneyMode('today')">Today's $</button><button class="mt-opt${state.moneyMode==='future'?' active':''}" onclick="setMoneyMode('future')">Future $</button></div>
        <button class="btn btn-primary btn-sm" onclick="scenSaveCurrent()">💾 Save current plan</button>
      </div>
    </div>`;

  if(!scenarios.length){
    html+=`<div style="padding:40px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text-muted)">
      <div style="font-size:15px;color:var(--text);margin-bottom:6px">No saved scenarios yet</div>
      <div style="font-size:13px;max-width:520px;margin:0 auto 16px">Save your current plan as a named scenario, then tweak your inputs and save alternatives (e.g. "Retire at 60", "Aggressive returns"). Compare them side by side here — ending estate, taxes, Monte Carlo success and net-worth trajectories.</div>
      <button class="btn btn-primary" onclick="scenSaveCurrent()">💾 Save current plan as a scenario</button>
    </div></div>`;
    page.innerHTML=html;return;
  }

  // ── Saved scenario cards ──
  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px">`;
  scenarios.forEach((s,idx)=>{
    const mt=RIQ.Scenarios.evaluate(s);
    const yrs=(mt&&!mt.error)?(mt.lastAge-mt.curAge):0;
    const sel=_scenSel.has(s.id);
    const col=SCEN_COLORS[(idx+1)%SCEN_COLORS.length];
    const created=new Date(s.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    html+=`<div style="border:1px solid ${sel?col:'var(--border)'};border-left:4px solid ${col};border-radius:10px;padding:14px;background:var(--surface)">
      <div style="display:flex;align-items:center;gap:8px;justify-content:space-between">
        <div style="font-weight:700;font-size:14px;color:var(--text);word-break:break-word">${escHtml(s.name)}</div>
        <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);white-space:nowrap;cursor:pointer"><input type="checkbox" ${sel?'checked':''} onchange="scenToggleSel('${s.id}')"> compare</label>
      </div>
      <div style="font-size:11px;color:var(--text-faint);margin-top:2px">saved ${created}</div>
      <div style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap">
        <div><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em">Est. estate</div><div style="font-size:15px;font-weight:700;color:${col}">${mt&&!mt.error?displayMoney(mt.endingEstate,yrs):'—'}</div></div>
        <div><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em">Retire</div><div style="font-size:15px;font-weight:700;color:var(--text)">${mt&&mt.retireAge!=null?mt.retireAge:'—'}</div></div>
      </div>
      <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-xs" onclick="scenLoad('${s.id}')">Load</button>
        <button class="btn btn-secondary btn-xs" onclick="scenRename('${s.id}')">Rename</button>
        <button class="btn btn-danger btn-xs" onclick="scenDelete('${s.id}')">Delete</button>
      </div>
    </div>`;
  });
  html+=`</div>`;

  // ── Comparison ──
  const entries=[];
  if(_scenIncludeLive){const lm=RIQ.Scenarios.liveMetrics({withSeries:true});if(lm)entries.push({key:'__live__',name:'Current plan (live)',color:'#00bfb3',metrics:lm,live:true});}
  scenarios.filter(s=>_scenSel.has(s.id)).forEach((s,i)=>{
    const idx=scenarios.indexOf(s);
    entries.push({key:s.id,name:s.name,color:SCEN_COLORS[(idx+1)%SCEN_COLORS.length],metrics:RIQ.Scenarios.evaluate(s,{withSeries:true}),live:false});
  });

  html+=`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:10px">
    <div style="font-size:16px;font-weight:700;color:var(--text)">Comparison</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);cursor:pointer"><input type="checkbox" ${_scenIncludeLive?'checked':''} onchange="scenToggleLive()"> include current live plan</label>
      <button class="btn btn-secondary btn-sm" onclick="scenRunMC()" ${entries.length?'':'disabled'}>${_scenMCRunning?'✕ Cancel':'🎲 Success probability'}</button>
    </div>
  </div>`;

  if(entries.length<1){
    html+=`<div style="padding:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text-muted);font-size:13px">Tick "compare" on one or more saved scenarios (and/or include the live plan) to build a side-by-side comparison.</div>`;
  } else {
    if(_scenMCRunning)html+=`<div style="margin-bottom:10px;font-size:12px;color:var(--text-muted)" id="scen-mc-status">${escHtml(_scenMCProgress||'Simulating…')}</div>`;
    // Metric rows
    const bestEstate=Math.max(...entries.map(e=>e.metrics&&!e.metrics.error?e.metrics.endingEstate:-Infinity));
    const rowsDef=[
      {label:'Ending estate',hi:true,fn:(mt,k)=>mt.error?'—':displayMoney(mt.endingEstate,mt.lastAge-mt.curAge)},
      {label:'Portfolio at retirement',fn:(mt)=>mt.error?'—':displayMoney(mt.portfolioAtRetire,Math.max(0,mt.retireAge-mt.curAge))},
      {label:'Peak portfolio',fn:(mt)=>mt.error?'—':displayMoney(mt.peakPortfolio,Math.max(0,mt.retireAge-mt.curAge))},
      {label:'Roth legacy',fn:(mt)=>mt.error?'—':displayMoney(mt.rothLegacy,mt.lastAge-mt.curAge)},
      {label:'Lifetime taxes',sub:'nominal',fn:(mt)=>mt.error?'—':fmtK(mt.lifetimeTaxes)},
      {label:'Total contributions',sub:'nominal',fn:(mt)=>mt.error?'—':fmtK(mt.totalContributions)},
      {label:'Retirement age',fn:(mt)=>mt.retireAge!=null?mt.retireAge:'—'},
      {label:'Plan-to age',fn:(mt)=>mt.planToAge!=null?mt.planToAge:'—'},
      {label:'Portfolio depletion',fn:(mt)=>mt.error?'—':(mt.depletionAge?('Age '+mt.depletionAge):'Never')},
      {label:'Monte Carlo success',fn:(mt,k)=>{const mc=mcRes[k];return mc?`<strong style="color:${mcColor(mc.successProb)}">${(mc.successProb*100).toFixed(0)}%</strong>`:'<span style="color:var(--text-faint)">run 🎲</span>';}},
    ];
    let head=`<th style="text-align:left;padding:8px 10px;position:sticky;left:0;background:var(--surface2);z-index:2">Metric</th>`;
    entries.forEach(e=>{head+=`<th style="padding:8px 10px;text-align:center;min-width:120px"><span style="display:inline-flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:2px;background:${e.color};display:inline-block"></span>${escHtml(e.name)}</span></th>`;});
    let body='';
    rowsDef.forEach(rd=>{
      body+=`<tr style="border-top:1px solid var(--border)"><td style="text-align:left;padding:8px 10px;color:var(--text-muted);position:sticky;left:0;background:var(--surface)">${rd.label}${rd.sub?` <span style="font-size:10px;color:var(--text-faint)">(${rd.sub})</span>`:''}</td>`;
      entries.forEach(e=>{
        const mt=e.metrics||{};
        const isBestEstate=rd.hi&&!mt.error&&isFinite(bestEstate)&&Math.round(mt.endingEstate)===Math.round(bestEstate)&&entries.length>1;
        body+=`<td style="text-align:center;padding:8px 10px;color:var(--text);${isBestEstate?'font-weight:800;color:var(--success)':''}">${rd.fn(mt,e.key)}${isBestEstate?' <span title="highest estate">★</span>':''}</td>`;
      });
      body+=`</tr>`;
    });
    html+=`<div style="overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:20px">
      <table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:var(--surface2);color:var(--text-muted)">${head}</tr></thead><tbody>${body}</tbody></table>
    </div>`;
    // Overlay chart
    html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px">
      <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px">Net-worth trajectories</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">${state.moneyMode==='today'?"today's dollars":'future (nominal) dollars'} · each plan uses its own timeline</div>
      <div id="scen-compare-chart" style="height:340px;position:relative"></div>
      <div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:10px">${entries.map(e=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text)"><span style="width:16px;height:3px;border-radius:2px;background:${e.color};display:inline-block"></span>${escHtml(e.name)}</div>`).join('')}</div>
    </div>`;
  }

  html+=`</div>`;
  page.innerHTML=html;
  requestAnimationFrame(()=>{const c=document.getElementById('scen-compare-chart');if(c)renderScenarioCompareChart(c,entries);});
  }catch(e){console.error('renderScenarios error:',e);page.innerHTML=`<div style="padding:40px 48px"><div style="background:var(--danger-bg);border:1px solid rgba(239,68,68,.35);border-radius:10px;padding:20px 24px;color:var(--danger)"><strong>⚠ Scenarios Render Error</strong><p style="margin-top:8px;font-size:13px;color:var(--text)">${escHtml(String(e&&e.message||e))}</p></div></div>`;}
}

// Overlay net-worth chart for the compared scenarios (pure SVG, theme-aware).
function renderScenarioCompareChart(container,entries){
  container.innerHTML='';
  const W=container.offsetWidth||820,H=container.offsetHeight||340;
  if(W<50||H<50)return;
  const NS='http://www.w3.org/2000/svg';
  const valid=(entries||[]).filter(e=>e.metrics&&!e.metrics.error&&e.metrics.series&&e.metrics.series.length);
  if(!valid.length){container.innerHTML='<div style="padding:24px;color:var(--text-muted);font-size:13px">No comparable plans selected.</div>';return;}
  const PAD={t:16,r:16,b:30,l:66},cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  let minAge=Infinity,maxAge=-Infinity,maxV=0;
  valid.forEach(e=>{const c=e.metrics.curAge;e._adj=e.metrics.series.map(p=>({age:p.age,v:adjV(p.total,p.age-c)}));
    e._adj.forEach(p=>{if(p.age<minAge)minAge=p.age;if(p.age>maxAge)maxAge=p.age;if(p.v>maxV)maxV=p.v;});});
  maxV=niceMax(maxV||1);
  const el=(t,a={})=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const muted=getCSSVar('--text-muted')||'#8892aa',grid=getCSSVar('--chart-grid')||'rgba(255,255,255,.06)';
  const txt=(c,x,y,o={})=>{const t=el('text',{x,y,'font-size':o.size||10,'text-anchor':o.anchor||'middle',fill:o.fill||muted});t.textContent=c;return t;};
  const xp=(age)=>PAD.l+(age-minAge)/Math.max(1,maxAge-minAge)*cW;
  const yp=(v)=>PAD.t+cH-Math.max(0,Math.min(v,maxV))/maxV*cH;
  const svg=el('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});svg.style.cssText='display:block;width:100%;height:100%;overflow:visible';
  for(let i=0;i<=5;i++){const v=maxV*i/5,y=yp(v);svg.appendChild(el('line',{x1:PAD.l,y1:y,x2:PAD.l+cW,y2:y,stroke:grid,'stroke-width':1}));svg.appendChild(txt(fmtKM(v),PAD.l-6,y+4,{anchor:'end'}));}
  const xStep=Math.max(1,Math.ceil((maxAge-minAge)/8));
  for(let a=minAge;a<=maxAge;a+=xStep)svg.appendChild(txt(a,xp(a),PAD.t+cH+16));
  svg.appendChild(txt(maxAge,xp(maxAge),PAD.t+cH+16));
  valid.forEach(e=>{
    const pts=e._adj.map(p=>`${xp(p.age).toFixed(1)},${yp(p.v).toFixed(1)}`).join(' ');
    svg.appendChild(el('polyline',{points:pts,fill:'none',stroke:e.color,'stroke-width':e.live?3:2.2,opacity:e.live?1:0.9}));
  });
  container.appendChild(svg);
}

/* ================================================================
   RENDER: REPORT TAB (Feature 7 — RIQ.Report)
   A polished, printable plan summary. Generation runs on demand (optimizers
   restore state); printing forces a light theme for legible dark→PDF output.
   ================================================================ */
function generatePlanReport(){
  try{RIQ.Report.generate();}catch(e){console.error('report generate',e);}
  renderReport();
  showToast('Report generated');
}
function printReport(){
  const prev=document.documentElement.getAttribute('data-theme')||'dark';
  document.documentElement.setAttribute('data-theme','light');
  renderReport(); // re-render so the SVG chart is drawn with light-theme colors
  requestAnimationFrame(()=>setTimeout(()=>{
    try{window.print();}finally{
      document.documentElement.setAttribute('data-theme',prev);
      renderReport();
    }
  },90));
}

  return`<div style="background:var(--surface3);border-radius:10px;padding:12px 14px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:4px">${label}</div><div style="font-size:19px;font-weight:800;color:${color||'var(--text)'};line-height:1.1">${value}</div>${sub?`<div style="font-size:10px;color:var(--text-muted);margin-top:2px">${sub}</div>`:''}</div>`;
}

      ${_rptStat('Monte Carlo success',mcTxt,data.mc?mcColor(data.mc.successProb):'var(--text-muted)',data.mc?`${data.mc.trials||''} trials`.trim():'not run')}
      ${_rptStat('Lifetime taxes',fmtK(lifetimeTax),'var(--warning)','fed + state + conversion')}
      ${_rptStat('Portfolio at retirement',displayMoney(sm.portfolioAtRetire,accYrs),'var(--text)','age '+sm.retireAge)}
    </div>
  </div>`;

  // ── Net-worth chart ──
  html+=`<div class="report-doc report-page-break" style="max-width:920px;margin:0 auto 32px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 28px;box-shadow:var(--shadow)">

function renderActualChart(container,model,actData){
  container.innerHTML='';
  const W=container.offsetWidth||900,H=container.offsetHeight||220;
  if(W<50||H<50)return;
  const PAD={t:18,r:18,b:38,l:68};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const rows=model.rows;if(!rows.length)return;
  const minAge=rows[0].age,maxAge=rows[rows.length-1].age;
  const actualPts=rows.map(r=>{const d=actData[r.yr]||{};const t=Object.values(d).reduce((s,v)=>s+(v||0),0);return Object.values(d).some(v=>v>0)?{age:r.age,val:t}:null;}).filter(Boolean);
  const maxVal=Math.max(...rows.map(r=>r.total),...actualPts.map(p=>p.val),1)*1.08;
  function xp(age){return PAD.l+(age-minAge)/(maxAge-minAge||1)*cW;}
  function yp(v){return PAD.t+cH-Math.max(0,v)/maxVal*cH;}
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');svg.setAttribute('width',W);svg.setAttribute('height',H);svg.style.display='block';
  function el2(tag,attrs){const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;}
  const gridColor=getCSSVar('--chart-grid');
  for(let i=0;i<=4;i++){const v=maxVal*i/4,y=yp(v);svg.appendChild(el2('line',{x1:PAD.l,y1:y,x2:PAD.l+cW,y2:y,stroke:gridColor,'stroke-width':'1'}));const t=el2('text',{x:PAD.l-5,y:y+4,'font-size':'10','text-anchor':'end',fill:getCSSVar('--text-muted')});t.textContent=fmtKM(v);svg.appendChild(t);}
  const step=Math.ceil((maxAge-minAge)/8);
  for(let a=minAge;a<=maxAge;a+=step){const t=el2('text',{x:xp(a),y:PAD.t+cH+15,'font-size':'10','text-anchor':'middle',fill:getCSSVar('--text-muted')});t.textContent=a;svg.appendChild(t);}
  if(state.retireAge>=minAge&&state.retireAge<=maxAge)svg.appendChild(el2('line',{x1:xp(state.retireAge),y1:PAD.t,x2:xp(state.retireAge),y2:PAD.t+cH,stroke:'#4a9eff','stroke-width':'1','stroke-dasharray':'4,3'}));
  const defs=el2('defs',{});const cp=el2('clipPath',{id:'acp'});const cr=el2('rect',{x:PAD.l,y:PAD.t,width:cW,height:cH});cp.appendChild(cr);defs.appendChild(cp);svg.insertBefore(defs,svg.firstChild);
  const mPts=rows.map(r=>`${xp(r.age)},${yp(r.total)}`).join(' ');
  svg.appendChild(el2('polyline',{points:mPts,fill:'none',stroke:'#00bfb3','stroke-width':'2','clip-path':'url(#acp)'}));
  if(actualPts.length>1){svg.appendChild(el2('polyline',{points:actualPts.map(p=>`${xp(p.age)},${yp(p.val)}`).join(' '),fill:'none',stroke:'#f0883e','stroke-width':'2','stroke-dasharray':'6,3'}));}
  actualPts.forEach(p=>{svg.appendChild(el2('circle',{cx:xp(p.age),cy:yp(p.val),r:'4',fill:'#f0883e',stroke:getCSSVar('--surface'),'stroke-width':'2'}));});
  container.appendChild(svg);
}

  const ss2=document.getElementById('sc-actual-sub');if(ss2)ss2.textContent=lastActualYr?`Year ${lastActualYr}`:'Enter above';
  const dl=document.getElementById('sc-delta-label');if(dl)dl.textContent=delta!==null&&delta>=0?'Ahead of Model':'Behind Model';
  const dn=document.getElementById('sc-delta-num');if(dn){dn.textContent=delta!==null?fmtK(Math.abs(delta)):'—';dn.className='sc-num '+(delta===null?'':(delta>=0?'sc-pos':'sc-neg'));}
  const ds=document.getElementById('sc-delta-sub');if(ds)ds.textContent=delta!==null?fmtPct(delta/Math.max(1,modelTotal)*100)+' vs model':'—';
  const yn=document.getElementById('sc-years-num');if(yn)yn.textContent=yearsData;
  _model.rows.forEach(row=>{
    const d2=actualData[row.yr]||{},hasData=Object.values(d2).some(v=>v>0);
    const aTotal=Object.values(d2).reduce((s,v)=>s+(v||0),0);
    const variance=hasData?aTotal-row.total:null;
    const atEl=document.getElementById(`ar-aTotal-${row.yr}`),varEl=document.getElementById(`ar-var-${row.yr}`),vpEl=document.getElementById(`ar-varpct-${row.yr}`);
    if(atEl){atEl.textContent=hasData?fmtK(aTotal):'—';atEl.className=hasData?'num-main':'';}
    if(varEl){varEl.textContent=variance!==null?(variance>=0?'+':'')+fmtK(variance):'—';varEl.className=variance!==null?(variance>=0?'num-pos':'num-neg'):'';}
    if(vpEl){vpEl.textContent=variance!==null?fmtPct(variance/Math.max(1,row.total)*100):'—';vpEl.className=variance!==null?(variance>=0?'num-pos':'num-neg'):'';}
  });
  const chartC=document.getElementById('actual-chart-container');
  if(chartC)renderActualChart(chartC,_model,actualData);
}

   ================================================================ */
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const page=document.getElementById('page-'+tab);
  page.classList.add('active');
  page.scrollTop=0; // reset scroll position so user always starts at top of new tab
  document.querySelector(`[data-goto="${tab}"]`)?.classList.add('active');
  // Only re-render if model changed since last render, or tab was never rendered
  if(_dirtyTabs.has(tab)||!_renderedTabs.has(tab)){
    _dirtyTabs.delete(tab);
    _renderedTabs.add(tab);
    if(tab==='overview')renderOverview();
    else if(tab==='configure'){renderConfigure();updateConfigPreviews();}
    else if(tab==='projections')renderProjections();
    else if(tab==='montecarlo')renderMonteCarlo();
    else if(tab==='analytics')renderAnalytics();
    else if(tab==='cashflow')renderCashFlow();
    else if(tab==='actual')renderActual();
    else if(tab==='scenarios')renderScenarios();
    else if(tab==='report')renderReport();
  }
}

// ── Global JS tooltip (replaces CSS ::after for [data-strat-tip] and any [data-tip]) ──
(function(){
  const tip=document.getElementById('global-tooltip');
  if(!tip)return;
  function showTip(text,e){
    if(!text){tip.style.display='none';return;}
    tip.textContent=text;tip.style.display='block';
    moveTip(e);
  }
  function moveTip(e){
    const tw=tip.offsetWidth||260,th=tip.offsetHeight||80;
    const vw=window.innerWidth,vh=window.innerHeight;
    let lft=e.clientX+14,top=e.clientY+14;
    if(lft+tw>vw-8)lft=e.clientX-tw-10;
    if(top+th>vh-8)top=e.clientY-th-10;
    lft=Math.max(8,lft);top=Math.max(8,top);
    tip.style.left=lft+'px';tip.style.top=top+'px';
  }
  document.addEventListener('mouseover',e=>{
    const el=e.target.closest('[data-strat-tip],[data-tip]');
    if(el){const t=el.dataset.stratTip||el.dataset.tip;showTip(t,e);}
    else tip.style.display='none';
  });
  let _lastTooltipMove=0;
  document.addEventListener('mousemove',e=>{
    if(tip.style.display!=='none'){
      const now=Date.now();if(now-_lastTooltipMove<16)return;_lastTooltipMove=now;
      moveTip(e);
    }
  });
  document.addEventListener('mouseout',e=>{
    if(!e.relatedTarget||!e.relatedTarget.closest('[data-strat-tip],[data-tip]'))tip.style.display='none';
  });
})();

document.addEventListener('input',function(e){
  const el=e.target;
  // State keys
  const key=el.dataset.key;
  if(key&&key in state){
    const rawVal=el.classList.contains('dollar-input')?el.value.replace(/,/g,''):el.value;
    const v=el.type==='range'||el.type==='number'||el.classList.contains('dollar-input')?parseFloat(rawVal)||0:rawVal;
    state[key]=v;
    if(el.dataset.pair){const pair=document.getElementById(el.dataset.pair);if(pair)pair.value=v;}
    if(el.dataset.pairRange){const pair=document.querySelector(`input[type="range"][data-key="${el.dataset.pairRange}"]`);if(pair){pair.value=v;updateSliderFill(pair);}}
    if(el.type==='range')updateSliderFill(el);
    if(key==='accumRate'||key==='retireRate')document.querySelectorAll('.preset-pill[data-scenario]').forEach(b=>b.classList.remove('active'));
    if(key==='retireAge'&&activeTab==='configure')refreshAccCards();
    // retireAge is a structural change that alters accYrs/retYrs — force immediate rebuild
    // so _dirtyTabs is updated before any tab switch (debounced recalculate misses fast switches)
    if(key==='retireAge'||key==='lifeExpectancy'){recalcNow();return;}
    recalculate();
    return;
  }
  // Goal fields (text/number) — selects & checkbox handled in the 'change' listener
  if(el.dataset.goalId&&el.dataset.goalField){
    const f=el.dataset.goalField;
    if(f==='amount'||f==='label'||f==='startAge'||f==='endAge'){
      const g=(state.goals||[]).find(x=>x.id===el.dataset.goalId);
      if(g){
        if(f==='amount')g.amount=parseFloat(String(el.value).replace(/,/g,''))||0;
        else if(f==='startAge'){const v=parseInt(el.value);if(!isNaN(v))g.startAge=v;}
        else if(f==='endAge'){const v=parseInt(el.value);g.endAge=(el.value===''||isNaN(v))?null:v;}
        else g[f]=el.value;
        recalculate();
      }
    }
    return;
  }
  // Account base fields
  const accId=el.dataset.accId,accField=el.dataset.accField;
  if(accId&&accField&&!el.dataset.contribId){
    const acc=accounts.find(a=>a.id===accId);
    if(acc){
      if(accField==='startBal')acc[accField]=parseFloat(String(el.value).replace(/,/g,''))||0;
      else acc[accField]=el.value;
      recalculate();
    }
    return;
  }
  // Contribution schedule fields
  const contribId=el.dataset.contribId,contribField=el.dataset.contribField;
  if(accId&&contribId&&contribField){
    const acc=accounts.find(a=>a.id===accId);
    if(acc&&acc.contributions){
      const contrib=acc.contributions.find(c=>c.id===contribId);
      if(contrib){
        if(contribField==='amount')contrib.amount=parseFloat(String(el.value).replace(/,/g,''))||0;
        else contrib[contribField]=el.value;
        // A manual edit to the stop date makes this schedule a FIXED date — it should
        // no longer auto-follow the retirement age until the user re-links it.
        if(contribField==='stopDate'&&contrib.frequency!=='lump_sum'&&contrib.stopAtRetirement){
          contrib.stopAtRetirement=false;
          const slb=document.getElementById(`slb-${contribId}`);
          if(slb){slb.classList.remove('linked');slb.innerHTML='<span class="slb-icon">\u21b3</span>Link to retirement';slb.title='Link this stop date to your retirement age';}
        }
        // Update age hint
        if(contribField==='startDate'||contribField==='stopDate'){
          const which=contribField==='startDate'?'start':'stop';
          const hintEl=document.getElementById(`ah-${contribId}-${which}`);
          if(hintEl)hintEl.textContent=ageHintText(el.value);
        }
        // Update annual equiv
        if(contribField==='amount'||contribField==='frequency'){
          const aeqEl=document.getElementById(`aeq-${contribId}`);
          if(aeqEl)aeqEl.textContent=aeqText(contrib);
        }
        recalculate();
      }
    }
    return;
  }
  // Holdings fields (ticker/name text + allocation/return/vol/ER numeric)
  const holdingId=el.dataset.holdingId,holdingField=el.dataset.holdingField;
  if(accId&&holdingId&&holdingField){
    const acc=accounts.find(a=>a.id===accId);
    if(acc&&Array.isArray(acc.holdings)){
      const h=acc.holdings.find(x=>x.id===holdingId);
      if(h){
        if(holdingField==='ticker')h.ticker=String(el.value||'').toUpperCase();
        else if(holdingField==='name')h.name=el.value;
        else{const v=parseFloat(String(el.value).replace(/,/g,''));h[holdingField]=(el.value===''||isNaN(v))?'':v;
          // A manual edit of a modeling assumption pins it — a later live Refresh
          // will not overwrite user-entered return / volatility / expense-ratio.
          if(holdingField==='expectedReturn'||holdingField==='volatility'||holdingField==='expenseRatio')h.manualAssumptions=true;}
        _updateHoldingLive(acc);
        recalculate();
      }
    }
    return;
  }
  // Override inputs
  if(el.classList.contains('ov-inp')){
    const age=parseInt(el.dataset.age),aid=el.dataset.acc;
    if(!overrides[age])overrides[age]={};
    const v=parseFloat(el.value);
    if(!isNaN(v)&&el.value!=='')overrides[age][aid]=v;else delete overrides[age][aid];
    recalculate();return;
  }
  // IRS overrides
  if(el.classList.contains('irs-inp')){
    const yr=parseInt(el.dataset.yr),k=el.dataset.key;
    if(!irsOv[yr])irsOv[yr]={};
    const v=parseFloat(el.value);
    if(!isNaN(v))irsOv[yr][k]=v;
    recalculate();return;
  }
  // Actual data
  if(el.dataset.actualYr){
    const yr=parseInt(el.dataset.actualYr),aid=el.dataset.actualAcc;
    if(!actualData[yr])actualData[yr]={};
    const v=parseFloat(String(el.value).replace(/,/g,''));
    if(!isNaN(v)&&el.value!=='')actualData[yr][aid]=v;else delete actualData[yr][aid];
    localStorage.setItem('retActualData',JSON.stringify(actualData));
    updateActualLiveView();return;
  }
});

// Dollar-input focus/blur: strip commas on focus so user can type freely,
// reformat with commas on blur for clean display
document.addEventListener('focusin',function(e){
  const el=e.target;
  if(!el.classList||!el.classList.contains('dollar-input'))return;
  const raw=parseFloat(String(el.value).replace(/,/g,''));
  if(!isNaN(raw))el.value=raw===0?'':raw;
  setTimeout(()=>el.select(),0);
});
document.addEventListener('focusout',function(e){
  const el=e.target;
  if(!el.classList||!el.classList.contains('dollar-input'))return;
  const raw=parseFloat(String(el.value).replace(/,/g,''));
  if(isNaN(raw)||el.value===''){el.value='';return;}
  el.value=raw>=1000?Math.round(raw).toLocaleString('en-US'):String(Math.round(raw));
});
// Configure tab: re-render once the user finishes typing in any input (focusout fires
// before the new element receives focus, so a setTimeout(0) lets us check whether
// another input took focus — if not, the user left the field, so a full re-render is safe).
document.addEventListener('focusout',function(e){
  if(activeTab!=='configure'||!e.target||e.target.tagName!=='INPUT')return;
  setTimeout(function(){
    const nowFocused=document.activeElement;
    if(!nowFocused||nowFocused.tagName!=='INPUT'){
      renderConfigure();
      updateConfigPreviews();
    }
  },0);
});
// Analytics tab: re-render once the user finishes editing the fee / risk-free inputs
// (focus guard in recalcNow/recalculate skips re-render while an input is focused).
document.addEventListener('focusout',function(e){
  if(activeTab!=='analytics'||!e.target||e.target.tagName!=='INPUT')return;
  setTimeout(function(){
    const nowFocused=document.activeElement;
    if(!nowFocused||nowFocused.tagName!=='INPUT')renderAnalytics();
  },0);
});
// Global: select-all on focus for all numeric inputs (type=number, inputmode=numeric/decimal)
// that are not already handled by the dollar-input handler above.
document.addEventListener('focus',function(e){
  const el=e.target;
  if(el.tagName!=='INPUT')return;
  if(el.classList&&el.classList.contains('dollar-input'))return;
  if(el.type==='number'||el.inputMode==='numeric'||el.inputMode==='decimal'||el.dataset.numeric){
    setTimeout(()=>el.select(),0);
  }
},true);
// Global: double-click selects all text in any input field
document.addEventListener('dblclick',function(e){
  const el=e.target;
  if(el.tagName==='INPUT')el.select();
},true);
document.addEventListener('change',function(e){
  const el=e.target;
  const key=el.dataset.key;
  if(key&&(el.tagName==='SELECT'||el.type==='date')){
    state[key]=(el.type==='number'||(typeof state[key]==='number'&&el.value!==''))?parseFloat(el.value)||0:el.value;
    recalculate();
    if(key==='spouseDob'&&activeTab==='configure'){
      // Auto-switch to MFJ when a spouse is added from single/HOH filing
      if(el.value&&(state.filingStatus==='single'||state.filingStatus==='hoh')){
        state.filingStatus='mfj';
        saveState();
        showToast('Filing status updated to Married Filing Jointly');
      }
      renderConfigure();
    }
    if(key==='filingStatus'&&activeTab==='configure')renderConfigure();
    return;
  }
  // Goal selects / checkbox
  if(el.dataset.goalId&&el.dataset.goalField){
    const g=(state.goals||[]).find(x=>x.id===el.dataset.goalId);
    if(g){
      const f=el.dataset.goalField;
      if(f==='taxable')g.taxable=el.checked;
      else if(f==='type'){
        g.type=el.value;
        const T=(window.RIQ&&RIQ.Goals&&RIQ.Goals.TYPES)?RIQ.Goals.TYPES:{};
        const rec=!!(T[g.type]&&T[g.type].recurring);
        if(rec&&(g.endAge==null||g.endAge===''))g.endAge=(+g.startAge||0)+3;
        if(!rec)g.endAge=null;
      }
      else g[f]=el.value;
      saveState();recalcNow();
      if(activeTab==='configure')renderConfigure();
    }
    return;
  }
  // Holding ticker committed (blur/Enter) → auto-fill modeling assumptions when recognized
  if(el.dataset.holdingId&&el.dataset.holdingField==='ticker'){
    const acc=accounts.find(a=>a.id===el.dataset.accId);
    const h=acc&&Array.isArray(acc.holdings)&&acc.holdings.find(x=>x.id===el.dataset.holdingId);
    if(h){
      h.ticker=String(el.value||'').toUpperCase();
      const asm=(window.RIQ&&RIQ.Holdings)?RIQ.Holdings.assumptionsFor(h.ticker):null;
      if(asm){
        // Fill any blank modeling fields (recognized → real library figures;
        // unrecognized → a clearly-flagged best-guess ESTIMATE, never left blank).
        if(h.expectedReturn==null||h.expectedReturn==='')h.expectedReturn=asm.expectedReturn;
        if(h.volatility==null||h.volatility==='')h.volatility=asm.volatility;
        if(h.expenseRatio==null||h.expenseRatio==='')h.expenseRatio=asm.expenseRatio;
        if(!h.name&&asm.name)h.name=asm.name;
        h.assetClass=asm.assetClass;
        h.estimated=!!asm.estimated;
        // Nice-to-have: for an unknown (estimated) ticker, kick off ONE best-effort
        // background fetch for just this symbol. If the app is hosted (network/CORS
        // permit it) real data replaces the estimate; offline / file:// it silently
        // keeps the estimate. No UI hang — the fetch is fully async & self-contained.
        if(asm.estimated&&h.ticker)_bgFetchTicker(h.ticker);
      }else{
        h.assetClass='';h.estimated=false;
      }
      saveState();
      recalculate();
      if(activeTab==='configure')refreshAccCards();
    }
    return;
  }
  // Account type from select
  const accId=el.dataset.accId,accField=el.dataset.accField;
  if(accId&&accField&&el.tagName==='SELECT'&&!el.dataset.contribId){
    const acc=accounts.find(a=>a.id===accId);
    if(acc){acc[accField]=el.value;refreshAccCards();recalculate();}
    return;
  }
  // Contribution frequency select
  if(el.dataset.contribId&&el.dataset.contribField==='frequency'){
    const acc=accounts.find(a=>a.id===el.dataset.accId);
    if(acc&&acc.contributions){
      const contrib=acc.contributions.find(c=>c.id===el.dataset.contribId);
      if(contrib){
        const wasLumpSum=contrib.frequency==='lump_sum';
        const isNowLumpSum=el.value==='lump_sum';
        contrib.frequency=el.value;
        if(isNowLumpSum)contrib.stopDate=null;
        // Update annual-equiv text
        const aeqEl=document.getElementById(`aeq-${contrib.id}`);
        if(aeqEl)aeqEl.textContent=aeqText(contrib);
        // Toggle stop-date section and visual classes in place (CSS transition)
        const schedDiv=document.querySelector(`[data-sched-id="${contrib.id}"]`);
        if(schedDiv){
          schedDiv.classList.toggle('is-lump-sum',isNowLumpSum);
          const stopSection=document.getElementById(`stop-section-${contrib.id}`);
          if(stopSection)stopSection.classList.toggle('hidden',isNowLumpSum);
          const perLbl=document.getElementById(`per-lbl-${contrib.id}`);
          if(perLbl)perLbl.classList.toggle('hidden',isNowLumpSum);
          const startLbl=document.getElementById(`start-lbl-${contrib.id}`);
          if(startLbl)startLbl.textContent=isNowLumpSum?'Date':'Start';
          const lumpBadge=schedDiv.querySelector('.lump-sum-badge');
          if(lumpBadge)lumpBadge.style.display=isNowLumpSum?'':'none';
          else if(isNowLumpSum){
            const badge=document.createElement('span');
            badge.className='lump-sum-badge';badge.textContent='ONE-TIME';
            aeqEl&&aeqEl.after(badge);
          }
          // Show / hide Source/Note row
          const noteRow=document.getElementById(`note-row-${contrib.id}`);
          if(noteRow)noteRow.classList.toggle('hidden',!isNowLumpSum);
        }
        saveState();recalculate();
      }
    }
  }
  // Contribution schedule date inputs: 'change' fires on date-picker close on some platforms
  // where 'input' may not fire, so ensure recalculate() is always called for date changes.
  const cAccId=el.dataset.accId,cContribId=el.dataset.contribId,cContribField=el.dataset.contribField;
  if(cAccId&&cContribId&&cContribField&&el.type==='date'){
    const acc=accounts.find(a=>a.id===cAccId);
    if(acc&&acc.contributions){
      const contrib=acc.contributions.find(c=>c.id===cContribId);
      if(contrib&&contrib[cContribField]!==el.value){
        contrib[cContribField]=el.value;
        // Manual stop-date pick unlinks from retirement (becomes a fixed date)
        if(cContribField==='stopDate'&&contrib.frequency!=='lump_sum'&&contrib.stopAtRetirement){
          contrib.stopAtRetirement=false;
          const slb=document.getElementById(`slb-${cContribId}`);
          if(slb){slb.classList.remove('linked');slb.innerHTML='<span class="slb-icon">\u21b3</span>Link to retirement';slb.title='Link this stop date to your retirement age';}
        }
        const which=cContribField==='startDate'?'start':'stop';
        const hintEl=document.getElementById(`ah-${cContribId}-${which}`);
        if(hintEl)hintEl.textContent=ageHintText(el.value);
        saveState();recalculate();
      }
    }
  }
});

document.addEventListener('click',function(e){
  // Nav
  const navBtn=e.target.closest('[data-goto]');
  if(navBtn){switchTab(navBtn.dataset.goto);return;}
  // Account type pill
  const typePill=e.target.closest('.acc-type-pill');
  if(typePill&&typePill.dataset.accId&&typePill.dataset.accType){
    const acc=accounts.find(a=>a.id===typePill.dataset.accId);
    if(acc){
      acc.type=typePill.dataset.accType;
      recalcNow(); // structural change: immediately rebuild model + mark all other tabs dirty
    }return;
  }
  // Toggle row
  const tog=e.target.closest('.tog');
  if(tog&&tog.dataset.age&&tog.dataset.acc){
    const age=parseInt(tog.dataset.age),aid=tog.dataset.acc;
    if(!toggles[age])toggles[age]={};
    toggles[age][aid]=toggles[age][aid]===false?true:false;
    recalculate();
    if(activeTab==='configure'){const adv=document.querySelector('.adv-body');if(adv&&adv.classList.contains('open'))adv.innerHTML=renderAdvanced();}
    return;
  }
  // Delete account
  const delBtn=e.target.closest('[data-del-acc]');
  if(delBtn){
    const aid=delBtn.dataset.delAcc;
    if(confirm('Remove this account from all calculations?')){
      accounts=accounts.filter(a=>a.id!==aid);
      recalcNow(); // structural change: immediately rebuild model + mark all other tabs dirty
    }return;
  }
  // Add contribution schedule
  const addContrib=e.target.closest('[data-add-contrib]');
  if(addContrib){
    const aid=addContrib.dataset.addContrib;
    const acc=accounts.find(a=>a.id===aid);
    if(acc){
      if(!acc.contributions)acc.contributions=[];
      const isLumpAcct=acc.type==='401k';
      acc.contributions.push({id:'c_'+Date.now(),amount:0,frequency:isLumpAcct?'lump_sum':'monthly',startDate:todayISO(),stopDate:isLumpAcct?null:retireDateISO(),stopAtRetirement:!isLumpAcct,label:'',note:''});
      recalcNow(); // structural change: immediately rebuild model + mark all other tabs dirty
    }return;
  }
  // Toggle retirement-linked stop date
  const linkContrib=e.target.closest('[data-link-contrib]');
  if(linkContrib){
    const parts=linkContrib.dataset.linkContrib.split('::');
    const acc=accounts.find(a=>a.id===parts[0]);
    const contrib=acc&&acc.contributions&&acc.contributions.find(c=>c.id===parts[1]);
    if(contrib&&contrib.frequency!=='lump_sum'){
      contrib.stopAtRetirement=!contrib.stopAtRetirement;
      // When linking, snap the stored stop date to the retirement date so exports and
      // the fixed fallback stay consistent (the model computes it live either way).
      if(contrib.stopAtRetirement)contrib.stopDate=retireDateISO();
      saveState();
      recalcNow(); // rebuild model + refresh displayed dates
      if(activeTab==='configure')refreshAccCards();
    }
    return;
  }
  // Add holding
  const addHolding=e.target.closest('[data-add-holding]');
  if(addHolding){
    const acc=accounts.find(a=>a.id===addHolding.dataset.addHolding);
    if(acc){
      if(!Array.isArray(acc.holdings))acc.holdings=[];
      acc.holdings.push({id:'h_'+Date.now(),ticker:'',name:'',allocationPct:0,expectedReturn:'',volatility:'',expenseRatio:'',assetClass:''});
      recalcNow(); // structural change: rebuild + re-render configure (no input focused)
      if(activeTab==='configure')refreshAccCards();
    }return;
  }
  // Remove holding
  const removeHolding=e.target.closest('[data-remove-holding]');
  if(removeHolding){
    const parts=removeHolding.dataset.removeHolding.split('::');
    const acc=accounts.find(a=>a.id===parts[0]);
    if(acc&&Array.isArray(acc.holdings)){
      acc.holdings=acc.holdings.filter(h=>h.id!==parts[1]);
      recalcNow();
      if(activeTab==='configure')refreshAccCards();
    }return;
  }
  // Remove contribution schedule
  const removeContrib=e.target.closest('[data-remove-contrib]');
  if(removeContrib){
    const parts=removeContrib.dataset.removeContrib.split('::');
    const aid=parts[0],cid=parts[1];

    if(acc&&acc.contributions&&acc.contributions.length>1){
      acc.contributions=acc.contributions.filter(c=>c.id!==cid);
      recalcNow(); // structural change: immediately rebuild model + mark all other tabs dirty
    }return;
  }
  // Scenario preset (Conservative/Base/Aggressive) — sole handler; buttons have no onclick to avoid double-fire
  const scenBtn=e.target.closest('[data-scenario]');
  if(scenBtn&&!e.target.closest('[data-del-acc]'))applyScenario(scenBtn.dataset.scenario);
});

/* CSV Export/Import */
function exportCSV(){
  if(!_model)return;
  const rows=_model.rows,has401k=accounts.some(a=>a.type==='401k');
  const headers=['Age','Year','Phase','Salary',...accounts.map(a=>a.name),(has401k?'Company Match':''),'Total Portfolio','Annual Lifestyle','SS Income','Net Draw'].filter(Boolean);
  const lines=[headers.join(',')];
  rows.forEach(row=>{
    const matchT=Object.values(row.matches||{}).reduce((s,v)=>s+v,0);
    lines.push([row.age,row.yr,row.phase,row.salary||0,...accounts.map(a=>Math.round(row.bals[a.id]||0)),(has401k?Math.round(matchT):''),Math.round(row.total),Math.round(row.lifestyleDraw||0),Math.round(row.totalSS||0),Math.round(row.netDraw||0)].filter((_,i)=>i!==4+accounts.length||has401k).join(','));
  });
  downloadBlob('retirement-projections.csv',lines.join('\n'),'text/csv');
}
function exportActualCSV(){
  const headers=['Year','Age',...accounts.map(a=>a.name),'Actual Total'];
  const curAge=computeAge(state.dob),curYr=cy();
  const lines=[headers.join(',')];
  Object.keys(actualData).sort().forEach(yr=>{
    const d=actualData[yr],age=curAge+(parseInt(yr)-curYr);
    const vals=accounts.map(a=>d[a.id]||0);
    lines.push([yr,age,...vals,vals.reduce((s,v)=>s+v,0)].join(','));
  });
  downloadBlob('actual-balances.csv',lines.join('\n'),'text/csv');
}
function importActualCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const lines=ev.target.result.split('\n').filter(Boolean),hdr=lines[0].split(',');
    lines.slice(1).forEach(line=>{
      const vals=line.split(','),yr=parseInt(vals[0]);if(isNaN(yr))return;
      if(!actualData[yr])actualData[yr]={};
      accounts.forEach(acc=>{const hi=hdr.findIndex(h=>h.trim()===acc.name);if(hi>=0){const v=parseFloat(vals[hi]);if(!isNaN(v))actualData[yr][acc.id]=v;}});
    });
    localStorage.setItem('retActualData',JSON.stringify(actualData));renderActual();
  };
  reader.readAsText(file);
}
function downloadBlob(name,content,type){
  const blob=new Blob([content],{type}),url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}

// Attempts to fetch live IRS tax bracket data from public APIs.
// All fetches will typically fail in file:// mode due to CORS; falls back gracefully.
async function refreshTaxData(){
  const btn=document.getElementById('tax-refresh-btn');
  const statusEl=document.getElementById('tax-refresh-status');
  if(!btn||!statusEl)return;
  btn.disabled=true;
  btn.textContent='⟳ Fetching...';
  statusEl.innerHTML='';

  const year=cy();
  // CORS-friendly public API sources (taxee.io requires an API key in prod but returns CORS headers)
  const sources=[
    {url:`https://taxee.io/api/v2/federal/${year}`,label:'taxee.io'},
    {url:`https://api.allorigins.win/raw?url=${encodeURIComponent('https://taxfoundation.org/data/all/federal/2026-tax-brackets/')}`,label:'Tax Foundation (via proxy)'},
  ];

  let success=false;
  for(const src of sources){
    try{
      // SECURITY-REVIEW: fetch to external URL with no user-controlled input; URLs are hardcoded
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),8000);
      const resp=await fetch(src.url,{signal:ctrl.signal,mode:'cors'});
      clearTimeout(tid);
      if(!resp.ok)continue;
      const text=await resp.text();
      // Try JSON parse (taxee.io style)
      try{
        const data=JSON.parse(text);
        // taxee.io returns { tax_withholding_percentage_method_tables: ... } or similar structure
        if(data&&(data.income_tax_brackets||data.brackets||data.federal)){
          const ts=new Date().toISOString();
          localStorage.setItem('taxDataFetchTimestamp',ts);
          localStorage.setItem('taxDataFetchSource',src.label);
          const d=new Date(ts).toLocaleDateString();
          statusEl.innerHTML=`<span style="color:var(--green,#4ade80)">✓ Tax data verified from ${src.label} — ${d}</span>`;
          success=true;
          break;
        }
      }catch(_){}
      // Non-JSON (HTML from proxy) — if we got substantial content treat as a successful ping
      if(text&&text.length>1000){
        const ts=new Date().toISOString();
        localStorage.setItem('taxDataFetchTimestamp',ts);
        localStorage.setItem('taxDataFetchSource',src.label);
        const d=new Date(ts).toLocaleDateString();
        statusEl.innerHTML=`<span style="color:var(--green,#4ade80)">✓ Tax bracket page reachable via ${src.label} — ${d}</span>`;
        success=true;
        break;
      }
    }catch(_){}// network error, CORS block, or timeout — try next source
  }

  if(!success){
    statusEl.innerHTML=`<span style="color:var(--warning,#fbbf24)">⚠ Live fetch unavailable in offline mode. Data verified Jul 2026 from IRS Rev. Proc. 2025-32.</span> `+
      `<a href="https://www.irs.gov/newsroom/irs-releases-tax-inflation-adjustments-for-tax-year-2026" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">View on IRS.gov ↗</a>`;
  }

  btn.disabled=false;
  btn.textContent='↻ Refresh';
}

/* ── Pull-to-refresh (mobile) ──────────────────────────────────────────────
   The app uses overflow:hidden on body so the browser's native pull-to-
   refresh never fires. This custom implementation detects a downward swipe
   from the top of the active page and reloads when pulled far enough.
   State is preserved via localStorage so the reload feels instant.
   ─────────────────────────────────────────────────────────────────────── */
(function(){
  const THRESHOLD=90;  // px of pull needed to trigger reload
  const MAX_PULL=130;  // px cap for visual indicator stretch

  // ── Indicator bar ──
  const bar=document.createElement('div');
  bar.id='ptr-bar';
  bar.innerHTML='<div id="ptr-inner"><span id="ptr-arrow">↓</span><span id="ptr-label"> Pull to refresh</span></div>';
  Object.assign(bar.style,{
    position:'fixed',top:'0',left:'0',right:'0',
    height:'0',overflow:'hidden',
    background:'var(--accent)',
    display:'flex',alignItems:'center',justifyContent:'center',
    zIndex:'9999',pointerEvents:'none',
    transition:'background .2s',
  });
  const arrow=bar.querySelector('#ptr-arrow');
  const label=bar.querySelector('#ptr-label');
  Object.assign(arrow.style,{
    color:'#fff',fontSize:'18px',fontWeight:'700',
    transition:'transform .15s',
    userSelect:'none',display:'inline-block',
  });
  Object.assign(label.style,{
    color:'#fff',fontSize:'13px',fontWeight:'600',
    userSelect:'none',letterSpacing:'.02em',
  });
  document.body.appendChild(bar);

  let startY=0,pulling=false,released=false;

  function getActivePage(){return document.querySelector('.page.active');}

  document.addEventListener('touchstart',function(e){
    const page=getActivePage();
    if(!page||page.scrollTop>2)return;
    startY=e.touches[0].clientY;
    pulling=true;released=false;
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    if(!pulling||released)return;
    const dy=e.touches[0].clientY-startY;
    if(dy<=0){bar.style.height='0';return;}
    const pull=Math.min(dy,MAX_PULL);
    bar.style.height=pull+'px';
    bar.style.background=pull>=THRESHOLD?'var(--success)':'var(--accent)';
    arrow.style.transform=pull>=THRESHOLD?'rotate(180deg)':'rotate(0deg)';
    label.textContent=pull>=THRESHOLD?' Release to refresh':' Pull to refresh';
  },{passive:true});

  document.addEventListener('touchend',function(e){
    if(!pulling)return;
    pulling=false;released=true;
    const dy=e.changedTouches[0].clientY-startY;
    if(dy>=THRESHOLD){
      bar.style.height='44px';
      bar.style.background='var(--success)';
      arrow.textContent='↻';arrow.style.transform='rotate(0deg)';
      label.textContent=' Refreshing…';
      setTimeout(()=>location.reload(),300);
    } else {
      bar.style.transition='height .25s ease';
      bar.style.height='0';
      setTimeout(()=>{bar.style.transition='';},300);
    }
    startY=0;
  },{passive:true});
})();
