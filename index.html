// Overview card wrapper — only shown once the user has defined at least one goal,
// so the default Overview is visually unchanged.
function renderEventTimelineCard(){
  const goals=Array.isArray(state.goals)?state.goals:[];
  if(!goals.length)return '';
  const nActive=goals.filter(g=>g.enabled).length;
  return `<div class="chart-wrap" style="margin-bottom:20px">
    <div class="chart-header">
      <div><div class="chart-title">🎯 Event Timeline</div><div class="chart-sub">Dated goals &amp; life events across your plan · ${state.moneyMode==='today'?"today's $":'future $'}</div></div>
      <div style="font-size:12px;color:var(--text-muted)">${nActive} active${goals.length>nActive?` · ${goals.length-nActive} off`:''}</div>
    </div>
    <div id="overview-timeline" class="chart-container" style="height:auto;min-height:90px;position:relative"></div>
  </div>`;
}
function renderEventTimeline(container){
  if(!container)return;
  container.innerHTML='';
  const model=_model;
  const T=(window.RIQ&&RIQ.Goals)?RIQ.Goals.TYPES:{};
  const goals=(state.goals||[]).filter(g=>g&&g.enabled&&T[g.type]);
  if(!model||!model.rows||!model.rows.length){container.innerHTML='';return;}
  if(!goals.length){container.innerHTML=`<div style="padding:22px;text-align:center;color:var(--text-muted);font-size:.85rem">No enabled events yet — add goals &amp; life events in the <strong>Configure</strong> tab to see them plotted here.</div>`;return;}
  const W=container.offsetWidth||900;
  const NS='http://www.w3.org/2000/svg';
  const curAge=model.curAge,lifeAge=model.rows[model.rows.length-1].age;
  const minAge=curAge,maxAge=lifeAge;
  const PAD={t:16,r:24,b:26,l:24};
  const cW=Math.max(10,W-PAD.l-PAD.r);
  const xp=age=>PAD.l+(Math.max(minAge,Math.min(maxAge,age))-minAge)/Math.max(1,maxAge-minAge)*cW;
  const inflPct=+state.inflationRate||0;
  // Build event descriptors
  const evs=goals.map(g=>{
    const t=T[g.type];
    const yft=Math.max(0,(+g.startAge||0)-curAge);
    const nominal=RIQ.Goals.nominal(g,yft,inflPct);
    const amtStr=displayMoney(nominal,yft);
    const recurring=!!t.recurring;
    const endA=(g.endAge!=null&&g.endAge!=='')?+g.endAge:(recurring?maxAge:+g.startAge);
    const icon=({'expense-onetime':'▼','expense-recurring':'▼','income-onetime':'▲','income-recurring':'▲','goal-target':'◆'})[g.type]||'•';
    const short=(g.label||t.label).length>18?(g.label||t.label).slice(0,17)+'…':(g.label||t.label);
    return {g,t,x:xp(+g.startAge||curAge),x2:xp(endA),recurring,color:t.color,short,amtStr,icon,startAge:+g.startAge||curAge,endAge:endA,flow:t.flow};
  }).sort((a,b)=>a.x-b.x);
  // Greedy lane packing (avoid label overlap)
  const laneRight=[];
  evs.forEach(e=>{
    const estW=Math.max(74,(e.short.length*6)+40);
    let lane=0;while(lane<laneRight.length&&laneRight[lane]>e.x-6)lane++;
    e.lane=lane;laneRight[lane]=e.x+estW;
  });
  const lanes=Math.max(1,laneRight.length);
  const laneH=30;
  const H=PAD.t+PAD.b+lanes*laneH+22;
  const baseY=H-PAD.b;
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.style.display='block';svg.style.overflow='visible';svg.style.width='100%';
  const el=(tag,attrs={},style={})=>{const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));Object.entries(style).forEach(([k,v])=>e.style[k]=v);return e;};
  const txt=(c,x,y,o={})=>{const t=el('text',{x,y,'font-size':o.size||10,'text-anchor':o.anchor||'start',fill:o.fill||getCSSVar('--text-muted')});if(o.weight)t.setAttribute('font-weight',o.weight);t.textContent=c;return t;};
  const grid=getCSSVar('--chart-grid')||getCSSVar('--border');
  // Baseline axis
  svg.appendChild(el('line',{x1:PAD.l,y1:baseY,x2:PAD.l+cW,y2:baseY,stroke:grid,'stroke-width':'1.5'}));
  // X ticks (ages)
  const xStep=Math.max(1,Math.ceil((maxAge-minAge)/10));
  const seen=new Set();
  for(let a=minAge;a<=maxAge;a+=xStep){seen.add(a);}
  seen.add(maxAge);
  seen.forEach(a=>{const x=xp(a);svg.appendChild(el('line',{x1:x,y1:baseY,x2:x,y2:baseY+4,stroke:grid,'stroke-width':'1'}));svg.appendChild(txt(a,x,baseY+16,{anchor:'middle'}));});
  // Retirement marker
  if(state.retireAge>=minAge&&state.retireAge<=maxAge){const rx=xp(state.retireAge);svg.appendChild(el('line',{x1:rx,y1:PAD.t,x2:rx,y2:baseY,stroke:'#4a9eff','stroke-width':'1','stroke-dasharray':'4,3'}));svg.appendChild(txt('Retire '+state.retireAge,rx+4,PAD.t+9,{fill:'#4a9eff',size:9}));}
  const tt=document.createElement('div');
  const tbg=getCSSVar('--tooltip-bg'),tbdr=getCSSVar('--border'),tcl=getCSSVar('--text');
  tt.style.cssText=`position:absolute;background:${tbg};border:1px solid ${tbdr};border-radius:10px;padding:9px 13px;font-size:12.5px;line-height:1.6;pointer-events:none;z-index:9999;display:none;max-width:280px;box-shadow:var(--shadow);color:${tcl}`;
  evs.forEach(e=>{
    const labelY=baseY-14-e.lane*laneH;
    // Recurring: bar along baseline
    if(e.recurring&&e.x2>e.x){
      svg.appendChild(el('rect',{x:e.x,y:baseY-4,width:Math.max(2,e.x2-e.x),height:8,rx:3,fill:e.color,opacity:'.35'}));
    }
    // Stem + marker
    svg.appendChild(el('line',{x1:e.x,y1:baseY,x2:e.x,y2:labelY+3,stroke:e.color,'stroke-width':'1','stroke-dasharray':'2,2',opacity:'.7'}));
    if(e.flow==='target'){
      svg.appendChild(el('rect',{x:e.x-4,y:baseY-4,width:8,height:8,fill:e.color,transform:`rotate(45 ${e.x} ${baseY})`}));
    } else {
      svg.appendChild(el('circle',{cx:e.x,cy:baseY,r:4,fill:e.color,stroke:getCSSVar('--surface'),'stroke-width':'1'}));
    }
    // Label pill
    const label=`${e.icon} ${e.short} · ${e.amtStr}`;
    const t=txt(label,e.x+3,labelY,{fill:e.color,size:10,weight:'600'});
    svg.appendChild(t);
    // Hover hit area
    const hit=el('rect',{x:e.x-8,y:labelY-11,width:Math.max(80,(e.short.length*6)+60),height:16,fill:'transparent'});
    hit.style.cursor='pointer';
    hit.addEventListener('mouseenter',()=>{
      const g=e.g;const yr=cy()+Math.max(0,e.startAge-curAge);
      let h=`<div style="font-weight:700;margin-bottom:3px;color:${e.color}">${e.icon} ${escHtml(g.label||e.t.label)}</div>`;
      h+=`<div style="color:var(--text-muted);font-size:11px;margin-bottom:4px">${escHtml(e.t.label)}</div>`;
      h+=`<div><strong>${e.amtStr}</strong> ${g.dollars==='future'?'future $':"today's $"}</div>`;
      if(e.recurring)h+=`<div style="color:var(--text-muted);font-size:11px">Age ${e.startAge}–${(g.endAge!=null&&g.endAge!=='')?g.endAge:'life'} · from ${yr}</div>`;
      else h+=`<div style="color:var(--text-muted);font-size:11px">Age ${e.startAge} · ${yr}</div>`;
      if(e.flow==='income'&&g.taxable)h+=`<div style="color:var(--warning);font-size:11px">Taxed as ordinary income</div>`;
      if(e.flow==='target'){const rowAt=model.rows.find(r=>r.age===e.startAge);if(rowAt){const met=rowAt.total>=(+g.amount||0);h+=`<div style="color:${met?'var(--success)':'var(--danger)'};font-size:11px;margin-top:3px">${met?'✓ On track':'✗ Short'}: projected ${displayMoney(rowAt.total,e.startAge-curAge)}</div>`;}}
      tt.innerHTML=h;tt.style.display='block';
    });
    hit.addEventListener('mousemove',ev=>{const rect=container.getBoundingClientRect();let tx=ev.clientX-rect.left+14,ty=ev.clientY-rect.top-10;const tw=tt.offsetWidth||220;if(tx+tw>W-4)tx=ev.clientX-rect.left-tw-10;tt.style.left=Math.max(4,tx)+'px';tt.style.top=Math.max(2,ty)+'px';});
    hit.addEventListener('mouseleave',()=>{tt.style.display='none';});
    svg.appendChild(hit);
  });
  container.appendChild(svg);container.appendChild(tt);
}

function addGoalPreset(key){
  const P=(window.RIQ&&RIQ.Goals&&RIQ.Goals.PRESETS)?RIQ.Goals.PRESETS:[];
  const p=P.find(x=>x.key===key)||{label:'Custom Event',type:'expense-onetime',amount:10000};
  const T=(window.RIQ&&RIQ.Goals&&RIQ.Goals.TYPES)?RIQ.Goals.TYPES:{};
  const curAge=computeAge(state.dob)||40;
  const start=Math.max(curAge,(+state.retireAge||curAge)); // default around retirement
  const recurring=!!(T[p.type]&&T[p.type].recurring);
  const g={
    id:'g'+Date.now()+Math.floor(Math.random()*1000),
    label:p.label,type:p.type,amount:p.amount||0,dollars:'today',
    startAge:start,endAge:recurring?start+((p.years||3)-1):null,
    account:'general',taxable:!!p.taxable,month:1,enabled:true,
  };
  if(!Array.isArray(state.goals))state.goals=[];
  state.goals.push(g);
  saveState();recalcNow();
  if(activeTab==='configure')renderConfigure();
}
function removeGoal(id){
  if(!confirm('Remove this event from the plan?'))return;
  state.goals=(state.goals||[]).filter(g=>g.id!==id);
  saveState();recalcNow();
  if(activeTab==='configure')renderConfigure();
}
function toggleGoal(id){
  const g=(state.goals||[]).find(x=>x.id===id);
  if(!g)return;
  g.enabled=!g.enabled;
  saveState();recalcNow();
  if(activeTab==='configure')renderConfigure();
}

    let o=`<option value="general"${(!key||key==='general')?' selected':''}>${flow==='income'?'General (Taxable)':'General portfolio (auto)'}</option>`;
    accounts.forEach(a=>{o+=`<option value="${a.id}"${key===a.id?' selected':''}>${escHtml(a.name)}</option>`;});

  }).join('');

// ── Left column: a compact "what you have" summary of the account + its holdings blend ──
function renderAccSummary(acc){
  const bal=+acc.startBal||0;
  const sum=(window.RIQ&&RIQ.Holdings)?RIQ.Holdings.accountSummary(acc):null;
  let rows=`<div class="acc-summary-row"><span>Current value</span><strong>${fmtK(bal)}</strong></div>`;
  if(sum){
    rows+=`<div class="acc-summary-row"><span>Positions</span><strong>${sum.count}</strong></div>`;
    rows+=`<div class="acc-summary-row"><span>Blended return</span><strong>${sum.expReturn.toFixed(1)}%</strong></div>`;
    rows+=`<div class="acc-summary-row"><span>Volatility</span><strong>σ ${sum.vol.toFixed(1)}%</strong></div>`;
    rows+=`<div class="acc-summary-row"><span>Expense ratio</span><strong>${sum.er.toFixed(2)}%</strong></div>`;
    if(Math.abs(sum.allocTotal-100)>0.5)rows+=`<div class="acc-summary-note" style="color:var(--warning)">Allocation totals ${sum.allocTotal.toFixed(sum.allocTotal%1?1:0)}% — aim for ~100%.</div>`;
  }else{
    rows+=`<div class="acc-summary-note">No holdings yet. Add positions on the right to model this account's asset mix (used by the 🧬 Portfolio scenario).</div>`;
  }
  return`<div class="acc-summary-box" id="acc-summary-${acc.id}">${rows}</div>`;
}

// ── Right column: the holdings editor (add / remove positions + allocation cue) ──
function renderHoldingsEditor(acc){
  const hs=Array.isArray(acc.holdings)?acc.holdings:[];
  const rowsHtml=hs.map(h=>renderHoldingRow(acc,h)).join('');
  const total=hs.reduce((s,h)=>s+(+h.allocationPct||0),0);
  const list=hs.length
    ?`<div class="holdings-list">${rowsHtml}</div>`
    :`<div class="holdings-empty">No positions yet. Add tickers (e.g. VOO, QQQ, BND) with an allocation %. Recognized tickers auto-fill illustrative return / volatility / expense-ratio you can edit.</div>`;
  const near100=Math.abs(total-100)<=0.5;
  const totalHtml=hs.length?`<div class="holdings-total ${near100?'ok':'warn'}" id="holdings-total-${acc.id}">
      <span>Allocation total</span>
      <strong>${total.toFixed(total%1?1:0)}%${near100?' ✓':' · aim for ~100%'}</strong>

  return`${list}${totalHtml}
    <button class="btn-add-holding" data-add-holding="${acc.id}">+ Add holding</button>
    <div class="holdings-disclaimer">Return / volatility / expense-ratio are <strong>illustrative long-run modeling estimates</strong> — not investment advice or forecasts. Long-run figures drive multi-decade projections; the optional live price (via Refresh) values a position today only.</div>`;
}

function renderHoldingRow(acc,h){
  const lib=(window.RIQ&&RIQ.Tickers)?RIQ.Tickers.lookup(h.ticker):null;

  // (filled on blur) and flagged visually so the user knows to review/adjust it.
  const estimated=!!(h.ticker&&!known);
  const asset=escHtml(h.assetClass||(lib?lib.assetClass:''));
  const cache=(window.RIQ&&RIQ.Tickers&&h.ticker)?RIQ.Tickers.cacheFor(h.ticker):null;
  const cacheSrc=cache&&cache.source?String(cache.source):'live';
  const priceTag=(cache&&isFinite(cache.price))
    ?`<span class="holding-asset-tag" style="color:var(--text-muted)" title="Live price as of ${escHtml(String(cache.asOf||'').slice(0,10))} (${escHtml(cacheSrc)}). Used to value the position today only — long-run return/vol drive the projection.">$${escHtml(String(cache.price))} · ${escHtml(String(cache.asOf||'').slice(0,10))}</span>`:'';
  const mini=(field,val,step,lbl)=>`<div class="holding-mini"><label>${lbl}</label><div class="input-wrap"><input type="number" step="${step}" data-numeric="1" data-acc-id="${acc.id}" data-holding-id="${h.id}" data-holding-field="${field}" value="${val==null||val===''?'':val}"><span class="input-suffix">%</span></div></div>`;
  return`<div class="holding-row${(h.ticker&&!known)?' unknown-ticker':''}" data-holding-row="${h.id}">
    <div class="holding-line1">
      <input type="text" class="field-input compact holding-ticker" placeholder="TICKER" value="${escHtml(h.ticker||'')}" data-acc-id="${acc.id}" data-holding-id="${h.id}" data-holding-field="ticker" title="${known?escHtml(lib.name):'Unrecognized ticker — filled with rough estimate assumptions you should review & adjust'}">
      <input type="text" class="field-input compact holding-name" placeholder="Name (optional)" value="${escHtml(h.name||'')}" data-acc-id="${acc.id}" data-holding-id="${h.id}" data-holding-field="name">
      <button class="btn-danger btn-xs holding-remove" data-remove-holding="${acc.id}::${h.id}" title="Remove holding">×</button>
    </div>
    <div class="holding-line2">
      <div class="holding-mini"><label>Alloc</label><div class="input-wrap holding-alloc-wrap"><input type="number" step="1" min="0" data-numeric="1" data-acc-id="${acc.id}" data-holding-id="${h.id}" data-holding-field="allocationPct" value="${h.allocationPct==null||h.allocationPct===''?'':h.allocationPct}"><span class="input-suffix">%</span></div></div>
      ${mini('expectedReturn',h.expectedReturn,0.1,'Return')}
      ${mini('volatility',h.volatility,0.1,'Vol')}
      ${mini('expenseRatio',h.expenseRatio,0.01,'ER')}
      ${asset?`<span class="holding-asset-tag${estimated?' is-estimate':''}" title="${estimated?'Rough best-guess estimate — please review and adjust. Recognized tickers auto-fill their real asset class & illustrative long-run figures.':'Asset class'}">${estimated?'⚠ ':''}${asset}</span>`:''}

// Status text for the global Refresh control (built-in vs updated <date>).
function holdingsRefreshStatusHtml(){
  const st=(window.RIQ&&RIQ.Tickers)?RIQ.Tickers.status():{fresh:false};
  // Count distinct tickers across all accounts for context
  const allTickers=[...new Set((accounts||[]).flatMap(a=>(a.holdings||[]).map(h=>h&&h.ticker).filter(Boolean)))];
  const holdingCount=allTickers.length;
  if(st&&st.fresh&&st.savedAt){
    const d=String(st.savedAt).slice(0,10);
    const cachedCount=st.count;
    const uncached=allTickers.filter(t=>{const c=RIQ.Tickers&&RIQ.Tickers.cacheFor(t);return!c;});
    const uncachedNote=uncached.length>0?` · <span style="color:var(--warning)">${uncached.length} not yet fetched — click Refresh</span>`:'';
    return `Prices updated ${d} · ${cachedCount} cached · ${holdingCount} holding${holdingCount===1?'':'s'} (${escHtml(st.source||'live')})${uncachedNote}`;
  }
  const live=!!(window.RIQ&&RIQ.Tickers&&RIQ.Tickers.liveSourceAvailable());
  return live
    ? `Using built-in long-run estimates for ${holdingCount} holding${holdingCount===1?'':'s'}. Refresh fetches live quotes via the Finnhub proxy.`
    : 'Using built-in long-run estimates (no live source). Set a Live data source below to enable live quotes from file://.';
}

// Attempt a live price/return refresh for ALL tickers held across every account
// (deduped inside RIQ.Tickers.refresh). Offline-safe: gracefully leaves built-in /
// estimated values in place and says why, in one concise status line.
function refreshHoldingPrices(){
  if(!(window.RIQ&&RIQ.Tickers)){return;}
  const tickers=[];
  (accounts||[]).forEach(a=>{(a.holdings||[]).forEach(h=>{if(h&&h.ticker)tickers.push(h.ticker);});});
  const btn=document.getElementById('holdings-refresh-btn');
  const status=document.getElementById('holdings-refresh-status');
  if(!tickers.length){if(status)status.textContent='Add holdings first, then Refresh to fetch live prices.';return;}
  const live=RIQ.Tickers.liveSourceAvailable();
  if(btn){btn.disabled=true;btn.textContent='↻ Refreshing…';}
  if(status)status.textContent=(live?'Fetching live quotes via the Finnhub proxy for ':'Attempting live quotes for ')+tickers.length+' ticker'+(tickers.length===1?'':'s')+'… (falls back to built-in / estimated if unavailable)';
  RIQ.Tickers.refresh(tickers,function(r){
    if(btn){btn.disabled=false;btn.textContent='↻ Refresh prices';}
    const total=(r&&r.total)||0,upd=(r&&r.updated)||0,today=new Date().toISOString().slice(0,10);
    if(upd>0){
      _applyLiveToEstimatedHoldings(); // pull real figures into previously-estimated rows
      showToast('Updated '+upd+' of '+total+' ticker'+(total===1?'':'s')+' from '+(r.source||'live'));
      if(status)status.textContent='Updated '+upd+' of '+total+' from '+(r.source||'live')+' · '+(total-upd>0?(total-upd)+' using built-in/estimated · ':'')+today;
    }else if(!live){
      showToast('No live source — using built-in & estimated values. Set a Live data source to enable live quotes.');
      if(status)status.textContent='No live source configured (file:// with no API base). Using built-in & estimated values for all '+total+' ticker'+(total===1?'':'s')+'.';
    }else{
      showToast('Live prices unavailable (rate limit / network / CORS) — using built-in & estimated values');
      if(status)status.textContent='Live data unavailable (rate limit / network / CORS). Using built-in & estimated values for all '+total+' ticker'+(total===1?'':'s')+'.';
    }
    // Repaint cards so any new live-price tags appear (only if still on Configure and no input focused).
    if(activeTab==='configure'){const f=document.activeElement;if(!(f&&f.tagName==='INPUT'))refreshAccCards();}
  });
}

// Pull successfully-fetched live figures into holdings that are currently on ESTIMATE
// assumptions (unknown tickers) and were NOT manually edited by the user. Guarded to a
// sane band so a noisy short-window sample never injects an absurd modeling assumption.
// Library-recognized tickers keep their long-run figures (the documented convention).
function _applyLiveToEstimatedHoldings(){
  if(!(window.RIQ&&RIQ.Tickers))return;
  let changed=false;
  (accounts||[]).forEach(a=>{(a.holdings||[]).forEach(h=>{
    if(!h||!h.ticker||!h.estimated||h.manualAssumptions)return;
    if(RIQ.Tickers.lookup(h.ticker))return; // became recognized somehow → leave to library
    const c=RIQ.Tickers.cacheFor(h.ticker);
    if(!c)return;
    if(isFinite(c.annReturn)&&c.annReturn>=-5&&c.annReturn<=25){h.expectedReturn=+c.annReturn;changed=true;}
    if(isFinite(c.annVol)&&c.annVol>=3&&c.annVol<=70){h.volatility=+c.annVol;changed=true;}
  });});
  if(changed){saveState();recalculate();}
}

// Best-effort SINGLE-symbol background fetch fired when an unknown ticker is entered.
// Silent by design: succeeds only where the network/CORS allow (e.g. hosted on Vercel);
// offline / from file:// it simply no-ops and the estimate stays. Never blocks the UI.
function _bgFetchTicker(sym){
  if(!(window.RIQ&&RIQ.Tickers)||!sym)return;
  try{
    RIQ.Tickers.refresh([sym],function(r){
      if(!(r&&r.updated>0))return;
      _applyLiveToEstimatedHoldings();
      const status=document.getElementById('holdings-refresh-status');
      if(status)status.innerHTML=holdingsRefreshStatusHtml();
      if(activeTab==='configure'){const f=document.activeElement;if(!(f&&f.tagName==='INPUT'))refreshAccCards();}
    });
  }catch(e){/* offline / blocked — keep the estimate */}
}

// Live in-place refresh of an account's allocation-total cue + summary box, WITHOUT re-rendering
// the card (so the focused holdings input is never destroyed mid-keystroke — focus-guard convention).
function _updateHoldingLive(acc){
  const hs=Array.isArray(acc.holdings)?acc.holdings:[];
  const total=hs.reduce((s,h)=>s+(+h.allocationPct||0),0);
  const tEl=document.getElementById('holdings-total-'+acc.id);
  if(tEl){
    const near100=Math.abs(total-100)<=0.5;
    tEl.className='holdings-total '+(near100?'ok':'warn');
    const st=tEl.querySelector('strong');
    if(st)st.textContent=total.toFixed(total%1?1:0)+'%'+(near100?' ✓':' · aim for ~100%');
  }
  const sEl=document.getElementById('acc-summary-'+acc.id);
  if(sEl)sEl.outerHTML=renderAccSummary(acc);
}

// Focus-safe in-place refresh of all holdings UI after a live update: recompute each
// account's summary/total in place, then repaint the account cards to surface new live-price
// tags ONLY when the user isn't mid-typing (focus-guard convention). Never a full page re-render.
function _refreshHoldingsInPlace(){
  (accounts||[]).forEach(a=>{try{_updateHoldingLive(a);}catch(e){}});
  if(activeTab==='configure'){
    const f=document.activeElement;
    if(!(f&&f.tagName==='INPUT'))refreshAccCards();
  }
  const st=document.getElementById('holdings-refresh-status');
  if(st)st.innerHTML=holdingsRefreshStatusHtml();
}

// ── AUTO-REFRESH ON LOAD (once per session) ──────────────────────────────────
// After the initial render, if a live source is available (hosted, or an override API base
// set for a file:// copy), fetch quotes for all currently-held tickers — deduped, batched,
// time-sliced inside RIQ.Tickers.refresh so the UI never freezes — then update the cache
// (retireiq_tickers_v1 w/ timestamp) and refresh the holdings rows in place (focus-safe).
// A sessionStorage flag ensures it runs at most once per browser session, not per re-render.
// Fully offline-safe: with no live source it no-ops silently and estimates remain.
function autoRefreshHoldingsOnLoad(){
  try{
    if(!(window.RIQ&&RIQ.Tickers))return;
    if(!RIQ.Tickers.liveSourceAvailable())return;            // file:// w/o override → keep estimates silently
    // Collect all unique tickers across accounts
    const allTickers=[...new Set((accounts||[]).flatMap(a=>(a.holdings||[]).map(h=>h&&h.ticker).filter(Boolean)))];
    if(!allTickers.length)return;
    // Always refresh uncached tickers; for cached ones, use session guard to avoid hammering the API
    const uncached=allTickers.filter(t=>!RIQ.Tickers.cacheFor(t));
    const alreadyRan=!!sessionStorage.getItem('retireiq_autorefresh_v1');
    if(alreadyRan&&!uncached.length)return; // session already ran + nothing new → skip
    sessionStorage.setItem('retireiq_autorefresh_v1','1');
    // Prioritize uncached tickers; include all if first run this session
    const tickers=alreadyRan?uncached:allTickers;
    if(!tickers.length)return; // nothing held (e.g. default plan) → nothing to fetch → estate unchanged
    const status=document.getElementById('holdings-refresh-status');
    if(status&&activeTab==='configure')status.textContent='Auto-refreshing live prices for '+tickers.length+' ticker'+(tickers.length===1?'':'s')+'…';
    // SECURITY-REVIEW: initiates the same defensive proxy fetch as the manual refresh — the
    // untrusted JSON response is validated/bounded and NEVER eval'd; the secret key stays
    // server-side. Batched + time-sliced by RIQ.Tickers.refresh so the UI stays responsive.
    RIQ.Tickers.refresh(tickers,function(r){
      const upd=(r&&r.updated)||0;
      if(upd>0){
        _applyLiveToEstimatedHoldings();  // pulls trailing return/vol into estimated (unknown) rows; recognized keep long-run figures
        _refreshHoldingsInPlace();        // focus-safe in-place row/summary refresh
      }else{
        const st=document.getElementById('holdings-refresh-status');
        if(st&&activeTab==='configure')st.innerHTML=holdingsRefreshStatusHtml();
      }
    });
  }catch(e){/* never break load */}
}

function initSectionCardDragDrop(){
  const container=document.getElementById('configure-sections');
  if(!container)return;

  let dragEl=null;
  let dropOccurred=false;
  let touchGhost=null;
  let touchOffX=0,touchOffY=0;
  let _lastSectionDragOver=0; // throttle dragover to ~20fps

  function saveOrder(){
    const order=[...container.querySelectorAll('.config-card[data-section-id]')]
      .map(c=>c.dataset.sectionId);
    localStorage.setItem('configSectionOrder',JSON.stringify(order));
  }

  function clearIndicators(){
    container.querySelectorAll('.drag-over-before,.drag-over-after')
      .forEach(el=>{el.classList.remove('drag-over-before','drag-over-after');});
  }

  function insertPos(card,clientY){
    const r=card.getBoundingClientRect();
    return clientY<r.top+r.height/2?'before':'after';
  }

  /* Allow drops in the container gaps */
  container.addEventListener('dragover',e=>e.preventDefault());

  container.querySelectorAll('.config-card[data-section-id]').forEach(card=>{
    const handle=card.querySelector(':scope>.config-card-header>.drag-handle');
    if(!handle)return;

    /* ── HTML5 DnD (mouse) ── */
    /* Track whether pointerdown landed on the handle; e.target in dragstart is
       always the draggable element itself (not the child under the pointer), so
       we cannot use e.target there — we capture it here instead. */
    let dragFromHandle=false;
    card.addEventListener('pointerdown',e=>{dragFromHandle=!!e.target.closest('.drag-handle');});
    card.addEventListener('dragstart',e=>{
      if(!dragFromHandle){e.preventDefault();return;}
      dragEl=card;
      dropOccurred=false;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',card.dataset.sectionId);
      requestAnimationFrame(()=>card.classList.add('dragging'));
    });

    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      dragEl=null;
      clearIndicators();
      if(dropOccurred){
        dropOccurred=false;
        /* Defer re-render so dragend fully completes first */
        setTimeout(()=>{renderConfigure();updateConfigPreviews();},0);
      }
    });

    card.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!dragEl||card===dragEl)return;
      e.dataTransfer.dropEffect='move';
      const now=Date.now();if(now-_lastSectionDragOver<50)return;_lastSectionDragOver=now;
      clearIndicators();
      card.classList.add(insertPos(card,e.clientY)==='before'?'drag-over-before':'drag-over-after');
    });

    card.addEventListener('dragleave',e=>{
      if(!card.contains(e.relatedTarget))
        card.classList.remove('drag-over-before','drag-over-after');
    });

    card.addEventListener('drop',e=>{
      e.preventDefault();
      if(!dragEl||card===dragEl)return;
      const pos=insertPos(card,e.clientY);
      if(pos==='before')container.insertBefore(dragEl,card);
      else card.after(dragEl);
      clearIndicators();
      saveOrder();
      dropOccurred=true;
    });

    /* ── Touch ── */
    handle.addEventListener('touchstart',e=>{
      const t=e.touches[0];
      dragEl=card;
      dropOccurred=false;
      const r=card.getBoundingClientRect();
      touchOffX=t.clientX-r.left;
      touchOffY=t.clientY-r.top;
      touchGhost=card.cloneNode(true);
      touchGhost.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:.75;pointer-events:none;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:none;border-radius:12px;`;
      document.body.appendChild(touchGhost);
      card.classList.add('dragging');
      e.preventDefault();
    },{passive:false});

    handle.addEventListener('touchmove',e=>{
      if(!dragEl||!touchGhost)return;
      const t=e.touches[0];
      touchGhost.style.left=(t.clientX-touchOffX)+'px';
      touchGhost.style.top=(t.clientY-touchOffY)+'px';
      touchGhost.style.pointerEvents='none';
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const target=el&&el.closest('.config-card[data-section-id]');
      clearIndicators();
      if(target&&target!==dragEl)
        target.classList.add(insertPos(target,t.clientY)==='before'?'drag-over-before':'drag-over-after');
      e.preventDefault();
    },{passive:false});

    handle.addEventListener('touchend',e=>{
      if(touchGhost){touchGhost.remove();touchGhost=null;}
      if(!dragEl)return;
      const t=e.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const target=el&&el.closest('.config-card[data-section-id]');
      if(target&&target!==dragEl){
        const pos=insertPos(target,t.clientY);
        if(pos==='before')container.insertBefore(dragEl,target);
        else target.after(dragEl);
        saveOrder();
        dropOccurred=true;
      }
      dragEl.classList.remove('dragging');
      dragEl=null;
      clearIndicators();
      if(dropOccurred){
        dropOccurred=false;
        setTimeout(()=>{renderConfigure();updateConfigPreviews();},0);
      }
      e.preventDefault();
    },{passive:false});
  });
}

  }
  irsHtml+=`</tbody></table></div><button class="btn btn-muted btn-xs" style="margin-top:8px" onclick="resetIrsOv()">Reset IRS defaults</button>`;
  return ovHtml+irsHtml;
}

  // Detail cols: Alloc, Total Portfolio, Contributions, [Taxable↓, 401k↓, TradIRA↓, Roth↓ when !showAllCols], Gain%, Gain$, SS Income, Total Spending, Portfolio Draw, Draw Source, RMD Reinvest, Depletes, Net Change, SWR, Fed Tax, State Tax, Conv. Tax, Rebal.Tax, Net Cash, Convert $, Strategy
  const hasGlide=(state.glidePath||'off')!=='off';
  // Breakdown sub-columns (↓ contrib columns interleaved with balance columns in non-showAllCols mode)
  const breakdownCols=!showAllCols?((hasTaxable?1:0)+(has401k?1:0)+(hasTradIRA?1:0)+(hasRoth?1:0)):0;
  const totalCols=baseCols+2+accCols+breakdownCols+2+3+(hasSS?1:0)+(hasGlide?1:0)+3+11+1+(showBaseCompare?2:0); // +2 for Salary+Contrib%

  // Strategy label color helper
  function stratColor(lbl){
    if(lbl.includes('SS Covers'))return'var(--success)';
    if(lbl.includes('Roth Draw'))return'var(--danger)';
    if(lbl.includes('RMD Due'))return'var(--orange)';
    if(lbl.includes('RMD Surplus'))return'var(--purple)';
    if(lbl.includes('Convert'))return'var(--purple)';
    if(lbl.includes('Pre-Tax'))return'#f59e0b';
    if(lbl.includes('Taxable'))return'#4a9eff';
    return'var(--text-muted)';
  }
  // Depletion status color helper
  function depColor(dep){
    if(dep.includes('🔴'))return'var(--danger)';
    if(dep.includes('⚠'))return'var(--orange)';
    if(dep.includes('✅'))return'var(--success)';
    if(dep.includes('Pre-Tax'))return'#f59e0b';
    if(dep.includes('Taxable'))return'#4a9eff';
    return'var(--text-muted)';
  }

  // ── Sustainability Insight callout ──
  if(_model.totals){
    const T=_model.totals;
    const sc=T.sustainabilityScore||0;
    const pct=Math.round(sc*100);
    const avgGain=T.avgMarketGainRetirement||0;
    const avgNeed=_model.rows.filter(r=>r.phase==='Retirement').reduce((s,r,_,a)=>s+(r.netDraw||0)/a.length,0);
    const endAge=state.lifeExpectancy;
    const endVal=_model.meta.estateAtEnd||0;
    const scColor=sc>=.8?'var(--success)':sc>=.5?'var(--accent)':'var(--orange)';
    const wdLabel={sustain:'🌱 Sustain Portfolio',fixed:'📅 Fixed Spending',maximize:'📈 Maximize Income'}[state.withdrawalMode]||'';
    html+=`<div style="margin:0 0 16px;padding:16px 20px;background:var(--surface2);border:1px solid var(--border);border-left:4px solid ${scColor};border-radius:10px">
      <div style="font-weight:700;margin-bottom:8px;color:var(--text)">💡 Sustainability Insight <span style="font-size:.8rem;font-weight:400;color:var(--text-muted);margin-left:8px">${wdLabel}</span></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;font-size:.88rem">
        <div>📈 Avg market gain in retirement: <strong style="color:var(--success)">${displayMoney(avgGain,_model.rows.length)}/yr</strong></div>
        <div>💸 Avg net need after SS: <strong>${displayMoney(Math.round(avgNeed),_model.rows.length)}/yr</strong></div>
        <div style="color:${scColor}">📊 <strong>${pct}%</strong> of retirement years: portfolio grows despite withdrawals (Net Change ≥ 0)</div>
        <div>🏦 Portfolio grows to <strong style="color:var(--accent)">${displayMoney(endVal,_model.rows.length)}</strong> by age ${endAge}</div>
      </div>
    </div>`;
  }
  html+=`<div class="tbl-wrap"><table class="data">
  <thead><tr>
    <th style="text-align:left;min-width:46px">Age</th><th style="text-align:left">Year</th><th style="text-align:left;min-width:90px">Phase</th>
    <th style="min-width:110px;color:var(--text)" title="Effective salary this year (click a cell to override for that year and beyond)">Salary</th>
    <th style="min-width:70px;color:var(--accent)" title="401(k) deferral % this year. Click to override for a specific year.">Contrib %</th>
    ${hasGlide?'<th style="min-width:70px;color:var(--text-muted)" title="Asset allocation: Equity% / Bond% / Cash%">Alloc</th>':''}
    ${showAllCols
      ? accounts.map(a=>{const ow=a.owner||'primary';const owTag=hasSpouseOwner()?`<span style="font-size:9px;font-weight:700;margin-left:3px;color:${ownerColor(ow)}">(${ownerLabel(ow)})</span>`:'';return`<th style="min-width:110px"><span class="th-acc-dot" style="background:${a.color}"></span>${a.name.length>14?a.name.substring(0,13)+'…':escHtml(a.name)}${owTag}</th>`;}).join('')
      : `${hasTaxable?'<th class="th-taxable" style="min-width:100px">Taxable</th>':''}
         ${hasTaxable?'<th style="min-width:80px;color:rgba(74,158,255,.7);font-size:11px;font-weight:400" title="Contributions to taxable brokerage accounts this year">↓ Taxable</th>':''}
         ${has401k?'<th class="th-pretax" style="min-width:100px;color:#f59e0b" title="Workplace 401(k) accounts balance (year-end)">401(k)</th>':''}
         ${has401k?'<th style="min-width:80px;color:rgba(245,166,35,.65);font-size:11px;font-weight:400" title="Employee 401(k) contributions + employer match this year">↓ 401(k)</th>':''}
         ${hasTradIRA?'<th class="th-tradira" style="min-width:100px;color:#e8a020" title="Traditional IRA accounts balance (year-end)">Trad IRA</th>':''}
         ${hasTradIRA?'<th style="min-width:80px;color:rgba(232,160,32,.65);font-size:11px;font-weight:400" title="Contributions to Traditional IRA accounts this year">↓ Trad IRA</th>':''}
         ${hasRoth?'<th class="th-roth" style="min-width:100px">Roth</th>':''}
         ${hasRoth?'<th style="min-width:80px;color:rgba(74,222,128,.65);font-size:11px;font-weight:400" title="Contributions to Roth IRA accounts this year">↓ Roth</th>':''}
         ${hasHSA?'<th class="th-hsa" style="min-width:90px">HSA</th>':''}`
    }
    <th style="min-width:110px;color:var(--text);font-weight:600">Total Portfolio</th>
    <th style="min-width:100px;color:var(--text-muted);font-size:11px;font-weight:400" title="Total new money contributed to all accounts this year (employee 401k + employer match + Roth IRA + other contributions)">Contributions</th>
    <th style="min-width:75px;color:var(--success)" title="${state.useHistoricalReturns?'Actual S&P 500 total return for mapped historical year, blended with glide path':'Effective blended growth rate this year (glide-path adjusted). Negative in crash years.'}">${state.useHistoricalReturns?'<span style="font-size:10px">📈</span> Gain %':'Gain %'}</th>
    <th style="min-width:95px;color:var(--success)" title="Pure portfolio appreciation (market returns only, excluding contributions and withdrawals). Shows in both accumulation and retirement.">Gain $</th>
    ${hasSS?'<th style="color:var(--success);min-width:90px">SS Income</th>':''}
    <th style="min-width:95px" title="Inflation-adjusted household spending budget for this year (from lifestyle base). This is what the household spends regardless of funding source.">Total Spending</th>
    <th style="min-width:90px" title="Amount drawn from investment accounts only. $0 means SS covers the full budget — portfolio grows untouched.">Portfolio Draw</th>
    <th class="draw-source-th" style="min-width:130px" title="Specific account the portfolio draw comes from this year">Draw Source</th>
    <th style="min-width:85px;color:var(--success)" title="Excess RMD reinvested back to taxable brokerage (RMD taken but not needed for spending)">RMD Reinvest</th>
    <th style="min-width:85px">Depletes</th>
    <th style="min-width:90px" title="Net portfolio change: market gain minus portfolio draw. Green (+) = portfolio grew despite spending (sustainable). Red (-) = drawing down.">Net Change</th>
    <th style="min-width:60px" title="Safe Withdrawal Rate — portfolio draw as % of portfolio value. Green ≤4%, amber 4–5%, red >5%">SWR</th>
    <th style="min-width:80px">Fed Tax</th>
    <th style="min-width:80px">State Tax</th>
    <th style="min-width:85px;color:var(--orange)" title="Incremental federal income tax on Roth conversion amount. Strategic cost paid now to reduce future RMDs.">Conv. Tax</th>
    ${hasGlide?'<th style="min-width:80px;color:var(--text-muted)" title="Capital gains tax triggered when rebalancing equities → bonds in taxable accounts. Tax-advantaged accounts rebalanced first.">Rebal.Tax</th>':''}
    <th style="min-width:90px;color:var(--success)">Net Cash</th>
    <th style="min-width:80px;color:var(--purple)">Convert $</th>
    <th style="min-width:110px">Strategy</th>
    ${showBaseCompare?'<th style="color:var(--text-muted);min-width:100px">Base Portfolio</th><th style="color:var(--text-muted)">Δ vs Base</th>':''}
  </tr></thead>
  <tbody id="proj-tbody">`;

  // Pre-compute for both-mode detection (used in phase column labels)
  const renderCrashes=state.crashMasterEnabled?(state.crashes||[]).filter(c=>c.enabled&&c.crashAge!=null):[];
  const hasBothModes=state.useHistoricalReturns&&renderCrashes.length>0;
  // Pre-compute lump sum notes (with note field set) by calendar year + pool type for cell tooltips
  const _lumpTipsByYrPool={};
  accounts.forEach(acc=>{
    (acc.contributions||[]).forEach(s=>{
      if(s.frequency!=='lump_sum'||!s.note||!s.note.trim()||!s.startDate)return;
      const yr=parseInt(s.startDate.substring(0,4));
      const pool=['taxable','investment'].includes(acc.type)?'taxable':acc.type==='roth'?'roth':acc.type==='401k'?'k401':'pretax';
      if(!_lumpTipsByYrPool[yr])_lumpTipsByYrPool[yr]={};
      if(!_lumpTipsByYrPool[yr][pool])_lumpTipsByYrPool[yr][pool]=[];
      _lumpTipsByYrPool[yr][pool].push('\uD83D\uDCB0 One-time: '+fmt(s.amount||0)+' \u2014 '+s.note.trim());
    });
  });
  // Pre-compute goal/event notes per age for the Phase-column marker (consistent with lump-sum tooltips)
  const _goalNotesByAge={};
  if(window.RIQ&&RIQ.Goals){
    const _gs=RIQ.Goals.active();
    if(_gs.length){
      rows.forEach(row=>{
        _gs.forEach(g=>{
          const t=RIQ.Goals.TYPES[g.type];if(!t)return;
          if(!RIQ.Goals.appliesAt(g,row.age))return;
          const yft=row.age-curAge;
          const nom=RIQ.Goals.nominal(g,yft,+state.inflationRate||0);
          const icon=t.flow==='income'?'\u25B2':t.flow==='target'?'\u25C6':'\u25BC';
          const sign=t.flow==='income'?'+':t.flow==='target'?'':'\u2212';
          (_goalNotesByAge[row.age]=_goalNotesByAge[row.age]||[]).push(`${icon} ${g.label||t.label}: ${sign}${displayMoney(nom,yft)}${t.flow==='income'&&g.taxable?' (taxable)':''}`);
        });
      });
    }
  }
  // Collect each row's HTML into an array so we can render first 20 rows immediately
  // and lazily append the rest in a requestAnimationFrame (avoids 1000+ cell DOM layout jank).
  const _rowHtmlParts=[];
  let lastPhase=null;
  rows.forEach(row=>{
    let _rp=''; // per-row HTML accumulator
    if(row.phase==='Retirement'&&lastPhase!=='Retirement'){
      _rp+=`<tr class="row-transition"><td colspan="${totalCols}">━━━  RETIREMENT AT AGE ${state.retireAge} — Contributions Stop · Withdrawals Begin  ━━━</td></tr>`;
    }
    const yrs=row.age-curAge,D=(v)=>displayMoney(v,yrs);
    const phaseColor=row.phase==='Building'?'var(--success)':row.phase==='Pause'?'var(--warning)':'var(--accent)';
    const phaseIcon=row.phase==='Building'?'▲':row.phase==='Pause'?'⛵':'▼';
    const baseCls=row.phase==='Pause'?'row-coast':row.phase==='Retirement'?'row-retire':row.isRuined?'row-ruin':'';
    // Crash + historical down-year row styling
    const rowStyle=row.isCrashYear?'style="background:rgba(239,68,68,0.1);border-left:3px solid var(--danger)"'
                  :row.isHistoricalDownYear?'style="background:rgba(239,68,68,0.07);border-left:3px solid rgba(239,68,68,.5)"'
                  :row.isRecoveryYear?'style="background:rgba(245,158,11,0.06);border-left:3px solid var(--orange)"':'';
    // Phase label: when both History Replay + Crash Simulator are active, show combined indicators
    let crashLabel='';
    if(row.isCrashYear){
      const activeCrashes=(row.activeCrashIds||[]).map(id=>(state.crashes||[]).find(c=>c.id===id)).filter(Boolean);
      if(hasBothModes&&row.historicalYear!=null){
        // Show crash override label + which S&P year was replaced
        crashLabel=activeCrashes.map(c=>`💥 ${c.label||'Crash'} (-${c.drop}%)`).join(' ')+`<span style="font-size:9px;color:var(--text-muted);display:block">📈 ${row.historicalYear} (${row.historicalReturnPct>0?'+':''}${row.historicalReturnPct.toFixed(1)}%) overridden</span>`;
      } else {
        crashLabel=activeCrashes.map(c=>`📉 ${c.label||'Crash'}`).join(' ');
      }
    }
    let recLabel='';
    if(row.isRecoveryYear){
      if(hasBothModes&&row.historicalYear!=null){
        // Show recovery label + which S&P year was skipped
        recLabel=`<span style="font-size:10px;color:var(--orange)">🔄 Recovery</span><span style="font-size:9px;color:var(--text-muted);display:block">📈 ${row.historicalYear}: ${row.historicalReturnPct>0?'+':''}${row.historicalReturnPct.toFixed(1)}% skipped</span>`;
      } else {
        recLabel='<span style="font-size:10px;color:var(--orange)">↗ Recovery</span>';
      }
    }
    // Normal S&P history label: suppress during crash/recovery years when both modes active (already shown above)
    const histLabel=(!hasBothModes||(!row.isCrashYear&&!row.isRecoveryYear))&&row.historicalYear!=null?`<span style="font-size:9px;color:${row.historicalReturnPct<0?'var(--danger)':'var(--text-muted)'};display:block;white-space:nowrap">${row.historicalCycle>0?'↺ ':'📈 '}${row.historicalYear} (${row.historicalReturnPct>0?'+':''}${row.historicalReturnPct.toFixed(1)}%)</span>`:'';
    const _goalNotes=_goalNotesByAge[row.age];
    const goalMarker=_goalNotes?`<span class="goal-marker" data-strat-tip="${escHtml(_goalNotes.join('\n'))}" style="margin-left:5px;color:var(--accent);cursor:help;font-size:11px">🎯${_goalNotes.length>1?'×'+_goalNotes.length:''}</span>`:'';
    const phaseTd=`<td style="text-align:left"><span class="phase-badge" style="color:${phaseColor}">${phaseIcon} ${row.phase==='Building'?'Building':row.phase==='Pause'?'Pause':'Retirement'}</span>${goalMarker}${crashLabel?`<span style="font-size:10px;color:var(--danger);display:block">${crashLabel}</span>`:''}${recLabel}${histLabel}</td>`;
    // Strategy cell
    const sl=row.strategyLabel||'—';
    const sn=row.strategyNote||'';
    const stratCell=`<td class="strategy-cell" style="color:${stratColor(sl)}" data-strat-tip="${escHtml(sn)}">${sl}</td>`;
    // Alloc cell (equity%/bond%/cash%)
    const allocCell=hasGlide?(()=>{
      const eq=row.equityPct||100,bnd=row.bondPct||0,csh=row.cashPct||0;
      const c=eq>=80?'var(--success)':eq>=60?'var(--orange)':'var(--text-muted)';
      const tip=row.effectiveCrashDropPct>0?` · crash → -${row.effectiveCrashDropPct}%`:'';
      return`<td style="font-size:.78rem;color:${c};white-space:nowrap" title="${eq}% equity, ${bnd}% bonds, ${csh}% cash${tip}">${eq}/${bnd}/${csh}</td>`;
    })():'';
    // Rebal tax cell
    const rebalTaxAmt=row.rebalanceTax||0;
    const rebalTaxCell=hasGlide?(rebalTaxAmt>0
      ?`<td style="color:var(--orange);font-size:.82rem" title="${escHtml(row.rebalanceNote||'')}">${D(rebalTaxAmt)}</td>`
      :'<td style="color:var(--text-faint)">—</td>'):'';
    // Contributions cell (accumulation only)
    const contribAmt=row.totalContributions||0;
    const contribCell=contribAmt>0
      ?`<td style="color:var(--text-muted)" title="Employee contributions + employer match this year">${D(contribAmt)}</td>`
      :'<td style="color:var(--text-faint)">—</td>';
    // Per-pool contribution breakdown cells
    const txC=row.taxableContrib||0,ptC=row.preTaxContrib||0,rC=row.rothContrib||0;
    const c401k=row.contrib401k||0,cTradIRA=row.contribTradIRA||0;
    // Contrib sub-columns — rendered next to their balance column when !showAllCols; hidden in showAllCols (per-account) mode
    const rmdInTax=row.rmdReinvestedInTaxable||0;
    const _lumpYr=_lumpTipsByYrPool[row.yr]||{};
    const taxableContribTip=[rmdInTax>0
      ?(row.taxableContrib>rmdInTax?`Regular deposits: ${D(txC-rmdInTax)}\nRMD reinvested: +${D(rmdInTax)} (pre-tax → taxable)\nTotal: ${D(txC)}`:`RMD reinvested: ${D(rmdInTax)} (forced pre-tax → taxable)`)
      :'',...(_lumpYr.taxable||[])].filter(Boolean).join('\n');
    const taxableContribCell=!showAllCols&&hasTaxable?(txC>0?`<td style="color:rgba(74,158,255,.8);font-size:.82rem${rmdInTax>0?';border-left:2px solid var(--orange)':''}" data-strat-tip="${escHtml(taxableContribTip)}">${D(txC)}${rmdInTax>0?'<span style="font-size:9px;color:var(--orange);margin-left:2px">RMD</span>':''}</td>`:'<td style="color:var(--text-faint);font-size:.82rem">—</td>'):'';
    const _401kTip=[row.employerMatch>0?`Employee: ${D(c401k-(row.employerMatch||0))}\nEmployer match: ${D(row.employerMatch||0)}\nTotal: ${D(c401k)}`:'',...(_lumpYr.k401||[])].filter(Boolean).join('\n');
    const contrib401kCell=!showAllCols&&has401k?(c401k>0?`<td style="color:rgba(245,166,35,.8);font-size:.82rem" data-strat-tip="${escHtml(_401kTip)}">${D(c401k)}</td>`:'<td style="color:var(--text-faint);font-size:.82rem">—</td>'):'';
    const _pretaxTip=(_lumpYr.pretax||[]).join('\n');
    const contribTradIRACell=!showAllCols&&hasTradIRA?(cTradIRA>0?`<td style="color:rgba(232,160,32,.8);font-size:.82rem"${_pretaxTip?` data-strat-tip="${escHtml(_pretaxTip)}"`:''} >${D(cTradIRA)}</td>`:'<td style="color:var(--text-faint);font-size:.82rem">—</td>'):'';
    const _rothTip=(_lumpYr.roth||[]).join('\n');
    const rothContribCell=!showAllCols&&hasRoth?(rC>0?`<td style="color:rgba(74,222,128,.8);font-size:.82rem"${_rothTip?` data-strat-tip="${escHtml(_rothTip)}"`:''} >${D(rC)}</td>`:'<td style="color:var(--text-faint);font-size:.82rem">—</td>'):'';
    // Gain % cell (both phases; negative = crash)
    const gainPct=row.effectiveRate??0;
    const gainPctColor=gainPct<0?'var(--danger)':gainPct===0?'var(--text-faint)':gainPct>=8?'var(--success)':gainPct>=5?'var(--orange)':'var(--text-muted)';
    const gainPctCell=`<td style="color:${gainPctColor};font-weight:600" title="${row.isCrashYear?'Includes crash drop — net portfolio return':'Effective blended growth rate this year'}">${gainPct.toFixed(1)}%</td>`;
    // Gain $ cell (both phases)
    const mgAmt=row.marketGain||0;
    const mgColor=mgAmt>=0?'var(--success)':'var(--danger)';
    const mktGainCell=`<td style="color:${mgColor}">${mgAmt!==0?(mgAmt<0?'-':'')+D(Math.abs(mgAmt)):'—'}</td>`;
    const dep=row.phase==='Retirement'?(row.depletionStatus||'—'):'—';
    const depCell=`<td class="dep-cell" style="color:${depColor(dep)}">${dep}</td>`;
    const fedTaxAmt=row.fedTax||0;
    const fedTaxTip=(()=>{
      if(row.phase!=='Retirement'||!fedTaxAmt)return'';
      const fsLabels={single:'Single',mfj:'Married Filing Jointly',mfs:'Married Filing Separately',hoh:'Head of Household'};
      const totalInc=(row.totalSS||0)+(row.annualDraw||0);
      const effRate=totalInc>0?((fedTaxAmt/totalInc)*100).toFixed(1):'0.0';
      return`Filing: ${fsLabels[state.filingStatus||'mfj']||'MFJ'}\nStd deduction: ${D(row.fedStdDed||0)}\nTaxable income: ${D(row.fedTaxableInc||0)}\nEff. rate: ${effRate}% (Fed Tax ÷ Total Income)`;
    })();
    const fedTaxCell=row.phase==='Retirement'&&fedTaxAmt>0?`<td class="${fedTaxAmt>20000?'est-tax-high':''}" style="color:${fedTaxAmt>20000?'var(--orange)':'var(--text-muted)'}"${fedTaxTip?` title="${escHtml(fedTaxTip)}"`:''} data-strat-tip="${escHtml(fedTaxTip)}">${D(fedTaxAmt)}</td>`:'<td>—</td>';
    const stTaxAmt=row.stateTax||0;
    const stTaxCell=row.phase==='Retirement'&&stTaxAmt>0?`<td style="color:var(--text-muted)">${D(stTaxAmt)}</td>`:'<td>—</td>';
    const convTaxAmt=row.conversionTax||0;
    const convTaxCell=row.phase==='Retirement'&&convTaxAmt>0
      ?`<td style="color:var(--orange)" title="Tax paid now to convert pre-tax → Roth. Reduces future RMDs and estate tax burden.">${D(convTaxAmt)}</td>`
      :'<td style="color:var(--text-muted)">—</td>';
    const nc=row.netCash||0;
    const ncColor=nc>=state.lifestyleBase?'var(--success)':nc>=state.lifestyleBase*0.8?'var(--warning)':'var(--danger)';
    const netCashCell=row.phase==='Retirement'?`<td style="color:${ncColor};font-weight:600">${D(nc)}</td>`:'<td>—</td>';
    const convAmt=row.conversionAmount||0;
    const convLbl=row.conversionLabel||'—';
    const convLblColor=convLbl==='💡 Post-Crash'?'var(--orange)':convLbl==='⏸ Paused'?'var(--text-faint)':'var(--purple)';
    const convCell=row.phase==='Retirement'
      ?(convAmt>0
        ?`<td class="conv-cell" style="color:${convLblColor}" title="${convLbl}">${convLbl} ${D(convAmt)}</td>`
        :(convLbl!=='—'?`<td style="color:${convLblColor};font-size:.82rem">${convLbl}</td>`:'<td style="color:var(--text-faint)">—</td>'))
      :'<td style="color:var(--text-faint)">—</td>';
    const rmdReinvAmt=row.rmdReinvested||0;
    const rmdReinvestCell=row.phase==='Retirement'&&rmdReinvAmt>0
      ?`<td style="color:var(--success)" data-strat-tip="Forced RMD beyond spending need — transferred pre-tax → taxable brokerage. Shows in Taxable ↓ column.">+${D(rmdReinvAmt)}<span style="font-size:10px;color:var(--orange);margin-left:3px">→ Taxable</span></td>`
      :'<td style="color:var(--text-faint)">—</td>';
    // Total Spending: use standard D() — lifestyleDraw is nominal (inflated from today), D() deflates it back
    // In Today's $ mode: D(lifestyleDraw) = lifestyleBase (constant), because inflation is fully undone
    const totalSpendCell=row.phase==='Retirement'
      ?`<td style="color:var(--text);font-weight:500">${D(row.lifestyleDraw||0)}</td>`
      :'<td style="color:var(--text-faint)">—</td>';
    // Portfolio Draw = what actually came OUT of accounts (explicit $0 when SS covers all — never —)
    const annDrawAmt=row.annualDraw||0;
    const portDrawColor=annDrawAmt===0&&row.phase==='Retirement'?'var(--success)':row.belowFloor?'var(--orange)':annDrawAmt>0?'var(--text)':'var(--text-faint)';
    const portDrawCell=row.phase==='Retirement'
      ?`<td style="color:${portDrawColor};font-weight:500">${annDrawAmt>0?D(annDrawAmt):'$0'}${row.belowFloor?'<span title="Portfolio below safety floor — draw reduced" style="font-size:10px;color:var(--orange);margin-left:3px">⚠</span>':''}</td>`
      :'<td style="color:var(--text-faint)">—</td>';
    // Draw Source cell — specific account the portfolio draw comes from this year
    const drawSrcAcc=row.primaryDrawAccId?accounts.find(a=>a.id===row.primaryDrawAccId):null;
    const drawSourceCell=row.phase==='Retirement'&&drawSrcAcc&&(row.annualDraw||0)>0
      ?`<td class="draw-source-cell" style="white-space:nowrap"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${drawSrcAcc.color};margin-right:4px;vertical-align:middle"></span><span style="color:var(--text);font-size:11px">${escHtml(drawSrcAcc.name.length>15?drawSrcAcc.name.substring(0,14)+'…':drawSrcAcc.name)}</span></td>`
      :(row.phase==='Retirement'?`<td class="draw-source-cell" style="color:var(--success);font-size:11px">✅ SS Covers</td>`:'<td class="draw-source-cell" style="color:var(--text-faint)">—</td>');
    // Net Change cell — marketGain minus portfolioDraw; positive = portfolio grew (sustained)
    const netChg=row.netPortfolioChange||0;
    const netChangeCell=row.phase==='Retirement'
      ?`<td style="color:${netChg>=0?'var(--success)':'var(--danger)'};font-weight:600" title="${netChg>=0?'Portfolio grew despite spending (sustainable)':'Drawing down portfolio'}">${netChg>=0?'+':'-'}${D(Math.abs(netChg))}</td>`
      :'<td style="color:var(--text-faint)">—</td>';
    // SWR cell
    const swrVal=row.swr||0;
    const swrColor=swrVal<=0?'var(--text-faint)':swrVal<=4?'var(--success)':swrVal<=5?'var(--orange)':'var(--danger)';
    const swrCell=row.phase==='Retirement'&&swrVal>0
      ?`<td style="color:${swrColor};font-weight:600">${swrVal.toFixed(1)}%</td>`
      :'<td style="color:var(--text-faint)">—</td>';
    // Baseline comparison (when crashes active)
    const baseRow=showBaseCompare?_baselineModel.rows.find(r=>r.age===row.age):null;
    const baseCmpCells=showBaseCompare?`<td style="color:var(--text-muted)">${baseRow?D(baseRow.total):'—'}</td><td class="${baseRow&&row.total<baseRow.total?'num-neg':'num-pos'}">${baseRow?fmtPct((row.total-baseRow.total)/Math.max(1,baseRow.total)*100):'—'}</td>`:'';
    // Salary cell — inline-editable for accumulation years
    const salCell=row.phase!=='Retirement'?(()=>{
      const sv=row.effectiveSalary||0;
      const isOv=!!row.salaryIsOverride;
      const displayVal=sv>=1000?Math.round(sv).toLocaleString('en-US'):String(Math.round(sv));
      return`<td class="editable-sal" data-yr="${row.yr}" style="cursor:pointer${isOv?';border-bottom:2px solid var(--accent)':''}" title="${isOv?'Override active — click to edit or right-click to reset':'Click to override salary for this year and beyond'}">
        $${displayVal}${isOv?'<span style="font-size:10px;color:var(--accent);margin-left:3px">✏</span>':''}
      </td>`;
    })():'<td style="color:var(--text-faint)">—</td>';
    // Contrib % cell — inline-editable for accumulation years
    const dpct=row.deferralPctDisplay??state.deferralPct;
    const dpctIsOv=!!row.deferralIsOverride;
    const dpctIsMax=state.use401kMax&&!dpctIsOv;
    const contribPctCell=row.phase!=='Retirement'?(()=>{
      const label=dpctIsMax?`<span style="font-size:10px;background:var(--accent);color:#fff;padding:1px 5px;border-radius:3px;vertical-align:middle">IRS Max</span>`:`${(+dpct).toFixed(1)}%${dpctIsOv?'<span style="font-size:10px;color:var(--accent);margin-left:3px">✏</span>':''}`;
      return`<td class="editable-def" data-yr="${row.yr}" style="cursor:pointer;color:${dpctIsMax?'var(--accent)':dpctIsOv?'var(--accent)':'var(--text-muted)'}${dpctIsOv?';border-bottom:2px solid var(--accent)':''}" title="${dpctIsMax?'IRS Maximum contribution':dpctIsOv?'Override active — click to edit':'Click to override deferral % for this year'}">${label}</td>`;
    })():'<td style="color:var(--text-faint)">—</td>';
    _rp+=`<tr class="${baseCls}" ${rowStyle} data-age="${row.age}">
      <td style="text-align:left;font-weight:700;color:var(--text)">${row.age}</td>
      <td style="color:var(--text-muted)">${row.yr}</td>
      ${phaseTd}
      ${salCell}
      ${contribPctCell}
      ${allocCell}
      ${showAllCols
        ? accounts.map(a=>`<td class="num-main" style="min-width:110px">${(()=>{const b=row.bals[a.id]||0;return b>0?D(b):'—';})()}</td>`).join('')
        : `${hasTaxable?`<td style="color:#4a9eff">${(()=>{const v=poolBal(row,dispTaxable);return v>0?D(v):'—';})()}</td>`:''}
           ${hasTaxable?taxableContribCell:''}
           ${has401k?`<td style="color:#f59e0b">${(()=>{const v=poolBal(row,disp401k);return v>0?D(v):'—';})()}</td>`:''}
           ${has401k?contrib401kCell:''}
           ${hasTradIRA?`<td style="color:#e8a020">${(()=>{const v=poolBal(row,dispTradIRA);return v>0?D(v):'—';})()}</td>`:''}
           ${hasTradIRA?contribTradIRACell:''}
           ${hasRoth?`<td style="color:var(--success)">${(()=>{const v=poolBal(row,dispRoth);return v>0?D(v):'—';})()}</td>`:''}
           ${hasRoth?rothContribCell:''}
           ${hasHSA?`<td style="color:var(--cyan)">${(()=>{const v=poolBal(row,dispHSA);return v>0?D(v):'—';})()}</td>`:''}`
      }
      <td class="num-main">${D(row.total)}</td>
      ${contribCell}
      ${gainPctCell}
      ${mktGainCell}
      ${hasSS?`<td class="${row.totalSS>0?'num-pos':''}">${row.totalSS>0?D(row.totalSS):'—'}</td>`:''}
      ${totalSpendCell}
      ${portDrawCell}
      ${drawSourceCell}
      ${rmdReinvestCell}
      ${depCell}
      ${netChangeCell}
      ${swrCell}
      ${fedTaxCell}${stTaxCell}${convTaxCell}${rebalTaxCell}${netCashCell}${convCell}
      ${stratCell}
      ${baseCmpCells}
    </tr>`;
    _rowHtmlParts.push(_rp);
    lastPhase=row.phase;
  });
  // Render first 20 rows immediately; defer the rest so the page paints fast
  const PROJ_LAZY_SPLIT=20;
  html+=_rowHtmlParts.slice(0,PROJ_LAZY_SPLIT).join('');

  // ── Lifetime totals footer ──
  const T=_model.totals;
  if(T){
    const totalYrs=T.totalYears;
    const DT=v=>displayMoney(v,totalYrs);
    const fin=(v)=>DT(v);
    // Lifetime sums span all years and should not be inflation-deflated
    const sum=(v,color='')=>`<span${color?` style="color:${color}"`:''}>` + fmtK(v) + `</span>`;
    // Pool final-balance cells
    const poolFinCells=showAllCols
      ? accounts.map(a=>`<td style="text-align:right">${fin(T.finalByAccount[a.id]||0)}</td>`).join('')
      : `${hasTaxable?`<td style="text-align:right">${fin(T.finalTaxable)}</td>`:''}
         ${hasTaxable?`<td style="text-align:right;color:rgba(74,158,255,.7);font-size:.82rem">${T.taxableContribSum>0?sum(T.taxableContribSum,'rgba(74,158,255,.7)'):'<span style="color:var(--text-faint)">—</span>'}</td>`:''}
         ${has401k?`<td style="text-align:right">${fin(T.final401k)}</td>`:''}
         ${has401k?`<td style="text-align:right;color:rgba(245,166,35,.7);font-size:.82rem">${T.sum401kContrib>0?sum(T.sum401kContrib,'rgba(245,166,35,.7)'):'<span style="color:var(--text-faint)">—</span>'}</td>`:''}
         ${hasTradIRA?`<td style="text-align:right">${fin(T.finalTradIRA)}</td>`:''}
         ${hasTradIRA?`<td style="text-align:right;color:rgba(232,160,32,.7);font-size:.82rem">${T.sumTradIRAContrib>0?sum(T.sumTradIRAContrib,'rgba(232,160,32,.7)'):'<span style="color:var(--text-faint)">—</span>'}</td>`:''}
         ${hasRoth?`<td style="text-align:right;color:var(--success)">${fin(T.finalRoth)}</td>`:''}
         ${hasRoth?`<td style="text-align:right;color:rgba(74,222,128,.7);font-size:.82rem">${T.rothContribSum>0?sum(T.rothContribSum,'rgba(74,222,128,.7)'):'<span style="color:var(--text-faint)">—</span>'}</td>`:''}
         ${hasHSA?`<td style="text-align:right">${fin(T.finalHSA)}</td>`:''}`;
    const mgColor=T.marketGainSum>=0?'var(--success)':'var(--danger)';
    html+=`<tfoot><tr class="totals-row">
      <td colspan="2" style="text-align:left;padding-left:10px;position:sticky;left:0"><span class="totals-label">Lifetime Totals</span></td>
      <td></td>
      <td></td><td></td>
      ${hasGlide?'<td></td>':''}
      ${poolFinCells}
      <td style="text-align:right">${fin(T.finalTotal)}</td>
      <td style="text-align:right;color:var(--text-muted)">${T.contribSum>0?sum(T.contribSum,'var(--text-muted)'):'<span style="color:var(--text-faint)">—</span>'}</td>
      <td></td>
      <td style="text-align:right">${sum(T.marketGainSum,mgColor)}</td>
      ${hasSS?`<td style="text-align:right;color:var(--success)">${sum(T.ssIncomeSum)}</td>`:''}
      <td style="text-align:right">${sum(T.lifestyleDrawSum)}</td>
      <td style="text-align:right;color:var(--accent)">${sum(T.annualDrawSum)}</td>
      <td></td>
      <td style="text-align:right;color:var(--success)">${T.rmdReinvestedSum>0?sum(T.rmdReinvestedSum,'var(--success)'):'<span style="color:var(--text-faint)">—</span>'}</td>
      <td></td><td></td><td></td>
      <td style="text-align:right;color:var(--orange)">${sum(T.fedTaxSum)}</td>
      <td style="text-align:right;color:var(--text-muted)">${sum(T.stateTaxSum)}</td>
      <td style="text-align:right;color:var(--orange)">${T.convTaxSum>0?sum(T.convTaxSum,'var(--orange)'):'<span style="color:var(--text-faint)">—</span>'}</td>
      ${hasGlide?`<td style="text-align:right;color:var(--text-muted)">${_model.rows.reduce((s,r)=>s+(r.rebalanceTax||0),0)>0?sum(_model.rows.reduce((s,r)=>s+(r.rebalanceTax||0),0),'var(--text-muted)'):'<span style="color:var(--text-faint)">—</span>'}</td>`:''}
      <td style="text-align:right;color:var(--success);font-weight:800">${sum(T.netCashSum)}</td>
      <td style="text-align:right;color:var(--purple)">${T.convertSum>0?sum(T.convertSum,'var(--purple)'):'<span style="color:var(--text-faint)">—</span>'}</td>
      <td></td>
      ${showBaseCompare?'<td></td><td></td>':''}
    </tr></tfoot>`;
  }

  html+=`</table></div>
  <div id="withdrawal-lab-panel"></div>
  <div id="roth-optimizer-panel"></div>
  </div>`;
  page.innerHTML=html;
  // Lazily append rows beyond PROJ_LAZY_SPLIT (first 20 already in DOM above)
  const _deferredRowHtml=_rowHtmlParts.slice(PROJ_LAZY_SPLIT).join('');
  requestAnimationFrame(()=>{
    if(_deferredRowHtml){
      const tb=page.querySelector('#proj-tbody');
      // Insert deferred rows before the sticky tfoot so they appear in table order
      if(tb)tb.insertAdjacentHTML('beforeend',_deferredRowHtml);
    }
    // Mini chart after rows are appended so layout is stable
    const c=document.getElementById('proj-mini-chart');
    if(c&&_model)renderChart(c,_model,_baselineModel);
    // Withdrawal Strategy Lab + Roth Conversion Optimizer (computed after paint to keep the table snappy)
    try{const labEl=document.getElementById('withdrawal-lab-panel');if(labEl)labEl.innerHTML=renderWithdrawalLab();}catch(e){console.error('Lab render error:',e);}
    try{const rothEl=document.getElementById('roth-optimizer-panel');if(rothEl)rothEl.innerHTML=renderRothOptimizer();}catch(e){console.error('Roth optimizer render error:',e);}
  });
  // Row hover → snapshot
  const tbody=page.querySelector('#proj-tbody');
  if(tbody){
    tbody.addEventListener('mouseover',e=>{
      const row=e.target.closest('tr[data-age]');
      if(!row)return;
      const age=parseInt(row.dataset.age);
      const modelRow=_model.rows.find(r=>r.age===age);
      if(modelRow){
        const panel=document.getElementById('proj-snapshot-panel');
        if(panel)panel.innerHTML=renderSnapshotContent(modelRow,`Snapshot: Age ${modelRow.age} · ${modelRow.yr}`);
      }
    });

    // ── Inline-edit: Salary cell ──
    tbody.addEventListener('click',e=>{
      const td=e.target.closest('td.editable-sal');
      if(!td||td.querySelector('input'))return; // already editing
      const yr=parseInt(td.dataset.yr);
      const cur=(state.salaryOverrides&&state.salaryOverrides[yr]!=null)?state.salaryOverrides[yr]:(_model.rows.find(r=>r.yr===yr)?.effectiveSalary||0);
      const inp=document.createElement('input');
      inp.type='text';inp.inputMode='numeric';
      inp.value=Math.round(cur).toLocaleString('en-US');
      inp.style.cssText='width:100%;background:var(--surface3);border:1px solid var(--accent);border-radius:4px;color:var(--text);padding:3px 6px;font-size:.88rem;text-align:right;box-sizing:border-box';
      td.innerHTML='';td.appendChild(inp);inp.focus();inp.select();
      const commit=()=>{
        const v=parseInt(inp.value.replace(/,/g,''));
        if(!isNaN(v)&&v>0){if(!state.salaryOverrides)state.salaryOverrides={};state.salaryOverrides[yr]=v;}
        else{if(state.salaryOverrides)delete state.salaryOverrides[yr];}
        recalculate();
      };
      inp.addEventListener('blur',commit);
      inp.addEventListener('keydown',ev=>{if(ev.key==='Enter'){inp.blur();}else if(ev.key==='Escape'){if(state.salaryOverrides)delete state.salaryOverrides[yr];recalculate();}});
    });
    // Right-click salary cell → clear override
    tbody.addEventListener('contextmenu',e=>{
      const td=e.target.closest('td.editable-sal');
      if(!td)return;
      e.preventDefault();
      const yr=parseInt(td.dataset.yr);
      if(state.salaryOverrides)delete state.salaryOverrides[yr];
      recalculate();
    });

    // ── Inline-edit: Contrib % (deferral) cell ──
    tbody.addEventListener('click',e=>{
      const td=e.target.closest('td.editable-def');
      if(!td||td.querySelector('input'))return;
      const yr=parseInt(td.dataset.yr);
      const cur=(state.deferralOverrides&&state.deferralOverrides[yr]!=null)?state.deferralOverrides[yr]:state.deferralPct;
      const inp=document.createElement('input');
      inp.type='text';inp.inputMode='decimal';
      inp.value=(+cur).toFixed(1);
      inp.style.cssText='width:60px;background:var(--surface3);border:1px solid var(--accent);border-radius:4px;color:var(--text);padding:3px 6px;font-size:.88rem;text-align:right;box-sizing:border-box';
      td.innerHTML='';td.appendChild(inp);
      const pct=document.createTextNode(' %');td.appendChild(pct);
      inp.focus();inp.select();
      const commit=()=>{
        const v=parseFloat(inp.value);
        if(!isNaN(v)&&v>=0&&v<=100){if(!state.deferralOverrides)state.deferralOverrides={};state.deferralOverrides[yr]=v;}
        else{if(state.deferralOverrides)delete state.deferralOverrides[yr];}
        recalculate();
      };
      inp.addEventListener('blur',commit);
      inp.addEventListener('keydown',ev=>{if(ev.key==='Enter'){inp.blur();}else if(ev.key==='Escape'){if(state.deferralOverrides)delete state.deferralOverrides[yr];recalculate();}});
    });
    tbody.addEventListener('contextmenu',e=>{
      const td=e.target.closest('td.editable-def');
      if(!td)return;
      e.preventDefault();
      const yr=parseInt(td.dataset.yr);
      if(state.deferralOverrides)delete state.deferralOverrides[yr];
      recalculate();
    });
  }
  }catch(e){console.error('renderProjections error:',e);page.innerHTML=`<div style="padding:40px 48px"><div style="background:var(--danger-bg);border:1px solid rgba(239,68,68,.35);border-radius:10px;padding:20px 24px;color:var(--danger)"><strong>⚠ Projections Render Error</strong><p style="margin-top:8px;font-size:13px;color:var(--text)">${escHtml(String(e&&e.message||e))}</p></div></div>`;}
}

/* ================================================================
   WITHDRAWAL STRATEGY LAB + ROTH CONVERSION OPTIMIZER (Projections tab)
   ================================================================ */
let _labMCController=null;

// Kick off the async Monte Carlo comparison across all strategies (failure probability column).
function runWithdrawalLabMC(){
  if(!(window.RIQ&&RIQ.Withdrawal&&RIQ.Withdrawal.runLabMonteCarlo))return;
  if(_labMCController)return; // already running
  const btn=document.getElementById('lab-mc-btn');
  const status=document.getElementById('lab-mc-status');
  if(btn){btn.disabled=true;btn.textContent='Running…';}
  _labMCController=RIQ.Withdrawal.runLabMonteCarlo({
    trials:Math.min(+state.mcTrials||1500,2000),seed:12345,
    onEach:(key,res,done,total)=>{if(status)status.textContent=`Monte Carlo ${done}/${total} · ${key}: ${(res.successProb*100).toFixed(0)}% success`;},
    onDone:()=>{_labMCController=null;const el=document.getElementById('withdrawal-lab-panel');if(el)el.innerHTML=renderWithdrawalLab();},
  });
}

// Build the Withdrawal Strategy Lab comparison table.
function renderWithdrawalLab(){
  try{
  if(!(window.RIQ&&RIQ.Withdrawal&&RIQ.Withdrawal.evaluateAll)||!_model)return'';
  const evals=RIQ.Withdrawal.evaluateAll();
  const cat=RIQ.Withdrawal.catalog;
  const mc=RIQ.Withdrawal._labMC||null;
  const cur=state.withdrawalStrategy||'required';
  const priority=state.wdPriority||'success';
  const totalYrs=_model.rows.length;
  const midYrs=(_model.accYrs||0)+Math.round((_model.retYrs||0)/2);
  const byKey={};evals.forEach(e=>byKey[e.key]=e);
  // Determine the "best" strategy for the chosen priority.
  let bestKey=null;
  if(priority==='estate'){bestKey=evals.reduce((a,b)=>b.endEstate>a.endEstate?b:a,evals[0]).key;}
  else if(priority==='income'){bestKey=evals.reduce((a,b)=>b.avgIncome>a.avgIncome?b:a,evals[0]).key;}
  else if(priority==='success'){
    if(mc){let best=null,bv=-1;cat.forEach(c=>{const p=mc[c.key]?mc[c.key].successProb:-1;if(p>bv){bv=p;best=c.key;}});bestKey=best;}
    else{bestKey=evals.reduce((a,b)=>b.endEstate>a.endEstate?b:a,evals[0]).key;}
  }
  const money=(v,yrs)=>displayMoney(v,yrs==null?midYrs:yrs);
  const rows=cat.map(c=>{
    const e=byKey[c.key]||{};
    const isActive=c.key===cur, isBest=c.key===bestKey;
    const fp=mc&&mc[c.key]?mc[c.key]:null;
    const fpCell=fp?`<span style="color:${fp.successProb>=0.9?'var(--success)':fp.successProb>=0.75?'var(--accent)':fp.successProb>=0.5?'var(--orange)':'var(--danger)'};font-weight:700">${(fp.successProb*100).toFixed(0)}%</span><div style="font-size:.7rem;color:var(--text-faint)">${((1-fp.successProb)*100).toFixed(0)}% fail</div>`:'<span style="color:var(--text-faint)">—</span>';
    const remaining=fp?fp.medianEstate:e.endEstate;
    return `<tr style="border-bottom:1px solid var(--border);${isActive?'background:rgba(0,191,179,.06)':''}">
      <td style="text-align:left;padding:8px 10px">
        <div style="display:flex;align-items:center;gap:6px;font-weight:600">${c.name}${isBest?' <span title="Best for your priority" style="font-size:.72rem;color:var(--accent);font-weight:700">★ best</span>':''}${isActive?' <span style="font-size:.68rem;color:var(--success);border:1px solid var(--success);border-radius:4px;padding:0 4px">active</span>':''}</div>
        <div style="font-size:.72rem;color:var(--text-muted);max-width:230px">${c.short}</div>
      </td>
      <td style="text-align:right;color:var(--orange)">${fmtK(e.lifetimeTax||0)}</td>
      <td style="text-align:right;color:var(--accent)">${money(e.endEstate||0,totalYrs)}</td>
      <td style="text-align:center">${fpCell}</td>
      <td style="text-align:right">${money(e.avgIncome||0)}</td>
      <td style="text-align:right;color:var(--text-muted)">${money(e.volatility||0)}</td>
      <td style="text-align:right">${money(remaining||0,totalYrs)}</td>
      <td style="text-align:center">${isActive?'<span style="color:var(--text-faint);font-size:.78rem">current</span>':`<button class="btn btn-secondary btn-sm" style="padding:4px 10px;font-size:.78rem" onclick="setWithdrawalStrategy('${c.key}')">Use</button>`}</td>
    </tr>`;
  }).join('');
  const priSel=`<select style="background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-size:.82rem" onchange="state.wdPriority=this.value;saveState();document.getElementById('withdrawal-lab-panel').innerHTML=renderWithdrawalLab()">
    <option value="success" ${priority==='success'?'selected':''}>Minimize failure</option>
    <option value="estate" ${priority==='estate'?'selected':''}>Maximize estate</option>
    <option value="income" ${priority==='income'?'selected':''}>Maximize income</option>
  </select>`;
  const mcBtn=_labMCController
    ?`<button class="btn btn-secondary btn-sm" disabled>Running…</button>`
    :`<button id="lab-mc-btn" class="btn btn-secondary btn-sm" onclick="runWithdrawalLabMC()">${mc?'↻ Re-run':'▶ Run'} Monte Carlo</button>`;
  return `<div style="margin-top:22px;padding:18px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px">
      <div>
        <div style="font-weight:800;font-size:1.05rem;color:var(--text)">🧪 Withdrawal Strategy Lab</div>
        <div style="font-size:.8rem;color:var(--text-muted)">Every strategy run through your full plan${mc?' + Monte Carlo':''}. Values in ${state.moneyMode==='today'?"today's $":'future $'}; lifetime taxes are nominal sums.</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

// Apply a recommended Roth conversion ceiling (or reset to the automatic heuristic).
function applyRothConversions(ceiling){
  state.rothConvCeilingBracket=(ceiling===null||ceiling==='auto')?null:(+ceiling);
  saveState();
  recalcNow();
  showToast(ceiling===null||ceiling==='auto'?'Roth conversions: automatic':'Applied recommended Roth conversions');
}

// Build the Roth Conversion Optimizer card.
function renderRothOptimizer(){
  try{
  if(!(window.RIQ&&RIQ.Withdrawal&&RIQ.Withdrawal.optimizeRothConversions)||!_model)return'';
  const hasPreTax=accounts.some(a=>['pretax','401k','traditional-ira'].includes(a.type));
  const hasRoth=accounts.some(a=>a.type==='roth');
  if(!hasPreTax||!hasRoth)return`<div style="margin-top:22px;padding:16px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text-muted);font-size:.85rem">💡 <strong>Roth Conversion Optimizer</strong> — add both a pre-tax (401k/IRA) and a Roth account to model conversions.</div>`;
  const opt=RIQ.Withdrawal.optimizeRothConversions();
  const totalYrs=_model.rows.length;
  const cur=state.rothConvCeilingBracket;
  const isAuto=cur==null;
  const money=v=>displayMoney(v,totalYrs);
  const cards=opt.results.map(r=>{
    const isBest=r.key===opt.best.key;
    const saved=r.savedVsNone||0;
    const activeMatch=!isAuto&&Math.abs((+cur)-(r.ceiling))<1e-9;
    return `<div style="flex:1;min-width:150px;padding:12px 14px;border:2px solid ${isBest?'var(--accent)':'var(--border)'};border-radius:10px;background:${isBest?'rgba(0,191,179,.06)':'var(--surface3)'}">
      <div style="font-weight:700;font-size:.85rem;color:var(--text);display:flex;align-items:center;gap:6px">${r.label}${isBest?' <span style="font-size:.68rem;color:var(--accent)">★</span>':''}${activeMatch?' <span style="font-size:.64rem;color:var(--success);border:1px solid var(--success);border-radius:4px;padding:0 3px">on</span>':''}</div>
      <div style="font-size:.72rem;color:var(--text-muted);margin-top:6px">Lifetime tax (incl. heirs + IRMAA)</div>
      <div style="font-weight:700;color:var(--text)">${fmtK(r.totalLifetimeTax||0)}</div>
      <div style="font-size:.72rem;margin-top:4px;color:${saved>0?'var(--success)':saved<0?'var(--danger)':'var(--text-muted)'}">${saved>0?'▼ saves ':saved<0?'▲ costs ':''}${saved!==0?fmtK(Math.abs(saved)):'baseline'}</div>
      <div style="font-size:.7rem;color:var(--text-faint);margin-top:6px">Converted: ${fmtK(r.totalConverted||0)}<br>End Roth: ${money(r.endingRoth||0)}<br>End pre-tax: ${money(r.endingPreTax||0)}</div>

  }).join('');
  // Recommended annual schedule (from the best candidate, unless it's "none")

    const rowsS=best.schedule.map(s=>`<tr style="border-bottom:1px solid var(--border)">
      <td style="text-align:left;padding:4px 10px">${s.age}</td>

      <td style="text-align:right;padding:4px 10px;color:var(--orange)">${fmtK(s.tax)}</td>

    schedHtml=`<div style="margin-top:14px">
      <div style="font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:6px">Recommended annual conversions — ${best.label}</div>

  </div>`;
  }catch(e){console.error('renderRothOptimizer error:',e);return`<div style="margin-top:16px;color:var(--danger);font-size:.82rem">Roth Optimizer error: ${escHtml(String(e&&e.message||e))}</div>`;}

/* ================================================================
   RENDER: CASH FLOW TAB (Phase 8 — RIQ.CashFlow)
   Monthly decomposition of one selected year. Pure VIEW — never mutates
   the model, so deterministic annual results are unchanged.
   ================================================================ */
function setCashFlowYear(v){
  state.cashFlowYear=(v===''||v==null)?null:+v;
  saveState();
  if(activeTab==='cashflow')renderCashFlow();
}
function stepCashFlowYear(dir){
  if(!_model||!_model.rows||!_model.rows.length)return;
  const ages=_model.rows.map(r=>r.age);
  const cur=RIQ.CashFlow.resolveAge();
  let idx=ages.indexOf(cur);if(idx<0)idx=0;
  idx=Math.max(0,Math.min(ages.length-1,idx+dir));
  setCashFlowYear(ages[idx]);
}
function renderCashFlow(){
  const page=document.getElementById('page-cashflow');
  try{
  if(!_model||!_model.rows||!_model.rows.length){page.innerHTML='<div style="padding:48px;color:var(--text-muted)">No model data yet.</div>';return;}
  const cf=RIQ.CashFlow.build();
  if(!cf){page.innerHTML='<div style="padding:48px;color:var(--text-muted)">Unable to build the cash-flow view for this year.</div>';return;}
  const yft=cf.yearsFromToday;
  const D=v=>displayMoney(v,yft);
  const Dc=v=>Math.abs(v)<0.5?'<span style="color:var(--text-faint)">–</span>':D(v);
  const rows=_model.rows;

  // ── Year selector options ──
  const curSel=cf.age;
  const yearOpts=rows.map(r=>`<option value="${r.age}"${r.age===curSel?' selected':''}>Age ${r.age} · ${r.yr}${r.phase==='Retirement'?' (Retirement)':r.phase==='Pause'?' (Pause)':' (Working)'}</option>`).join('');

  if(cf.hasSS)inc.push({k:'ss',label:'Soc. Sec.',color:'var(--success)'});
  if(cf.hasDraw)inc.push({k:'draw',label:'Withdrawal',color:'var(--purple)'});
  if(cf.hasGoalIncome)inc.push({k:'goal',label:'Goal +',color:'#22c55e'});

  if(anyTax)exp.push({k:'taxes',label:'Taxes',color:'#f87171'});
  if(cf.hasSavings)exp.push({k:'savings',label:'Savings',color:'#a78bfa'});
  if(cf.hasGoalExpense)exp.push({k:'goal',label:'Goal −',color:'#f97316'});

  // ── KPI summary ──
  const netCls=cf.net>=0?'var(--success)':'var(--danger)';
  const kpi=(label,val,color,sub)=>`<div style="flex:1;min-width:150px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px">
    <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em">${label}</div>

  </div>`;
  const negCount=cf.negativeMonths.length;

  let html=`<div style="padding:24px 32px 48px">
  <div class="proj-header-row">
    <div>
      <div class="proj-title">Monthly Cash Flow</div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:3px">Age ${cf.age} · ${cf.year} · ${cf.phase==='Retirement'?'Retirement':cf.phase==='Pause'?'Career pause':'Working / accumulation'} · ${state.moneyMode==='today'?`today's $ (${cy()} purchasing power)`:'future (nominal) $'}</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn btn-muted btn-sm" onclick="stepCashFlowYear(-1)" title="Previous year">‹</button>
        <select onchange="setCashFlowYear(this.value)" style="background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 9px;font-size:.85rem;font-family:inherit">${yearOpts}</select>
        <button class="btn btn-muted btn-sm" onclick="stepCashFlowYear(1)" title="Next year">›</button>
      </div>
      <div class="money-toggle">
        <button class="mt-opt${state.moneyMode==='today'?' active':''}" onclick="setMoneyMode('today');renderCashFlow()">Today's $</button>
        <button class="mt-opt${state.moneyMode==='future'?' active':''}" onclick="setMoneyMode('future');renderCashFlow()">Future $</button>
      </div>

  </div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px">
    ${kpi('Annual Income',D(cf.totalIncome),'var(--success)','Across 12 months')}
    ${kpi('Annual Expenses',D(cf.totalExpense),'var(--text)','Living, taxes, savings, goals')}
    ${kpi('Net Cash Flow',(cf.net>=0?'+':'−')+D(Math.abs(cf.net)),netCls,cf.net>=0?'Surplus this year':'Drawn from portfolio')}
    ${kpi('Negative Months',String(negCount),negCount?'var(--danger)':'var(--success)',negCount?'Months where outflow > inflow':'All months cash-positive')}

  <div class="chart-wrap" style="margin-bottom:20px">
    <div class="chart-header">
