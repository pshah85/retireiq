}

/* ================================================================
   RIQ NAMESPACE — modular engine registry (Phase 20 foundation)
   Existing global functions are REGISTERED (wrapped) here, never rewritten,
   so every current global and behavior remains intact. New subsystems layer
   in as RIQ.<Module> without touching the deterministic engine.
   ================================================================ */
window.RIQ=window.RIQ||{};
RIQ.version='0.2.0';
RIQ.Model={buildModel:(...a)=>buildModel(...a),yearGrowth:(...a)=>_yearGrowth(...a),getYearReturn:(...a)=>getYearReturn(...a)};
RIQ.Tax={progressive:(...a)=>progressiveTax(...a),ca:(...a)=>progressiveCATax(...a),stdDeduction:(...a)=>getStdDeduction(...a),brackets:(...a)=>getProjectedBrackets(...a)};
RIQ.Withdrawal={runSimulation:(...a)=>runSimulation(...a)}; // sequencing lives in buildModel; exposed for future extraction
RIQ.SocialSecurity={fra:(...a)=>getFRA(...a),adjust:(...a)=>ssAdj(...a)};
RIQ.Glide={allocation:(...a)=>getGlideAllocation(...a),effectiveGr:(...a)=>getEffectiveGr(...a)};
RIQ.Analytics=RIQ.Analytics||{};

/* ================================================================
   RIQ.Goals — DISCRETE GOALS & EVENT TIMELINE (Phase 7)
   ----------------------------------------------------------------
   A library of dated financial events (one-time / recurring expenses and
   incomes/windfalls, plus informational goal-target milestones). buildModel()
   overlays them onto the projection: expenses raise that year's spending need,
   incomes are deposited into the chosen account (offsetting the withdrawal
   need and growing the estate), and optionally-taxable windfalls flow through
   the ordinary-income tax lines. With state.goals EMPTY the overlay is inert,
   so the deterministic default estate ($531,000) is unchanged.
   ================================================================ */
RIQ.Goals=(function(){
  'use strict';
  // flow: 'expense' | 'income' | 'target'
  const TYPES={
    'expense-onetime':  {label:'One-time expense',            flow:'expense',recurring:false,color:'#f87171',sign:-1},
    'expense-recurring':{label:'Recurring expense',           flow:'expense',recurring:true, color:'#fb923c',sign:-1},
    'income-onetime':   {label:'One-time income / windfall',  flow:'income', recurring:false,color:'#4ade80',sign:1 },
    'income-recurring': {label:'Recurring income',            flow:'income', recurring:true, color:'#22c55e',sign:1 },
    'goal-target':      {label:'Goal target (milestone)',     flow:'target', recurring:false,color:'#38bdf8',sign:0 },
  };
  // Presets prefill sensible defaults; everything remains editable.
  const PRESETS=[
    {key:'college',  label:'College Tuition',              type:'expense-recurring',amount:35000, years:4, icon:'🎓'},
    {key:'wedding',  label:'Wedding',                      type:'expense-onetime',  amount:40000,          icon:'💍'},
    {key:'home',     label:'Home Purchase / Down Payment', type:'expense-onetime',  amount:120000,         icon:'🏠'},
    {key:'car',      label:'New Car',                      type:'expense-onetime',  amount:45000,          icon:'🚗'},
    {key:'travel',   label:'Major Travel',                 type:'expense-recurring',amount:20000, years:3, icon:'✈️'},
    {key:'inherit',  label:'Inheritance Received',         type:'income-onetime',   amount:250000,taxable:false,icon:'🎁'},
    {key:'homesale', label:'Home Sale Proceeds',           type:'income-onetime',   amount:400000,taxable:false,icon:'🏡'},
    {key:'business', label:'Business Sale',                type:'income-onetime',   amount:500000,taxable:true, icon:'🏢'},
    {key:'medical',  label:'Large Medical Expense',        type:'expense-onetime',  amount:50000,          icon:'🏥'},
    {key:'target',   label:'Funding Goal (milestone)',     type:'goal-target',      amount:250000,         icon:'🎯'},
    {key:'custom',   label:'Custom Event',                 type:'expense-onetime',  amount:10000,          icon:'⭐'},
  ];
  function all(){return Array.isArray(state.goals)?state.goals:[];}
  function active(){return all().filter(g=>g&&g.enabled);}
  // "active" cash-flow goals only (targets never touch the model)
  function hasActive(){return all().some(g=>g&&g.enabled&&TYPES[g.type]&&TYPES[g.type].flow!=='target'&&(+g.amount||0)>0);}
  function appliesAt(g,age){
    const s=+g.startAge;if(!isFinite(s))return false;
    const t=TYPES[g.type];
    if(t&&t.recurring){
      const e=(g.endAge!=null&&g.endAge!=='')?+g.endAge:Infinity;
      return age>=s&&age<=e;
    }
    return age===s;
  }
  // Nominal $ for a goal in a given year (respects today's-$ vs future-$ convention).
  function nominal(g,yearsFromToday,inflPct){
    const a=+g.amount||0;
    return g.dollars==='future'?a:a*Math.pow(1+(inflPct||0)/100,Math.max(0,yearsFromToday||0));
  }
  function resolveAcct(key){
    if(!key||key==='general')return null;
    return (typeof accounts!=='undefined'?accounts:[]).find(a=>a.id===key)||null;
  }
  // Cash-flow effects at a given age (all nominal $). Used by buildModel().
  //  expense       → added to the annual spending need (funded via withdrawal sequence)
  //  deposits[]    → {account,amount} deposited into balances before draws/growth
  //  taxableIncome → added to ordinary income for the tax lines (taxable windfalls)
  //  expenseAccts[]→ account ids to front-load in the withdrawal order this year
  function forYear(age,yearsFromToday,inflPct){
    let expense=0,income=0,taxableIncome=0;
    const deposits=[],expenseAccts=[];
    active().forEach(g=>{
      const t=TYPES[g.type];if(!t||t.flow==='target')return;
      if(!appliesAt(g,age))return;
      const amt=nominal(g,yearsFromToday,inflPct);if(amt<=0)return;
      if(t.flow==='expense'){expense+=amt;if(g.account&&g.account!=='general')expenseAccts.push(g.account);}
      else if(t.flow==='income'){income+=amt;deposits.push({account:g.account||'general',amount:amt});if(g.taxable)taxableIncome+=amt;}
    });
    return {expense,income,taxableIncome,deposits,expenseAccts};
  }
  return {TYPES,PRESETS,all,active,hasActive,appliesAt,nominal,resolveAcct,forYear};
})();

/* ================================================================
   RIQ.CashFlow — MONTHLY CASH-FLOW ENGINE (Phase 8)
   ----------------------------------------------------------------
   Pure VIEW/decomposition of the annual model output for one selected year:
   splits annual income sources and expenses into 12 months, computes running
   balance / net cash flow, and flags negative months. It never mutates the
   model, so deterministic annual results are untouched.
   ================================================================ */
RIQ.CashFlow=(function(){
  'use strict';
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  // Resolve the age to decompose (default: first retirement year, else first row).
  function resolveAge(){
    if(typeof _model==='undefined'||!_model||!_model.rows||!_model.rows.length)return null;
    const rows=_model.rows;
    let want=state.cashFlowYear;
    if(want==null||want===''){const fr=rows.find(r=>r.phase==='Retirement');return fr?fr.age:rows[0].age;}
    want=+want;
    const ages=rows.map(r=>r.age);
    if(ages.indexOf(want)>=0)return want;
    return ages.reduce((p,a)=>Math.abs(a-want)<Math.abs(p-want)?a:p,ages[0]);
  }
  function build(age){
    if(typeof _model==='undefined'||!_model||!_model.rows)return null;
    if(age==null)age=resolveAge();
    const row=_model.rows.find(r=>r.age===age);
    if(!row)return null;
    const curAge=_model.curAge,yft=age-curAge,inflPct=+state.inflationRate||0;
    const isRet=row.phase==='Retirement';
    // Goal cash flows this year: monthly recurring share + one-time events by month
    const goalMonthly={inc:0,exp:0};const goalOneTime=[];
    (RIQ.Goals?RIQ.Goals.active():[]).forEach(g=>{
      const t=RIQ.Goals.TYPES[g.type];if(!t||t.flow==='target')return;
      if(!RIQ.Goals.appliesAt(g,age))return;
      const amt=RIQ.Goals.nominal(g,yft,inflPct);if(amt<=0)return;
      if(t.recurring){if(t.flow==='income')goalMonthly.inc+=amt/12;else goalMonthly.exp+=amt/12;}
      else{const mo=Math.min(12,Math.max(1,+g.month||1));goalOneTime.push({month:mo,flow:t.flow,amount:amt,label:g.label||t.label});}
    });
    const goalExpenseYear=RIQ.Goals?RIQ.Goals.forYear(age,yft,inflPct).expense:0;
    const salaryMo=!isRet?(row.effectiveSalary||0)/12:0;
    const ssMo=isRet?(row.totalSS||0)/12:0;
    const drawMo=isRet?(row.annualDraw||0)/12:0;
    // Base living excludes the goal-expense portion already baked into lifestyleDraw (avoids double count)
    const baseLiving=isRet?Math.max(0,(row.lifestyleDraw||0)-goalExpenseYear):0;
    const livingMo=baseLiving/12;
    const taxMo=isRet?((row.fedTax||0)+(row.stateTax||0)+(row.conversionTax||0))/12:0;
    const savingsMo=!isRet?(row.totalContributions||0)/12:0;
    const months=[];let running=0;
    for(let m=1;m<=12;m++){
      const inc={salary:salaryMo,ss:ssMo,draw:drawMo,goal:goalMonthly.inc};
      const exp={living:livingMo,taxes:taxMo,savings:savingsMo,goal:goalMonthly.exp};
      const notes=[];
      goalOneTime.forEach(o=>{if(o.month!==m)return;if(o.flow==='income'){inc.goal+=o.amount;notes.push('+ '+o.label);}else{exp.goal+=o.amount;notes.push('\u2212 '+o.label);}});
      const income=inc.salary+inc.ss+inc.draw+inc.goal;
      const expense=exp.living+exp.taxes+exp.savings+exp.goal;
      const net=income-expense;running+=net;
      months.push({m,label:MONTHS[m-1],inc,exp,income,expense,net,running,notes});
    }
    const totalIncome=months.reduce((s,x)=>s+x.income,0);
    const totalExpense=months.reduce((s,x)=>s+x.expense,0);
    return {age,year:row.yr,phase:row.phase,yearsFromToday:yft,isRet,months,
      negativeMonths:months.filter(x=>x.net<-0.5).map(x=>x.m),
      totalIncome,totalExpense,net:totalIncome-totalExpense,
      hasSalary:salaryMo>0,hasSS:ssMo>0,hasDraw:drawMo>0,hasSavings:savingsMo>0,
      hasGoalIncome:goalMonthly.inc>0||goalOneTime.some(o=>o.flow==='income'),
      hasGoalExpense:goalMonthly.exp>0||goalOneTime.some(o=>o.flow==='expense')};
  }
  return {MONTHS,resolveAge,build};
})();

/* ================================================================
   RIQ.Analytics — INVESTMENT ANALYTICS (Phase 10)
   ----------------------------------------------------------------
   Pure functions that surface portfolio-level investment metrics DERIVED
   from the existing deterministic model + glide-path system. It never
   mutates the live model or the headline estate:
     • allocation / glide-path series are READ from the model rows and
       getGlideAllocation() (single source of truth — nothing reinvented).
     • blended expected return per phase = allocation-weighted getEffectiveGr()
       averaged over the phase's ages (identical blend the engine uses).
     • volatility per phase = avg equity weight × the equity-sleeve vol the
       Monte Carlo engine already assumes (state.mcAccumVol / mcRetireVol);
       bonds & cash are treated as ~0 vol, exactly like the MC stochastic path.
     • Sharpe = (blended return − state.riskFreeRate) / volatility.
     • fee drag = an ISOLATED buildModel() run with accum/retire/bond rates
       reduced by state.feeExpenseRatio, using the established isolate-and-restore
       (try/finally) pattern. The fee ratio is NEVER applied to the live model —
       it exists only for this comparison, so the deterministic estate stays fixed.
     • sequence-of-returns exposure reuses the existing _runIsolatedModel() SOR
       machinery (crash timed at retirement vs earlier) — no duplicated logic.
   With default state the module is display-only; it cannot change $531,000.
   ================================================================ */
RIQ.Analytics=(function(){
  'use strict';
  function _num(v,d){v=+v;return isFinite(v)?v:d;}
  // Map an account type → tax-treatment bucket
  function taxBucket(type){
    if(type==='roth'||type==='hsa')return'free';           // qualified withdrawals tax-free (HSA = triple-advantaged)
    if(type==='pretax'||type==='401k'||type==='traditional-ira')return'deferred'; // ordinary income on withdrawal
    return'taxable';                                        // taxable / investment / other
  }
  const BUCKET_META={
    taxable :{label:'Taxable',      color:'#4a9eff',desc:'Brokerage / other — long-term capital-gains tax on gains & sales.'},
    deferred:{label:'Tax-Deferred', color:'#fb923c',desc:'401(k) / Traditional IRA — ordinary-income tax on withdrawal; RMDs apply.'},
    free    :{label:'Tax-Free',     color:'#22c55e',desc:'Roth / HSA — qualified withdrawals are tax-free; no RMDs on Roth.'},
  };
  const ASSET_META={
    equity:{label:'Equities',color:'#00bfb3'},
    bond  :{label:'Bonds',   color:'#a882ff'},
    cash  :{label:'Cash',    color:'#f59e0b'},
  };
  // Current asset-class allocation — read straight from the glide path at the current age.
  function currentAllocation(model){
    const age=(model&&isFinite(model.curAge))?model.curAge:computeAge(state.dob);
    const a=getGlideAllocation(age)||{equityPct:100,bondPct:0,cashPct:0};
    return{age,equityPct:_num(a.equityPct,100),bondPct:_num(a.bondPct,0),cashPct:_num(a.cashPct,0)};
  }
  // Full allocation glide series across the projection (per-year equity/bond/cash already stored on rows).
  function glideSeries(model){
    if(!model||!model.rows)return[];
    return model.rows.map(r=>({age:r.age,yr:r.yr,phase:r.phase,
      equityPct:_num(r.equityPct,100),bondPct:_num(r.bondPct,0),cashPct:_num(r.cashPct,0)}));
  }
  function _phaseRows(model,phase){
    if(!model||!model.rows)return[];
    return model.rows.filter(r=>phase==='accum'?r.phase!=='Retirement':r.phase==='Retirement');
  }
  // Avg equity weight over a phase (%)
  function phaseEquityWeight(model,phase){
    const rows=_phaseRows(model,phase);
    if(!rows.length){const a=getGlideAllocation(phase==='accum'?((model&&model.curAge)||41):(+state.retireAge||65));return _num(a.equityPct,100);}
    return rows.reduce((s,r)=>s+_num(r.equityPct,100),0)/rows.length;
  }
  // Blended expected return (%) for a phase = average of the engine's own getEffectiveGr() over the phase ages.
  function phaseReturn(model,phase){
    const baseA=_num(state.accumRate,9.5)/100,baseR=_num(state.retireRate,9)/100;
    const rows=_phaseRows(model,phase);
    if(!rows.length)return(phase==='accum'?getEffectiveGr((model&&model.curAge)||41,baseA):getEffectiveGr(+state.retireAge||65,baseR))*100;
    let s=0;rows.forEach(r=>{s+=getEffectiveGr(r.age,r.phase==='Retirement'?baseR:baseA);});
    return s/rows.length*100;
  }
  // Volatility (%) per phase — avg equity weight × equity-sleeve vol (reuses the MC assumptions).
  function phaseVol(model,phase){
    const eqVol=phase==='accum'?_num(state.mcAccumVol,15):_num(state.mcRetireVol,12);
    return phaseEquityWeight(model,phase)/100*eqVol;
  }
  function blendedReturn(model){return{accum:phaseReturn(model,'accum'),retire:phaseReturn(model,'retire'),
    eqWAccum:phaseEquityWeight(model,'accum'),eqWRetire:phaseEquityWeight(model,'retire')};}
  function volatility(model){return{accum:phaseVol(model,'accum'),retire:phaseVol(model,'retire'),
    eqVolAccum:_num(state.mcAccumVol,15),eqVolRetire:_num(state.mcRetireVol,12)};}
  function sharpe(model){
    const rf=_num(state.riskFreeRate,4);
    const br=blendedReturn(model),vol=volatility(model);
    const sh=(r,v)=>v>0?(r-rf)/v:0;
    return{riskFree:rf,accum:sh(br.accum,vol.accum),retire:sh(br.retire,vol.retire),ret:br,vol};
  }
  // Fee drag — ISOLATED buildModel() with net returns reduced by the expense ratio.
  // Patches accum/retire/bond rates, runs, RESTORES in finally. Never affects the live estate.
  function feeDrag(model){
    const feePct=_num(state.feeExpenseRatio,0);
    const baseEstate=(model&&model.meta&&model.meta.estateAtEnd)||0;
    if(!(feePct>0))return{feePct:Math.max(0,feePct),baseEstate,feeEstate:baseEstate,deltaEstate:0,deltaPct:0,yearsToEnd:(model&&model.rows)?model.rows.length:0};
    const savedA=state.accumRate,savedR=state.retireRate,savedB=state.bondRate;
    let feeEstate=baseEstate;
    try{
      state.accumRate=savedA-feePct;
      state.retireRate=savedR-feePct;
      state.bondRate=savedB-feePct;
      const m=buildModel();
      feeEstate=(m&&m.rows.length)?m.rows[m.rows.length-1].total:baseEstate;
    }catch(e){
      console.error('Analytics.feeDrag isolated run failed:',e);
      feeEstate=baseEstate;
    }finally{
      state.accumRate=savedA;state.retireRate=savedR;state.bondRate=savedB;
    }
    const deltaEstate=Math.max(0,baseEstate-feeEstate);
    const yearsToEnd=(model&&model.rows&&model.rows.length&&isFinite(model.curAge))?(model.rows[model.rows.length-1].age-model.curAge):0;
    return{feePct,baseEstate,feeEstate,deltaEstate,deltaPct:baseEstate>0?deltaEstate/baseEstate*100:0,yearsToEnd};
  }
  // Sequence-of-returns exposure — reuses the existing _runIsolatedModel() (isolate/restore built in).
  function sequenceRisk(model){
    if(!model||!(model.retYrs>0)||typeof _runIsolatedModel!=='function')return null;
    const retAge=+state.retireAge||65,curAge=model.curAge||retAge;
    const preAge=Math.max(curAge+1,retAge-8);
    const drop=30,rec=3;
    const noCrash=_runIsolatedModel(null);
    const atRet=_runIsolatedModel({id:'_an_sor_r',label:'SOR probe',enabled:true,crashAge:retAge,drop,recoveryYears:rec});
    const early=(preAge<retAge)?_runIsolatedModel({id:'_an_sor_e',label:'SOR probe',enabled:true,crashAge:preAge,drop,recoveryYears:rec}):atRet;
    const sorCost=Math.max(0,early-atRet);              // extra estate damage from a retirement-timed vs earlier crash

  function diversification(model){
    const rows=model&&model.rows;
    const accRows=rows?rows.filter(r=>r.phase!=='Retirement'):[];
    const retRow=accRows.length?accRows[accRows.length-1]:(rows&&rows[0])||null;
    const mk=(balFn)=>accounts.map(a=>({id:a.id,name:a.name,type:a.type,color:a.color,bucket:taxBucket(a.type),bal:Math.max(0,balFn(a))}));
    const cur=mk(a=>+a.startBal||0);
    const ret=mk(a=>retRow?(retRow.bals[a.id]||0):0);
    const sum=list=>list.reduce((s,a)=>s+a.bal,0);
    const curTotal=sum(cur),retTotal=sum(ret);

    const curBuckets=bucketAgg(cur),retBuckets=bucketAgg(ret);

    const hhi=shares.reduce((s,x)=>s+x*x,0);            // Herfindahl 0..1
    const top=cur.slice().sort((a,b)=>b.bal-a.bal)[0]||null;
    const topShare=(curTotal>0&&top)?top.bal/curTotal*100:0;
    const bkArr=Object.keys(curBuckets).map(k=>({k,v:curBuckets[k]})).sort((a,b)=>b.v-a.v);
    const topBucket=bkArr[0]||null;
    const topBucketShare=(curTotal>0&&topBucket)?topBucket.v/curTotal*100:0;
    let flag=null;
    if(topShare>=60&&top)flag={level:topShare>=75?'high':'moderate',text:`${escHtml(top.name)} holds ${topShare.toFixed(0)}% of today's portfolio — a single-account concentration.`};
    else if(topBucketShare>=85&&topBucket)flag={level:'moderate',text:`${topBucketShare.toFixed(0)}% of today's assets sit in one tax treatment (${BUCKET_META[topBucket.k].label}) — limited withdrawal-tax flexibility.`};
    return{cur,ret,curTotal,retTotal,curBuckets,retBuckets,hhi,effN:hhi>0?1/hhi:0,top,topShare,
      topBucket:topBucket?topBucket.k:null,topBucketShare,flag};
  }
  function compute(model){
    model=model||(typeof _model!=='undefined'?_model:null);
    return{
      curAge:(model&&isFinite(model.curAge))?model.curAge:computeAge(state.dob),
      accYrs:model?model.accYrs:0,
      retYrs:model?model.retYrs:0,

      glide:glideSeries(model),
      blendedReturn:blendedReturn(model),
      volatility:volatility(model),
      sharpe:sharpe(model),
      feeDrag:feeDrag(model),
      sequence:sequenceRisk(model),
      diversification:diversification(model),
    };
  }

    blendedReturn,volatility,sharpe,feeDrag,sequenceRisk,diversification,taxBucket,BUCKET_META,ASSET_META};
})();

    if(isFinite(tr)&&tr>=-99&&tr<=200)rec.annReturn=+tr.toFixed(2);
    if(isFinite(tv)&&tv>=0&&tv<=300)rec.annVol=+tv.toFixed(2);
    if(typeof q.name==='string'&&q.name)rec.name=q.name.slice(0,80);
    if(typeof q.exchange==='string'&&q.exchange)rec.exchange=q.exchange.slice(0,60);
    if(typeof q.currency==='string'&&q.currency)rec.currency=q.currency.slice(0,8);
    return rec;
  }

  // ── Live refresh via the Finnhub proxy. Batched + time-sliced; caches successes;
  //    falls back silently. onDone({updated,failed,total,offline,source,proxyReachable}). ──
  function refreshViaProxy(tickers,onDone){
    const base=apiBase();
    tickers=(tickers||[]).map(norm).filter((t,i,a)=>t&&a.indexOf(t)===i);
    const total=tickers.length;
    if(!base||!total){onDone&&onDone({updated:0,failed:total,total,offline:true,source:null,proxyReachable:false});return;}
    const cache=readCache()||{savedAt:null,source:null,data:{}};
    if(!cache.data)cache.data={};
    const batches=[];for(let i=0;i<tickers.length;i+=PROXY_BATCH)batches.push(tickers.slice(i,i+PROXY_BATCH));
    let bi=0,updated=0,failed=0,proxyReachable=false;
    const done=()=>{
      if(updated>0){cache.savedAt=new Date().toISOString();cache.source='finnhub';writeCache(cache);}
      onDone&&onDone({updated,failed,total,offline:updated===0,source:updated>0?'finnhub':null,proxyReachable});
    };
    const runBatch=()=>{
      if(bi>=batches.length){done();return;}
      const batch=batches[bi++];
      // SECURITY-REVIEW: external fetch to our OWN serverless proxy (which holds the secret
      // key server-side — no key is ever present client-side). Symbols are normalized/
      // allow-charactered before being sent; the JSON response is parsed defensively
      // (type/range checks in validateProxyQuote) and NEVER eval'd. Any failure (offline /
      // file:// without override / network / CORS / bad shape) is swallowed so the app keeps
      // working on built-in estimates.
      const safe=batch.map(t=>t.replace(/[^A-Z0-9.\-]/g,'')).filter(Boolean);
      const url=base+(base.indexOf('?')>=0?'&':'?')+'symbols='+encodeURIComponent(safe.join(','));
      let settled=false;
      const nextSoon=(ok)=>{if(settled)return;settled=true;setTimeout(runBatch,ok?250:0);}; // yield between batches
      try{
        const ctrl=(typeof AbortController!=='undefined')?new AbortController():null;
        if(ctrl)setTimeout(()=>{try{ctrl.abort();}catch(e){}},PROXY_TIMEOUT);
        fetch(url,ctrl?{signal:ctrl.signal}:undefined)
          .then(r=>r&&r.ok?r.json():Promise.reject(new Error('bad status')))
          .then(j=>{
            proxyReachable=true;
            if(!j||typeof j!=='object'||!j.quotes||typeof j.quotes!=='object')throw new Error('bad shape');
            batch.forEach(t=>{
              const rec=validateProxyQuote(j.quotes[t]);
              if(rec){cache.data[t]=Object.assign({},cache.data[t],rec);updated++;}else failed++;
            });
            nextSoon(true);

          .catch(()=>{failed+=batch.length;nextSoon(false);});
      }catch(e){failed+=batch.length;nextSoon(false);}
    };
    runBatch();
  }

  // ── Live refresh via keyless Stooq CSV (legacy fallback). Attempts monthly CSV per
  //    ticker, caches successes, falls back silently. ──
  const REFRESH_CONCURRENCY=4; // cap simultaneous fetches; process the rest in waves (time-slice)
  function refreshViaStooq(tickers,onDone){
    tickers=(tickers||[]).map(norm).filter((t,i,a)=>t&&a.indexOf(t)===i);
    const total=tickers.length;
    if(!total){onDone&&onDone({updated:0,failed:0,total:0,offline:true,source:null});return;}
    const cache=readCache()||{savedAt:null,source:null,data:{}};
    if(!cache.data)cache.data={};
    let idx=0,active=0,finished=0,updated=0,failed=0;
    const done=()=>{
      if(updated>0){cache.savedAt=new Date().toISOString();cache.source='stooq.com';writeCache(cache);}
      onDone&&onDone({updated,failed,total,offline:updated===0,source:updated>0?'stooq.com':null});
    };
    const fetchOne=(t)=>{
      // # SECURITY-REVIEW: external network fetch of untrusted third-party market data.
      // Keyless public endpoint (no secrets). Symbol is normalized/allow-charactered before
      // interpolation; the CSV response is parsed defensively (schema check, numeric + range
      // validation, row/size caps) and NEVER eval'd. Any failure (offline / file:// / CORS /
      // malformed body) is swallowed so the app keeps working on built-in estimates.
      const safe=t.replace(/[^A-Z0-9.\-]/g,'');
      let settled=false;
      const finishOne=(ok)=>{
        if(settled)return;settled=true;
        if(ok)updated++;else failed++;
        active--;finished++;
        if(finished===total)done();else pump(); // launch the next queued symbol (wave)
      };
      if(!safe){finishOne(false);return;}
      const url='https://stooq.com/q/d/l/?s='+encodeURIComponent(safe.toLowerCase())+'.us&i=m';
      try{
        const ctrl=(typeof AbortController!=='undefined')?new AbortController():null;
        if(ctrl)setTimeout(()=>{try{ctrl.abort();}catch(e){}},8000);
        fetch(url,ctrl?{signal:ctrl.signal}:undefined)
          .then(r=>r&&r.ok?r.text():Promise.reject(new Error('bad status')))
          .then(txt=>{
            const rows=parseStooqCSV(txt);
            const st=statsFromMonthly(rows);
            if(!st){finishOne(false);return;}
            cache.data[t]={price:st.price,asOf:new Date().toISOString(),annReturn:st.annReturn,annVol:st.annVol,source:'stooq.com'};
            finishOne(true);
          })
          .catch(()=>finishOne(false));
      }catch(e){finishOne(false);}
    };
    function pump(){
      // Keep at most REFRESH_CONCURRENCY fetches in flight; the rest wait their turn
      // so a large holdings list never floods the network or blocks the UI thread.
      while(active<REFRESH_CONCURRENCY&&idx<total){active++;fetchOne(tickers[idx++]);}
    }
    pump();
  }

  // ── Unified refresh: PREFER the Finnhub proxy when a live source is available; fall back
  //    to the keyless Stooq attempt (or when the proxy is unreachable / returns nothing),
  //    then to cache / built-in / estimated. Always offline-safe. ──
  function refresh(tickers,onDone){
    if(liveSourceAvailable()){
      refreshViaProxy(tickers,function(r){
        if(r&&r.updated>0){onDone&&onDone(r);return;} // proxy delivered → done
        // Proxy configured but produced nothing (rate-limited / all failed / bad shape) →
        // try the keyless Stooq path before giving up.
        refreshViaStooq(tickers,function(r2){onDone&&onDone(r2);});
      });
      return;
    }
    refreshViaStooq(tickers,onDone);
  }

  return{LIBRARY,lookup,defaultFor,resolve,all,cacheFor,readCache,status,refresh,refreshViaProxy,refreshViaStooq,apiBase,liveSourceAvailable,parseStooqCSV,statsFromMonthly,SERIES_YEARS,norm};
})();

/* ================================================================
   RIQ.Holdings — PER-ACCOUNT HOLDINGS + PORTFOLIO-SCENARIO BLENDING
   ----------------------------------------------------------------
   Holdings live on each account as acc.holdings = [{id,ticker,name,allocationPct,
   expectedReturn,volatility,expenseRatio,assetClass}]. This module derives a
   portfolio-level blended NET return / volatility / expense ratio and a blended
   year-by-year historical replay series used by the Portfolio scenario.

   Blending method (documented): each holding contributes a DOLLAR weight equal to
   its account's current value (startBal) × its within-account allocation share
   (allocationPct normalized to the account's own total). Blended figures are the
   dollar-weighted averages of each holding's return / vol / expense ratio across
   ALL accounts. If every holding-bearing account has a zero balance (e.g. a brand-
   new plan), we fall back to an equal-account, allocation-weighted average so the
   scenario still works. Volatility is a weighted average of per-holding vol — it
   ignores cross-asset correlation (a documented simplification, consistent with the
   app's existing equity-weight vol approach). The modeling return is NET of expense
   ratio (netReturn = blendedReturn − blendedExpenseRatio), matching the ETF-profile
   convention used elsewhere.
   ================================================================ */
RIQ.Holdings=(function(){
  'use strict';
  function num(v,d){v=+v;return isFinite(v)?v:d;}
  function list(a){return Array.isArray(a&&a.holdings)?a.holdings:[];}
  function activeList(a){return list(a).filter(h=>h&&num(h.allocationPct,0)>0);}
  function allocTotal(a){return list(a).reduce((s,h)=>s+num(h&&h.allocationPct,0),0);}
  function hasHoldings(){return (accounts||[]).some(a=>activeList(a).length>0);}

  // Fill in modeling assumptions for a holding from the ticker library when recognized.
  function assumptionsFor(ticker){
    const lib=RIQ.Tickers.lookup(ticker);
    if(lib)return{name:lib.name,assetClass:lib.assetClass,expectedReturn:lib.expReturn,volatility:lib.vol,expenseRatio:lib.er,estimated:false};
    // Unrecognized ticker → fall back to a best-guess ESTIMATE profile so the row is
    // never left blank. Flagged estimated so the UI can visually mark it "adjust".
    const def=RIQ.Tickers.defaultFor?RIQ.Tickers.defaultFor(ticker):null;
    if(def)return{name:'',assetClass:def.assetClass,expectedReturn:def.expReturn,volatility:def.vol,expenseRatio:def.er,estimated:true};
    return null;
  }
  // Per-holding historical series (aligned to SP500_YEARS). Library series when known,
  // otherwise a flat series at the holding's expected return (so it still participates).
  function holdingSeries(h){
    const lib=RIQ.Tickers.lookup(h&&h.ticker);
    if(lib&&Array.isArray(lib.series)&&lib.series.length)return lib.series;
    const N=RIQ.Tickers.SERIES_YEARS.length;
    return new Array(N).fill(num(h&&h.expectedReturn,7));
  }

  // Build the weighted holding set: [{acc, h, dw, frac}] with dollar weight dw and
  // within-account normalized alloc frac. Also returns whether dollar weights are usable.
  function _weights(){
    const items=[];let dwSum=0;
    (accounts||[]).forEach(a=>{
      const hs=activeList(a);if(!hs.length)return;
      const at=hs.reduce((s,h)=>s+num(h.allocationPct,0),0);if(at<=0)return;
      const aw=Math.max(0,num(a.startBal,0));

    });

  }

  // Portfolio-level blended NET return / vol / expense ratio (percent), or null if no holdings.
  function getBlend(){
    const{items,dwSum}=_weights();

    const useDollar=dwSum>0;

    items.forEach(it=>{const w=useDollar?it.dw:it.frac;

  }

  // Blended year-by-year historical series (percent), aligned to SP500_YEARS.
  function getReplaySeries(){
    const{items,dwSum}=_weights();
    if(!items.length)return null;
    const useDollar=dwSum>0;
    const N=RIQ.Tickers.SERIES_YEARS.length;
    const out=new Array(N).fill(0);let wsum=0;
    items.forEach(it=>{const w=useDollar?it.dw:it.frac;if(w<=0)return;wsum+=w;
      const s=holdingSeries(it.h);for(let i=0;i<N;i++)out[i]+=w*num(s[i],0);});

  }
  // Blended replay return (fraction) for a calendar year, mapped like the S&P replay.
  function getReplayReturn(calendarYear){
    const s=getReplaySeries();if(!s)return null;
    const info=getHistoricalYearInfo(calendarYear);
    const idx=info.idx%s.length;
    const v=s[idx];return isFinite(v)?v/100:null;
  }
  // Per-account blended summary (for the card's left column).
  function accountSummary(a){
    const hs=activeList(a);if(!hs.length)return null;
    const at=hs.reduce((s,h)=>s+num(h.allocationPct,0),0);if(at<=0)return null;

      r+=f*num(h.expectedReturn,7);v+=f*num(h.volatility,15);e+=f*num(h.expenseRatio,0);});
    return{expReturn:r,vol:v,er:e,netReturn:r-e,allocTotal:allocTotal(a),count:hs.length};
  }

  return{list,activeList,allocTotal,hasHoldings,assumptionsFor,getBlend,getReplaySeries,getReplayReturn,accountSummary,holdingSeries,_weights};
})();

/* ================================================================
   RIQ.Simulation — MONTE CARLO ENGINE (Phase 2)
   Draws randomized annual return sequences and runs the SAME buildModel()
   lifetime projection per trial via a shared parameterized code path
   (opts.returnOverride). Time-sliced so 10,000+ trials never freeze the UI.

RIQ.Simulation=(function(){
  'use strict';
  // ── Seedable RNG (Mulberry32) — reproducible runs ──
  function mulberry32(seed){let a=seed>>>0;return function(){a=(a+0x6D2B79F5)>>>0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}

  // ── Resolve MC configuration from state (sensible fallbacks; expected returns default to accum/retire rates) ──
  function resolveConfig(){
    const s=state,clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
    let meanAccum=((s.mcAccumReturn!=null?+s.mcAccumReturn:+s.accumRate)||9.5)/100;
    let meanRetire=((s.mcRetireReturn!=null?+s.mcRetireReturn:+s.retireRate)||9.0)/100;
    let volAccum=(+s.mcAccumVol||15)/100, volRetire=(+s.mcRetireVol||12)/100;
    let respectGlide=s.mcRespectGlide!==false;
    // Portfolio scenario: feed the holdings-derived blended NET return / vol into Monte Carlo
    // (whole-portfolio figures), and bypass the glide overlay since holdings already define
    // the allocation (its effect is baked into the blend) — consistent with the deterministic path.
    if(s.portfolioScenario&&window.RIQ&&RIQ.Holdings&&RIQ.Holdings.hasHoldings()){
      const b=RIQ.Holdings.getBlend();
      if(b){meanAccum=meanRetire=b.netReturn;volAccum=volRetire=(b.vol||15)/100;respectGlide=false;}
    }

      trials:clamp(Math.round(+s.mcTrials||10000),1000,50000),
      meanAccum,
      meanRetire,
      volAccum,
      volRetire,

      bearClustering:!!s.mcBearClustering,
      fatTails:!!s.mcFatTails,
      inflationShocks:!!s.mcInflationShocks,
      inflationVol:(+s.mcInflationVol||1.5)/100,
      baseInflation:(+s.inflationRate||3)/100,
      blackSwan:!!s.mcBlackSwan,
      blackSwanProb:(+s.mcBlackSwanProb||2)/100,
      blackSwanDrop:(+s.mcBlackSwanDrop||35)/100,

  // ── One randomized annual equity-return sequence for a single trial ──
  // Regime features (all toggleable): historical bootstrap, sequence-of-returns randomization,
  // fat tails (Student-t), mean reversion, bear-market clustering, and injectable Black-Swan events.
  function drawSequence(rng,cfg,n,accYrs){
    const seq=new Array(n),hist=SP500_ARRAY,HL=hist.length;
    let prevDev=0,prevNeg=false;
    for(let k=0;k<n;k++){

      } else {

        if(cfg.bearClustering&&prevNeg)mean=mean-vol*0.6; // negative years beget negative years

  // ── Run one trial → net worth per age index + failure info (reuses buildModel) ──
  function runOneTrial(rng,cfg,ctx){

  }

  // ── Public: run N trials, time-sliced via rAF, then compute full statistics ──
  // opts.onProgress(pct,done,total), opts.onComplete(results), opts.trialsOverride, opts.seed.
  // Returns a controller { cancel() }.
  function run(opts){
    opts=opts||{};
    const cfg=resolveConfig();
    if(opts.trialsOverride)cfg.trials=Math.max(1000,Math.min(50000,opts.trialsOverride|0));
    const curAge=computeAge(state.dob);
    const retAge=+(state.retireAge||55),lifeAge=+(state.lifeExpectancy||90);
    const accYrs=Math.max(0,retAge-curAge);
    const n=Math.max(1,lifeAge-curAge+1);
    const ctx={curAge,calYear:cy(),n,accYrs,zeros:new Array(n).fill(0)};
    const ages=[];for(let a=curAge;a<=lifeAge;a++)ages.push(a);
    const N=cfg.trials;
    const seed=(opts.seed!=null?opts.seed:(Date.now()>>>0))>>>0;
    const rng=mulberry32(seed);
    const byAge=[];for(let i=0;i<n;i++)byAge.push(new Float64Array(N));
    const endEstates=new Float64Array(N);
    const failAges=new Int16Array(N).fill(-1);
    // Compact per-trial risk metrics — only allocated when the caller asks to retain trials
    // (the Monte Carlo tab). Overview/optimizer runs skip this entirely, so their memory &
    // speed are unchanged. Scalars only: ~14 bytes/trial (~0.7 MB at 50k trials).
    const retain=!!opts.retainTrials;
    const worstRets=retain?new Float32Array(N):null;
    const minBals=retain?new Float64Array(N):null;
    const maxDDs=retain?new Float32Array(N):null;
    const samplePathCount=retain?Math.max(0,Math.min(12,opts.samplePaths!=null?(opts.samplePaths|0):7)):0;
    let done=0,cancelled=false;
    const CHUNK=Math.max(40,Math.min(400,Math.round(2500000/(n*45))||150)); // adaptive time-slice

    function finish(){
      let failCount=0;const failAgeList=[];
      for(let t=0;t<N;t++){if(failAges[t]>=0){failCount++;failAgeList.push(failAges[t]);}}
      const successProb=(N-failCount)/N;
      const se=Math.sqrt(Math.max(0,successProb*(1-successProb)/N));
      const ci=[Math.max(0,successProb-1.96*se),Math.min(1,successProb+1.96*se)];
      const est=Array.from(endEstates).sort((a,b)=>a-b);
      const endStats={median:pctile(est,0.5),worst5:pctile(est,0.05),worst10:pctile(est,0.10),best5:pctile(est,0.95),
        p5:pctile(est,0.05),p10:pctile(est,0.10),p25:pctile(est,0.25),p50:pctile(est,0.50),p75:pctile(est,0.75),p90:pctile(est,0.90),p95:pctile(est,0.95),
        min:est[0]||0,max:est[est.length-1]||0,mean:est.reduce((s,v)=>s+v,0)/(est.length||1)};
      const bands={p5:[],p10:[],p25:[],p50:[],p75:[],p90:[],p95:[]};
      const exhaustByAge=[];
      for(let i=0;i<n;i++){
        const arr=Array.from(byAge[i]).sort((a,b)=>a-b);
        bands.p5.push(pctile(arr,0.05));bands.p10.push(pctile(arr,0.10));bands.p25.push(pctile(arr,0.25));

        const age=ages[i];let failedBy=0;
        for(let t=0;t<N;t++){if(failAges[t]>=0&&failAges[t]<=age)failedBy++;}
        exhaustByAge.push(failedBy/N);
      }
      failAgeList.sort((a,b)=>a-b);
      const medianFailAge=failAgeList.length?Math.round(pctile(failAgeList,0.5)):null;
      const results={cfg,seed,trials:N,ages,bands,endStats,successProb,ci,failCount,medianFailAge,exhaustByAge,curAge,retAge,lifeAge,accYrs,generatedAt:Date.now()};
      if(retain){

        if(samplePathCount>0){

            const t=idxByEst[Math.round(p*(N-1))];

      if(!cancelled&&opts.onComplete)opts.onComplete(results);
    }
    function step(){
      if(cancelled)return;
      const end=Math.min(done+CHUNK,N);
      for(;done<end;done++){
        const tr=runOneTrial(rng,cfg,ctx);

        endEstates[done]=tr.endEstate;
        if(tr.failAge!=null)failAges[done]=tr.failAge;
        if(retain){worstRets[done]=tr.worstRet;minBals[done]=tr.minRetBal;maxDDs[done]=tr.maxDD;}
      }
      if(opts.onProgress)opts.onProgress(done/N,done,N);

      if(done<N)schedule(step);else finish();
    }
    const schedule=window.requestAnimationFrame||function(f){setTimeout(f,0);};
    schedule(step);
    return{cancel(){cancelled=true;}};
  }

  return{run,resolveConfig,drawSequence,_pctile:pctile,_mulberry32:mulberry32};
})();
RIQ.Simulation._lastResults=null; // cache of the most recent run (per session)

/* ================================================================
   RIQ.Withdrawal — WITHDRAWAL STRATEGY OPTIMIZER + ROTH CONVERSION OPTIMIZER (Phase 5/6)
   ----------------------------------------------------------------
   • A library of pluggable, testable withdrawal strategies. Each strategy is a PURE
     function (args) → annual portfolio-withdrawal target ($, nominal, pre-floor/legacy).
     buildModel() selects one via state.withdrawalStrategy and calls resolve(). The
     'required' strategy reproduces the legacy default (draw = spending need − SS) exactly.
   • optimizeRothConversions(): searches candidate conversion ceilings (none / fill-12% /
     fill-22% / fill-24% / aggressive-32%) by re-running buildModel() for each and scoring
     the FULL lifetime tax cost — income tax + conversion tax + estimated IRMAA surcharges +
     heirs' tax on inherited pre-tax under the SECURE 10-year rule — then picks the minimum.
   • Lab helpers run each strategy through the deterministic model and (async) Monte Carlo.
   The existing RIQ.Withdrawal.runSimulation pass-through is preserved.
   ================================================================ */
(function(){
  'use strict';
  RIQ.Withdrawal=RIQ.Withdrawal||{};

  // Bogleheads-style default Variable Percentage Withdrawal table (≈60/40), % of balance by age.
  const DEFAULT_VPW={50:3.3,55:3.6,60:4.0,65:4.6,70:5.3,75:6.4,80:8.0,85:10.4,90:14.3,95:20.0,100:25.0};
  RIQ.Withdrawal.DEFAULT_VPW=DEFAULT_VPW;

  // Linear-interpolated VPW percentage for a given age.
  function vpwPct(age,table){
    const t=(table&&Object.keys(table).length)?table:DEFAULT_VPW;
    const keys=Object.keys(t).map(Number).sort((a,b)=>a-b);
    if(age<=keys[0])return t[keys[0]];
    if(age>=keys[keys.length-1])return t[keys[keys.length-1]];
    for(let i=0;i<keys.length-1;i++){
      const lo=keys[i],hi=keys[i+1];
      if(age>=lo&&age<=hi){const w=(age-lo)/(hi-lo);return t[lo]*(1-w)+t[hi]*w;}
    }
    return t[keys[keys.length-1]];
  }
  RIQ.Withdrawal.vpwPct=vpwPct;

  // ── Strategy library — each is a pure function of its argument bag ──
  // args includes: portfolio, netNeed, annualNeed, totalSS, age, year, yearsIntoRetire, infl,
  //   retInflFactor, initialWithdrawal, initialWR, prevWithdrawal, prevSpend, prevReturnNeg,
  //   isRecoveryYear, rmd, bracketFill, p (resolved params).
  const strategies={
    // Legacy default — the household spending need net of Social Security.
    required(a){return a.netNeed;},
    // 4% Rule — fixed real: initial % of retirement-start balance, inflation-adjusted each year.
    fourpct(a){return Math.max(0,a.initialWithdrawal*a.retInflFactor);},
    // Dynamic Spending — a fixed % of the CURRENT balance every year.
    dynamic(a){return Math.max(0,a.portfolio*((a.p.dynamicPct||4)/100));},
    // Variable Percentage Withdrawal — age-based % of current balance.
    vpw(a){return Math.max(0,a.portfolio*(vpwPct(a.age,a.p.vpwTable)/100));},
    // Floor & Ceiling — % of balance, bounded within an inflation-adjusted floor/ceiling band.
    floorceiling(a){
      const target=a.portfolio*((a.p.dynamicPct||4)/100);
      const floor=a.initialWithdrawal*(1-(a.p.floorPct||15)/100)*a.retInflFactor;
      const ceil=a.initialWithdrawal*(1+(a.p.ceilPct||20)/100)*a.retInflFactor;
      return Math.max(0,Math.max(floor,Math.min(ceil,target)));
    },
    // Guyton-Klinger — guardrails with inflation, capital-preservation & prosperity rules.
    guyton(a){
      let w=a.prevWithdrawal>0?a.prevWithdrawal:a.initialWithdrawal;
      // Inflation rule: raise with inflation, but skip the raise following a down (negative-return) year.
      if(!a.prevReturnNeg)w=w*(1+a.infl);
      if(a.portfolio>0){
        const wr=w/a.portfolio,initWR=a.initialWR||0.04;
        const upper=initWR*(1+(a.p.guardBand||20)/100);
        const lower=initWR*(1-(a.p.guardBand||20)/100);
        if(wr>upper)w=w*(1-(a.p.guardCut||10)/100);       // capital-preservation cut
        else if(wr<lower)w=w*(1+(a.p.guardRaise||10)/100); // prosperity raise
      }
      return Math.max(0,w);
    },
    // Configurable decision-rule guardrails (symmetric bands & adjustment).
    guardrails(a){
      let w=a.prevWithdrawal>0?a.prevWithdrawal*(1+a.infl):a.initialWithdrawal;
      if(a.portfolio>0){
        const wr=w/a.portfolio,initWR=a.initialWR||0.04;
        if(wr>initWR*(1+(a.p.guardUpper||20)/100))w*=(1-(a.p.guardAdjust||10)/100);
        else if(wr<initWR*(1-(a.p.guardLower||20)/100))w*=(1+(a.p.guardAdjust||10)/100);
      }
      return Math.max(0,w);
    },
    // Bucket Strategy — cash reserve smooths spending: freeze at prior nominal after a down/recovery
    // year (the cash bucket covers the gap), fund the full need otherwise.
    bucket(a){
      if((a.prevReturnNeg||a.isRecoveryYear)&&a.prevSpend>0)return Math.min(a.netNeed,a.prevSpend);
      return a.netNeed;
    },
    // Income Target — target a fixed NET income (after tax + SS); gross up the draw for taxes.
    incometarget(a){
      const targetNom=(a.p.targetIncome||90000)*a.retInflFactor;
      const gap=Math.max(0,targetNom-a.totalSS);
      const grossUp=1/Math.max(0.5,(1-(a.p.taxGrossUp||12)/100));

    // RMD-First — spend the Required Minimum Distribution, supplement up to the need.

    taxopt(a){return Math.max(a.netNeed,Math.max(0,a.bracketFill||0));},

  // Ordered, labeled catalog for the UI (and for the Lab comparison).
  RIQ.Withdrawal.catalog=[
    {key:'required',    name:'Required Spending', short:'Fund the inflation-adjusted lifestyle need net of Social Security (legacy default).'},
    {key:'fourpct',     name:'4% Rule',           short:'Fixed real: 4% of the retirement-start balance, inflation-adjusted each year.'},
    {key:'dynamic',     name:'Dynamic Spending',  short:'Withdraw a fixed percentage of the current balance every year.'},
    {key:'guyton',      name:'Guyton-Klinger',    short:'Guardrails with capital-preservation & prosperity rules.'},
    {key:'vpw',         name:'VPW',               short:'Variable Percentage Withdrawal — age-based percentage table.'},
    {key:'floorceiling',name:'Floor & Ceiling',   short:'Percent-of-balance spending bounded within a floor/ceiling band.'},
    {key:'bucket',      name:'Bucket Strategy',   short:'Cash reserve smooths spending through down markets.'},
    {key:'incometarget',name:'Income Target',     short:'Target a fixed net income after taxes + Social Security.'},
    {key:'rmdfirst',    name:'RMD-First',         short:'Spend Required Minimum Distributions, supplement up to the need.'},
    {key:'taxopt',      name:'Tax-Optimized',     short:'Fill ordinary income to the top of a target bracket.'},
    {key:'guardrails',  name:'Guardrails',        short:'Configurable decision-rule spending bands.'},
  ];

  // Resolve all strategy tuning parameters from state (sensible fallbacks).
  function resolveParams(){

      dynamicPct:+s.wdDynamicPct||4,
      fourPctRate:+s.wdFourPctRate||4,
      floorPct:s.wdFloorPct!=null?+s.wdFloorPct:15,
      ceilPct:s.wdCeilPct!=null?+s.wdCeilPct:20,
      guardBand:s.wdGuardBand!=null?+s.wdGuardBand:20,
      guardCut:s.wdGuardCut!=null?+s.wdGuardCut:10,
      guardRaise:s.wdGuardRaise!=null?+s.wdGuardRaise:10,
      guardUpper:s.wdGuardUpper!=null?+s.wdGuardUpper:20,
      guardLower:s.wdGuardLower!=null?+s.wdGuardLower:20,
      guardAdjust:s.wdGuardAdjust!=null?+s.wdGuardAdjust:10,
      targetIncome:+s.wdTargetIncome||90000,
      taxGrossUp:s.wdTaxGrossUp!=null?+s.wdTaxGrossUp:12,
      targetBracket:(+s.wdTargetBracket||22)/100,
      vpwTable:(s.wdVpwTable&&Object.keys(s.wdVpwTable).length)?s.wdVpwTable:DEFAULT_VPW,
    };
  }
  RIQ.Withdrawal.resolveParams=resolveParams;

  // Compute the annual withdrawal target for the selected strategy (called from buildModel).
  function resolve(inp){
    const p=inp.params||resolveParams();
    const ctx=inp.ctx||{};
    const retInflFactor=Math.pow(1+(inp.infl||0),inp.yearsIntoRetire||0);
    const rmd=(inp.age>=73&&inp.preTaxStart>0)?inp.preTaxStart/((typeof RMD_FACTORS!=='undefined'&&RMD_FACTORS[Math.min(inp.age,100)])||6.4):0;
    let bracketFill=0;
    if(inp.strategy==='taxopt'){
      const std=getStdDeduction(inp.age,inp.year,inp.filingStatus);
      const ssIncl=(inp.totalSS||0)*0.85;
      const top=bracketTopForRate(p.targetBracket,inp.year,inp.filingStatus);
      bracketFill=Math.max(0,top-Math.max(0,ssIncl-std));
    }
    const args={
      portfolio:inp.portfolio||0,netNeed:inp.netNeed||0,annualNeed:inp.annualNeed||0,
      totalSS:inp.totalSS||0,age:inp.age,year:inp.year,yearsIntoRetire:inp.yearsIntoRetire||0,
      infl:inp.infl||0,retInflFactor,isRecoveryYear:!!inp.isRecoveryYear,
      initialWithdrawal:ctx.initialWithdrawal||0,initialWR:ctx.initialWR||(p.fourPctRate/100),
      prevWithdrawal:ctx.prevWithdrawal||0,prevSpend:ctx.prevSpend||0,prevReturnNeg:!!ctx.prevReturnNeg,
      rmd,bracketFill,p,

  }
  RIQ.Withdrawal.resolve=resolve;

  // ── IRMAA (Medicare premium surcharge) estimate — used ONLY for optimizer scoring, never in the model.
  // 2026-projected MFJ MAGI thresholds; single ≈ half. Annual per-person Part B + D surcharge (approx).
  const IRMAA_TIERS_MFJ=[
    {magi:212000,annual:0},
    {magi:266000,annual:1120},
    {magi:334000,annual:2810},
    {magi:400000,annual:4500},
    {magi:750000,annual:6190},
    {magi:Infinity,annual:6760},
  ];
  function estimateIRMAA(row,filingStatus){
    if(!row||row.age<65)return 0; // Medicare eligibility
    const magi=(row.drawFromPreTax||0)+(row.conversionAmount||0)+(row.totalSS||0)*0.85+(row.drawFromTaxable||0)*((+state.costBasisPct||60)/100);
    const single=filingStatus==='single'||filingStatus==='hoh'||filingStatus==='mfs';
    const persons=(filingStatus==='mfj')?2:1;
    const scale=single?0.5:1;
    let annual=0;
    for(const t of IRMAA_TIERS_MFJ){if(magi<=t.magi*scale){annual=t.annual;break;}}
    return annual*persons;
  }
  RIQ.Withdrawal.estimateIRMAA=estimateIRMAA;

  // Full lifetime tax cost of a built model (income tax + conversion tax + IRMAA + heirs' 10-yr rule tax).
  function lifetimeTaxCost(m){
    const T=m.totals||{};
    const heirRate=(+state.heirTaxRate||24)/100;
    const endingPreTax=T.finalPreTax||0;
    const heirTax=Math.round(endingPreTax*heirRate);
    const fs=state.filingStatus||'mfj';
    let irmaa=0;
    m.rows.forEach(r=>{if(r.phase==='Retirement')irmaa+=estimateIRMAA(r,fs);});

  // ── Roth Conversion Optimizer ──
  // Re-runs buildModel() for each candidate conversion ceiling and returns the schedule that
  // minimizes total lifetime tax. Respects the model's crash-aware conversion pausing.
  function optimizeRothConversions(){
    const candidates=[
      {key:'none',      label:'No Conversions',     ceiling:0},
      {key:'b12',       label:'Fill 12% bracket',    ceiling:0.12},
      {key:'b22',       label:'Fill 22% bracket',    ceiling:0.22},
      {key:'b24',       label:'Fill 24% bracket',    ceiling:0.24},
      {key:'aggressive',label:'Aggressive (32%)',    ceiling:0.32},
    ];
    const saved=state.rothConvCeilingBracket;
    const results=candidates.map(c=>{
      state.rothConvCeilingBracket=c.ceiling;

        m=buildModel();

        schedule=m.rows.filter(r=>r.phase==='Retirement'&&(r.conversionAmount||0)>0)
          .map(r=>({age:r.age,year:r.yr,amount:Math.round(r.conversionAmount),tax:Math.round(r.conversionTax||0),bracket:c.ceiling}));
      }catch(e){cost={totalLifetimeTax:Infinity,incomeTax:0,irmaa:0,heirTax:0,endingRoth:0,endingPreTax:0,endEstate:0,convertSum:0};}
      return Object.assign({},c,cost,{schedule,totalConverted:schedule.reduce((s,x)=>s+x.amount,0)});
    });

    results.forEach(r=>{r.savedVsNone=Math.round((baseline.totalLifetimeTax||0)-(r.totalLifetimeTax||0));});

  RIQ.Withdrawal.optimizeRothConversions=optimizeRothConversions;

  // ── Strategy Lab: deterministic metrics for one strategy (temporarily patches state) ──
  function evaluateStrategy(key){
    const saved=state.withdrawalStrategy;

      const m=buildModel();
      const ret=m.rows.filter(r=>r.phase==='Retirement');
      const cost=lifetimeTaxCost(m);
