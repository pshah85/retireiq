// Temporarily override state fields, run buildModel(), return {rows, finalTotal}
function runSimulation(overrides){
  const saved={};
  Object.keys(overrides).forEach(k=>{saved[k]=state[k];state[k]=overrides[k];});
  let result=null;
  try{
    const m=buildModel();
    const retRows=m.rows.filter(r=>r.phase==='Retirement');
    const lastRow=retRows.length?retRows[retRows.length-1]:null;
    result={rows:retRows,finalTotal:lastRow?lastRow.total:0,model:m};
  } catch(e){result={rows:[],finalTotal:0,model:null};}
  Object.keys(saved).forEach(k=>{state[k]=saved[k];});
  return result;
}

// Run an isolated buildModel() with ONLY the specified crash active (no inherited state crashes).
// Uses a deep copy of state.crashes to prevent reference-mutation bugs.
// crashOverride: {crashAge, drop, recoveryYears, enabled, id, label} or null for no crash.
// Returns the final portfolio total from the last row of the model.
function _runIsolatedModel(crashOverride){
  const savedEnabled=state.crashMasterEnabled;
  const savedCrashes=JSON.parse(JSON.stringify(state.crashes||[]));
  if(crashOverride){
    state.crashMasterEnabled=true;
    state.crashes=[crashOverride];
  }else{
    state.crashMasterEnabled=false;
    state.crashes=[];
  }
  let estate=0;
  try{
    const m=buildModel();
    const lastRow=m.rows[m.rows.length-1];
    estate=lastRow?lastRow.total:0;
  }catch(e){
    console.error('_runIsolatedModel error:',e,crashOverride);
  }
  state.crashMasterEnabled=savedEnabled;
  state.crashes=savedCrashes;
  return estate;
}

function renderLegacyPreservationPanel(){
  try{
  if(!_model||!_model.rows)return'';
  const retRows=_model.rows.filter(r=>r.phase==='Retirement');
  if(!retRows.length)return'';

  const target=+(state.legacyTarget)||0;
  const lastRow=retRows[retRows.length-1];
  const baseEstate=lastRow.total;
  const lifeAge=state.lifeExpectancy;
  const curAge=_model.curAge;
  const lastRetYrs=lastRow.age-curAge;
  const baseEstateDisp=displayMoney(baseEstate,lastRetYrs);

  // ── Risk factor scanning ──
  const risks=[];
  const enabledCrashes=(state.crashes||[]).filter(c=>c.enabled&&state.crashMasterEnabled);
  const earlyRetCrashes=enabledCrashes.filter(c=>+c.crashAge>=+state.retireAge&&+c.crashAge<=+state.retireAge+5);
  if(enabledCrashes.length===0){
    risks.push({severity:'medium',icon:'📊',text:'No crash scenarios active — add one in the Market Crash Simulator to model Sequence-of-Returns risk.'});
  }else if(earlyRetCrashes.length>0){
    const crashAgesList=earlyRetCrashes.map(c=>c.crashAge).join(' & age ');
    risks.push({severity:'high',icon:'⚠',text:`Crash at age ${crashAgesList} creates severe sequence-of-returns risk — the most dangerous time to experience a market drop.`});
  }
  const highSWRYears=retRows.filter(r=>r.age>=+state.retireAge&&r.age<=+state.retireAge+5&&(r.swr||0)>5);
  if(highSWRYears.length>0){
    const peakSWR=Math.max(...highSWRYears.map(r=>r.swr||0));
    risks.push({severity:'high',icon:'📉',text:`SWR exceeds 5% in ${highSWRYears.length} early retirement year${highSWRYears.length>1?'s':''} (peak: ${peakSWR.toFixed(1)}%). Portfolio sustainability at risk.`});
  }
  const preTaxGoneRow=retRows.find((r,i,a)=>i>0&&a[i-1].preTaxPool>0&&r.preTaxPool<=0);
  if(preTaxGoneRow&&preTaxGoneRow.age<73){
    risks.push({severity:'medium',icon:'⚠',text:`Pre-Tax pool depleted at age ${preTaxGoneRow.age} — before RMD age 73. Consider slower pre-tax draws or more Roth conversion.`});
  }
  const rothDrawYears=retRows.filter(r=>(r.drawFromRoth||0)>0);
  if(rothDrawYears.length>0){
    risks.push({severity:'medium',icon:'🔴',text:`Roth IRA being drawn in ${rothDrawYears.length} year${rothDrawYears.length>1?'s':''} starting age ${rothDrawYears[0].age}. Legacy account being eroded.`});
  }

  // ── Recommendation engine ──
  const recs=[];
  const addRec=(title,detail,impact,actionKey,actionVal)=>{
    if(Math.abs(impact)<1000)return; // skip negligible
    recs.push({title,detail,impact:Math.round(impact),actionKey,actionVal});
  };

  // 1. Delay SS to 70
  if(+state.ssClaimAge<70&&+state.ssMonthly>0){
    const sim=runSimulation({ssClaimAge:70});
    addRec(`Delay SS to age 70 (vs ${state.ssClaimAge})`,
      `Each year of delay after FRA adds 8% permanently. Reduces portfolio draw for the rest of life.`,
      sim.finalTotal-baseEstate,'ssClaimAge',70);
  }

  // 2. Retire 2 years later
  if(+state.retireAge<68){
    const sim=runSimulation({retireAge:+state.retireAge+2});
    addRec(`Retire at ${+state.retireAge+2} instead of ${state.retireAge}`,
      `2 more contribution years + 2 fewer withdrawal years. Significant compounding effect.`,
      sim.finalTotal-baseEstate,null,null);
  }

  // 3. Reduce spending 10%
  {
    const sim=runSimulation({lifestyleBase:state.lifestyleBase*0.9});
    addRec(`Reduce annual spending by 10% ($${Math.round(state.lifestyleBase*0.1).toLocaleString()}/yr)`,
      `Lower draw rate extends portfolio longevity and reduces sequence-of-returns risk.`,
      sim.finalTotal-baseEstate,null,null);
  }

  // 4. Increase retire rate by 1% (more aggressive allocation)
  if(state.retireRate<10){
    const sim=runSimulation({retireRate:Math.min(10,state.retireRate+1)});
    addRec(`Increase retirement portfolio return by 1% (${state.retireRate}% → ${Math.min(10,state.retireRate+1)}%)`,
      `Slightly more equity allocation in retirement. Higher risk but significantly better legacy outcome.`,
      sim.finalTotal-baseEstate,null,null);
  }

  // 5. Move crash earlier (pre-retirement) — advisory only
  if(earlyRetCrashes.length>0){
    const shifted=enabledCrashes.map(c=>{
      if(+c.crashAge>=+state.retireAge)return{...c,crashAge:Math.max(+state.retireAge-8,curAge+1)};
      return c;
    });
    const savedCrashes=state.crashes;state.crashes=shifted;
    const sim=runSimulation({});
    state.crashes=savedCrashes;
    addRec(`Move crash to age ${Math.max(+state.retireAge-8,curAge+1)} (pre-retirement)`,
      `Crashes before retirement hurt less — you\'re still contributing. Crashes at retirement trigger sequence-of-returns risk.`,
      sim.finalTotal-baseEstate,null,null);
  }

  // Sort by impact desc
  recs.sort((a,b)=>b.impact-a.impact);

  // ── Sequence-of-returns callout ──
  // Each scenario uses _runIsolatedModel() which deep-copies and restores state.crashes,
  // so runs are fully isolated from each other and from the user's active crash config.
  let sorCallout='';
  {
    const sorRetireAge=+state.retireAge;

    if(enabledCrashes.length>0){
      // Use the first enabled crash's parameters for the comparison
      const refCrash=enabledCrashes[0];
      const refDrop=+(refCrash.drop)||37;
      const refRecovery=+(refCrash.recoveryYears)||3;
      const crashesAtOrAfterRet=enabledCrashes.filter(c=>+c.crashAge>=sorRetireAge);

      if(crashesAtOrAfterRet.length>0){
        // Crashes at/near retirement — show the direct timing comparison
        const retCrashAge=+crashesAtOrAfterRet[0].crashAge;
        const retDrop=+(crashesAtOrAfterRet[0].drop)||37;
        const retRecovery=+(crashesAtOrAfterRet[0].recoveryYears)||3;
        const preAge=Math.max(curAge+1,sorRetireAge-10);
        // Isolated runs: ONLY the specified crash, no other scenarios
        const _sorBase={id:'sor-test',label:'SOR Test',enabled:true,drop:retDrop,recoveryYears:retRecovery};
        const retireCrashEstate=_runIsolatedModel({..._sorBase,crashAge:retCrashAge});
        const preRetireCrashEstate=_runIsolatedModel({..._sorBase,crashAge:preAge});
        // SOR cost = how much MORE damaging the retirement-timed crash is
        const sorCost=preRetireCrashEstate-retireCrashEstate;
        console.log('[SOR-check] retireCrash:',retireCrashEstate,'preRetireCrash:',preRetireCrashEstate,'diff:',sorCost);
        const targetAge=Math.max(sorRetireAge-5,curAge+1);
        sorCallout=`
    <div style="margin-bottom:16px;padding:14px 18px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.25);border-left:4px solid var(--danger);border-radius:10px">
      <div style="font-weight:700;color:var(--danger);margin-bottom:6px">💡 Sequence-of-Returns Risk</div>
      <div style="font-size:.88rem;color:var(--text);line-height:1.55">
        A crash at age <strong>${retCrashAge}</strong> (retirement year ${retCrashAge-sorRetireAge+1})
        vs the same crash at age <strong>${preAge}</strong> (pre-retirement) costs an estimated
        <strong style="color:var(--danger)">${displayMoney(Math.max(0,sorCost),lastRetYrs)}</strong> more in final estate value — this is Sequence-of-Returns Risk.
        At retirement, withdrawals have begun and there are no contributions to buy assets at depressed prices.
      </div>
      <button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="
        (function(){var ret=${sorRetireAge},ca=${curAge};
        (state.crashes||[]).forEach(function(c){if(c.enabled&&+c.crashAge>=ret)c.crashAge=Math.max(ret-5,ca+1);});
        recalcNow();})()
      ">Move crash(es) to age ${targetAge} →</button>
    </div>`;
      }else{
        // All crashes are pre-retirement — show how much worse the same crash at retirement would be
        const preAge=+refCrash.crashAge;
        const retCompareAge=sorRetireAge+2;
        const _sorBase2={id:'sor-test',label:'SOR Test',enabled:true,drop:refDrop,recoveryYears:refRecovery};
        const preRetireCrashEstate=_runIsolatedModel({..._sorBase2,crashAge:preAge});
        const retireCrashEstate=_runIsolatedModel({..._sorBase2,crashAge:retCompareAge});
        const sorRisk=preRetireCrashEstate-retireCrashEstate;
        console.log('[SOR-check] preRetireCrash:',preRetireCrashEstate,'retireCrash:',retireCrashEstate,'diff:',sorRisk);
        sorCallout=`
    <div style="margin-bottom:16px;padding:14px 18px;background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.25);border-left:4px solid var(--success);border-radius:10px">
      <div style="font-weight:700;color:var(--success);margin-bottom:6px">📊 Sequence-of-Returns Risk</div>
      <div style="font-size:.88rem;color:var(--text);line-height:1.55">
        Your crash scenario(s) occur before retirement — relatively lower risk.
        The same crash at retirement (age <strong>${retCompareAge}</strong>) would cost
        <strong style="color:var(--danger)">${displayMoney(Math.max(0,sorRisk),lastRetYrs)}</strong> more in final estate value.
      </div>
    </div>`;
      }
    }else{
      // No active crashes — show hypothetical −37% comparison, clearly labelled
      const hypoRetAge=sorRetireAge;
      const hypoEarlyAge=Math.max(sorRetireAge-10,curAge+1);
      const _sorBase3={id:'sor-test',label:'SOR Test',enabled:true,drop:37,recoveryYears:3};
      const hypoRetEstate=_runIsolatedModel({..._sorBase3,crashAge:hypoRetAge});
      const hypoEarlyEstate=_runIsolatedModel({..._sorBase3,crashAge:hypoEarlyAge});
      const hypoDiff=hypoEarlyEstate-hypoRetEstate;
      console.log('[SOR-check] hypoRetCrash:',hypoRetEstate,'hypoEarlyCrash:',hypoEarlyEstate,'diff:',hypoDiff);
      sorCallout=`
    <div style="margin-bottom:16px;padding:14px 18px;background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.25);border-left:4px solid var(--orange);border-radius:10px">
      <div style="font-weight:700;color:var(--orange);margin-bottom:6px">📊 Sequence-of-Returns Risk (Hypothetical)</div>
      <div style="font-size:.88rem;color:var(--text);line-height:1.55">
        <em>Hypothetical:</em> A −37% crash at retirement (age <strong>${hypoRetAge}</strong>) costs ~<strong style="color:var(--danger)">${displayMoney(Math.max(0,hypoDiff),lastRetYrs)}</strong> more than the same crash at age <strong>${hypoEarlyAge}</strong>.
        Enable a crash scenario to see your actual sequence-of-returns risk.
      </div>
    </div>`;
    }
  }
  // _runIsolatedModel() saves/restores state and never writes to _model,
  // so the global _model is already the real user model at this point.

  // ── Progress bar ──
  let progressBar='';
  if(target>0){
    const pct=Math.min(100,Math.round(baseEstate/target*100));
    const barColor=pct>=80?'var(--success)':pct>=50?'var(--orange)':'var(--danger)';
    const estateLabel=displayMoney(baseEstate,lastRetYrs);
    const targetLabel=displayMoney(target,lastRetYrs);
    progressBar=`
    <div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">

        <span style="font-size:.88rem"><strong style="color:${barColor}">${estateLabel}</strong> <span style="color:var(--text-muted)">/ ${targetLabel} target</span></span>

      <div style="height:8px;border-radius:4px;background:var(--surface3);overflow:hidden">

      </div>

  // ── Recommendations HTML ──
  const recHtml=recs.length?`
  <div>
    <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px">💡 Recommendations (by impact)</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${recs.slice(0,5).map((r,i)=>`
      <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px">
        <div style="flex-shrink:0;font-size:.95rem;color:${r.impact>0?'var(--success)':'var(--danger)'};font-weight:700;min-width:80px;padding-top:1px">${r.impact>0?'+':''}${displayMoney(r.impact,lastRetYrs)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.86rem;font-weight:600;color:var(--text);margin-bottom:2px">${i+1}. ${r.title}</div>
          <div style="font-size:.8rem;color:var(--text-muted);line-height:1.45">${r.detail}</div>
        </div>
        ${r.actionKey?`<button class="btn btn-secondary btn-sm" style="flex-shrink:0;padding:4px 10px;font-size:.78rem" onclick="state['${r.actionKey}']=${typeof r.actionVal==='number'?r.actionVal:JSON.stringify(r.actionVal)};document.querySelector('[data-key=${r.actionKey}]')&&(document.querySelector('[data-key=${r.actionKey}]').value=${typeof r.actionVal==='number'?r.actionVal:JSON.stringify(r.actionVal)});recalcNow()">Apply →</button>`:''}
      </div>`).join('')}
    </div>
  </div>`:'';

  if(!progressBar&&!risks.length&&!recs.length)return'';

  return`
  <div style="margin-bottom:24px;padding:20px 24px;background:var(--surface2);border:1px solid var(--border);border-radius:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:1rem;font-weight:700;color:var(--text)">🏛 Legacy Preservation</div>
      ${target>0?`<div style="font-size:.82rem;color:var(--text-muted)">Target: ${displayMoney(target,lastRetYrs)} estate</div>`:'<div style="font-size:.82rem;color:var(--text-muted)">Set a Legacy Target in Configure → Spending</div>'}
    </div>
    ${progressBar}
    ${sorCallout}
    ${riskHtml}
    ${recHtml}
  </div>`;
  }catch(e){console.error('renderLegacyPreservationPanel error:',e);return'';}
}

// Reconciliation note: bridges the deterministic Sustainability badge (smooth expected path)
// with the Monte Carlo success probability (accounts for bad-luck return sequences).
// Display-only — derives entirely from _model.totals.sustainabilityScore + RIQ.Simulation._lastResults.
function renderSustainMcNote(){
  let sc=0;
  if(_model&&_model.totals)sc=_model.totals.sustainabilityScore||0;
  const healthy=sc>=0.6, weak=sc<0.4; // deterministic framing thresholds (match hero badge: >=.6 Good/Excellent)
  const res=(RIQ.Simulation&&RIQ.Simulation._lastResults)?RIQ.Simulation._lastResults:null;
  const base='margin:14px 0 0;padding:10px 14px;border-radius:var(--r-sm);font-size:12.5px;line-height:1.45;display:flex;align-items:flex-start;gap:9px';
  // No Monte Carlo run yet → subtle prompt (do NOT auto-run a heavy simulation here).
  if(!res){
    return`<div id="sustain-mc-note" style="${base};background:var(--surface2);border:1px solid var(--border);color:var(--text-muted)">
      <span style="font-size:14px;flex-shrink:0">🎲</span>
      <span>The badge above reflects the single <em>expected</em> path. <a onclick="switchTab('montecarlo')" style="color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none">Run a Monte Carlo simulation</a> to stress-test this plan against bad-luck return sequences.</span>
    </div>`;
  }
  const p=res.successProb, pPct=Math.round(p*100);
  let tone,icon,text; // tone: 'pos' (aligned, teal/green) or 'warn' (diverge, amber)
  if(healthy){
    if(p>=0.80){tone='pos';icon='✓';text=`Both the expected path and Monte Carlo (<strong>${pPct}% success</strong>) agree this plan is on track.`;}
    else if(p>=0.60){tone='warn';icon='⚠';text=`Your expected path looks healthy, but Monte Carlo shows <strong>${pPct}% success</strong> once market volatility and sequence risk are considered.`;}
    else{tone='warn';icon='⚠';text=`Your expected path looks healthy, but Monte Carlo shows only <strong>${pPct}% success</strong> once market volatility and sequence risk are considered — consider stress-testing.`;}
  } else if(weak){
    if(p>=0.80){tone='pos';icon='ℹ';text=`Your expected path looks strained, yet Monte Carlo is more optimistic at <strong>${pPct}% success</strong> across randomized markets.`;}
    else{tone='warn';icon='⚠';text=`Both the expected path and Monte Carlo (<strong>${pPct}% success</strong>) suggest this plan needs attention — consider trimming spending or delaying retirement.`;}
  } else { // middling deterministic (Fair)
    if(p>=0.80){tone='pos';icon='✓';text=`Monte Carlo gives this plan <strong>${pPct}% success</strong> across randomized markets — a solid cushion against sequence risk.`;}
    else{tone='warn';icon='⚠';text=`Monte Carlo shows <strong>${pPct}% success</strong> once market volatility and sequence risk are considered — worth stress-testing.`;}
  }

// Shared helper: render accounts grouped by type for breakdown + snapshot panels.
// viewRow   – model row with .bals, .total
// D         – displayMoney formatter bound to yearsFromNow
// total     – total portfolio value (for % calc)
// compact   – if true, omit bar-track mini-bars (used in narrow snapshot panel)
function renderAccountGroups(viewRow,D,total,compact){
  // Build group → [acc] map preserving GROUP_ORDER
  const groups={};GROUP_ORDER.forEach(g=>{groups[g]=[];});
  accounts.forEach(acc=>{
    const g=GROUP_TYPE_MAP[acc.type]||'Other';
    (groups[g]||(groups['Other'])).push(acc);
  });
  let html='';
  GROUP_ORDER.forEach(groupName=>{
    const accs=groups[groupName];if(!accs.length)return;
    const groupBal=accs.reduce((s,a)=>s+(viewRow.bals[a.id]||0),0);if(groupBal===0)return;
    const gc=GROUP_COLORS[groupName]||'var(--text-muted)';
    const gpct=total>0?Math.round(groupBal/total*100):0;
    const showChildren=accs.length>1;
    // Group header row
    html+=`<div class="acct-group-hdr">
      <span class="acct-group-label" style="color:${gc}"><span style="font-size:9px;opacity:.7">▸</span>${escHtml(groupName)}</span>
      <span class="acct-group-total" style="color:${gc}">${D(groupBal)}<span style="font-size:10px;font-weight:400;color:var(--text-muted);margin-left:4px">${gpct}%</span></span>
    </div>`;
    // Indented child rows (only when multiple accounts in group)
    if(showChildren){
      accs.forEach(acc=>{
        const bal=viewRow.bals[acc.id]||0;if(bal===0)return;
        const pct=total>0?Math.round(bal/total*100):0;
        html+=`<div class="breakdown-row acct-row-indent">
          <div class="breakdown-dot" style="background:${acc.color}"></div>
          <div class="breakdown-name">${escHtml(acc.name)}</div>
          ${!compact?`<div style="flex:1"><div class="acct-bar-track"><div class="acct-bar-fill" style="width:${pct}%;background:${acc.color}"></div></div></div>`:'<div style="flex:1"></div>'}
          <div class="breakdown-bal">${D(bal)}</div>
          <div class="breakdown-pct">${pct}%</div>
        </div>`;
      });
    }
  });
  return html;
}
function renderBreakdownPanel(){
  if(!_model)return'';
  const m=_model;
  const retRow=m.rows.find(r=>r.age===state.retireAge)||m.rows.filter(r=>r.phase!=='Retirement').slice(-1)[0];
  const lastRow=m.rows[m.rows.length-1];
  // Default: at retirement
  const viewRow=retRow||lastRow;
  const label=retRow?`At Retirement (Age ${state.retireAge})`:`At Age ${viewRow?.age||state.lifeExpectancy}`;
  if(!viewRow)return'';
  // Compute years from now to the snapshot age so displayMoney can inflation-adjust
  const yearsToView=Math.max(0,viewRow.age-m.curAge);
  const D=v=>displayMoney(v,yearsToView);
  const total=viewRow.total;
  const rowsHtml=renderAccountGroups(viewRow,D,total,false);
  // Pool summary — use grouped names matching the breakdown
  const taxablePl=accounts.filter(a=>['taxable','investment','other'].includes(a.type));
  const hsaPl=accounts.filter(a=>a.type==='hsa');
  const pretaxPl=accounts.filter(a=>['pretax','401k','traditional-ira'].includes(a.type));
  const rothPl=accounts.filter(a=>a.type==='roth');
  const pool=(accs)=>accs.reduce((s,a)=>s+(viewRow.bals[a.id]||0),0);
  // Per-owner breakdown
  const primaryAccs=accounts.filter(a=>(a.owner||'primary')==='primary');
  const spouseAccs=accounts.filter(a=>a.owner==='spouse');
  const primaryTotal=primaryAccs.reduce((s,a)=>s+(viewRow.bals[a.id]||0),0);
  const spouseTotal=spouseAccs.reduce((s,a)=>s+(viewRow.bals[a.id]||0),0);
  const ownerSummaryHtml=spouseAccs.length?`
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:5px;margin-top:10px">By Owner</div>

    <div class="pool-row"><span style="color:var(--orange)">● ${ownerLabel('spouse')}:</span><strong>${D(spouseTotal)}</strong></div>`:'';
  return`<div class="breakdown-panel" style="height:100%">
    <div class="breakdown-header">
      <div style="font-size:12px;font-weight:600;color:var(--text)">${label}</div>
      <div style="font-size:11px;color:var(--text-muted)">${D(total)} total</div>
    </div>
    <div class="breakdown-body">${rowsHtml}</div>
    <div class="pool-summary">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:5px">Withdrawal Pools</div>
      <div class="pool-row"><span>Pool 1 — Taxable Brokerage:</span><strong>${D(pool(taxablePl))}</strong></div>
      ${hsaPl.length?`<div class="pool-row"><span>Pool 1b — HSA:</span><strong>${D(pool(hsaPl))}</strong></div>`:''}
      <div class="pool-row"><span>Pool 2 — Pre-Tax (401k + Trad IRA):</span><strong>${D(pool(pretaxPl))}</strong></div>
      <div class="pool-row"><span>Pool 3 — Roth IRA (legacy):</span><strong style="color:var(--success)">${D(pool(rothPl))}</strong></div>
      ${ownerSummaryHtml}
    </div>
  </div>`;
}

function renderCrashImpact(){

  const ciAccYrs=Math.max(0,state.retireAge-_model.curAge);

/* ================================================================
   RENDER: S&P 500 HISTORY REPLAY CARD
   ================================================================ */
function renderHistoricalReplayCard(){
  try{
  // Mini SVG bar chart of SP500_ARRAY
  const W=240,H=64,pad=4;
  const barW=Math.floor((W-pad*2)/SP500_ARRAY.length)-1;
  const minRet=Math.min(...SP500_ARRAY,-5);
  const maxRet=Math.max(...SP500_ARRAY,5);
  const baselineY=pad+Math.round((maxRet/(maxRet-minRet))*(H-pad*2));
  const bars=SP500_ARRAY.map((ret,i)=>{
    const x=pad+i*(barW+1);
    const isNeg=ret<0;
    const barH=Math.max(2,Math.round(Math.abs(ret)/(maxRet-minRet)*(H-pad*2)));
    const y=isNeg?baselineY:baselineY-barH;
    const color=isNeg?'#ef4444':'#22c55e';
    return`<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${color}" rx="1"/>
      <title>${SP500_YEARS[i]}: ${ret>0?'+':''}${ret.toFixed(1)}%</title>`;
  }).join('');
  // Baseline line
  const svgChart=`<svg width="${W}" height="${H}" style="display:block">
    <line x1="${pad}" y1="${baselineY}" x2="${W-pad}" y2="${baselineY}" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
    ${bars}
    <text x="${pad}" y="${H-1}" font-size="8" fill="var(--text-muted)">2005</text>
    <text x="${pad+3*(barW+1)*3}" y="${H-1}" font-size="8" fill="var(--text-muted)">2008</text>
    <text x="${pad+8*(barW+1)}" y="${H-1}" font-size="8" fill="var(--text-muted)">2013</text>
    <text x="${pad+17*(barW+1)}" y="${H-1}" font-size="8" fill="var(--text-muted)">2022</text>
  </svg>`;

  // Comparison: historical vs flat base case
  let compHtml='';
  if(state.useHistoricalReturns&&_model){
    const histEst=_model.meta.estateAtEnd;
    const histPort=_model.meta.portfolioAtRetire;
    const base=runSimulation({useHistoricalReturns:false});
    const baseEst=base.model?base.model.meta.estateAtEnd:0;
    const basePort=base.model?base.model.meta.portfolioAtRetire:0;
    const estDiff=histEst-baseEst;
    const portDiff=histPort-basePort;
    const hAccYrs=Math.max(0,state.retireAge-_model.curAge);
    const hTotalYrs=_model.rows.length;
    compHtml=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">

        <div style="font-size:15px;font-weight:700;color:var(--accent)">${displayMoney(histPort,hAccYrs)}</div>
        <div style="font-size:10px;color:${portDiff>=0?'var(--success)':'var(--danger)'}">${portDiff>=0?'▲':'▼'} ${displayMoney(Math.abs(portDiff),hAccYrs)} vs flat rate</div>
      </div>
      <div style="background:var(--surface3);border-radius:8px;padding:8px 10px">
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:2px">Estate at ${state.lifeExpectancy} (History)</div>
        <div style="font-size:15px;font-weight:700;color:var(--accent)">${displayMoney(histEst,hTotalYrs)}</div>
        <div style="font-size:10px;color:${estDiff>=0?'var(--success)':'var(--danger)'}">${estDiff>=0?'▲':'▼'} ${displayMoney(Math.abs(estDiff),hTotalYrs)} vs flat rate</div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
      The 21-year pattern cycles ~${Math.ceil((_model.rows.length)/SP500_ARRAY.length)}× across your ${_model.rows.length}-year plan. Second cycle labeled ↺ in the Projections table.
    </div>`;
  }

  const activeDownYrs=SP500_ARRAY.filter(r=>r<0).length;
  const avgRet=(SP500_ARRAY.reduce((s,v)=>s+v,0)/SP500_ARRAY.length).toFixed(1);
  const activeCrashCount=state.crashMasterEnabled?(state.crashes||[]).filter(c=>c.enabled&&c.crashAge!=null).length:0;
  const crashWarningHtml=state.useHistoricalReturns&&activeCrashCount>0?`<div style="margin-top:8px;padding:6px 10px;background:var(--warning-bg);border-radius:6px;border:1px solid rgba(245,166,35,.3);font-size:11px;color:var(--warning)">⚠ ${activeCrashCount} crash override${activeCrashCount>1?'s':''} active — custom drops replace historical returns for those years</div>`:'';

  return`<div style="background:var(--surface);border:1px solid ${state.useHistoricalReturns?'var(--accent)':'var(--border)'};border-radius:var(--r-lg);padding:16px 20px;margin-bottom:16px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:4px">📈 S&P 500 History Replay</div>
        <div style="font-size:13px;color:var(--text);margin-bottom:6px">"What if the next ${SP500_ARRAY.length} years repeat ${SP500_YEARS[0]}–${SP500_YEARS[SP500_YEARS.length-1]}?"</div>
        <div style="font-size:11px;color:var(--text-muted)">Avg return: <strong style="color:var(--text)">${avgRet}%</strong> · Down years: <strong style="color:var(--danger)">${activeDownYrs}</strong> of ${SP500_ARRAY.length} · Worst: <strong style="color:var(--danger)">-39.2% (2008)</strong></div>
      </div>
      <div>
        ${svgChart}
        <div style="font-size:9px;color:var(--text-muted);text-align:right;margin-top:2px">2025</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none">
          <div onclick="toggleHistoricalReturns()" style="width:44px;height:24px;border-radius:12px;background:${state.useHistoricalReturns?'var(--accent)':'var(--surface3)'};position:relative;cursor:pointer;transition:background .2s;border:1px solid ${state.useHistoricalReturns?'var(--accent)':'var(--border)'}">
            <div style="position:absolute;top:3px;left:${state.useHistoricalReturns?'22':'3'}px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s"></div>
          </div>
          <span style="font-size:13px;font-weight:600;color:${state.useHistoricalReturns?'var(--accent)':'var(--text-muted)'}">${state.useHistoricalReturns?'ON':'OFF'}</span>

}

/* ================================================================
   RENDER: MONTE CARLO CARD (Phase 2)
   ================================================================ */
let _mcRunning=false,_mcAutoRan=false,_mcController=null,_mcSettingsOpen=false,_mcProgress=0;

// Update state for a Monte Carlo control, persist, and refresh the card (does NOT auto re-run).
function setMC(key,val){
  if(typeof val==='string'&&val!==''&&!isNaN(+val)&&key!=='mcReturnModel')val=+val;
  state[key]=val;
  saveState();
  _refreshMCCard();
}
function toggleMCSetting(key){state[key]=!state[key];saveState();_refreshMCCard();}
function toggleMCSettingsPanel(){_mcSettingsOpen=!_mcSettingsOpen;_refreshMCCard();}
function _refreshMCCard(){const el=document.getElementById('mc-card');if(el){el.innerHTML=_mcCardBody();drawMonteCarloCharts();}}

// Kick off a Monte Carlo run (on demand). isAuto=true for the once-per-session auto run.
function runMonteCarlo(isAuto){
  if(_mcRunning){if(_mcController)_mcController.cancel();_mcRunning=false;_refreshMCCard();return;}
  if(!RIQ||!RIQ.Simulation)return;
  _mcRunning=true;_mcProgress=0;_refreshMCCard();
  const t0=Date.now();
  _mcController=RIQ.Simulation.run({
    onProgress:(pct)=>{
      _mcProgress=pct;
      const bar=document.getElementById('mc-progress-bar');
      const txt=document.getElementById('mc-progress-text');
      if(bar)bar.style.width=(pct*100).toFixed(1)+'%';
      if(txt){const cfg=RIQ.Simulation.resolveConfig();txt.textContent=`Running ${cfg.trials.toLocaleString()} simulations… ${Math.round(pct*100)}%`;}
    },
    onComplete:(res)=>{
      res.elapsedMs=Date.now()-t0;
      RIQ.Simulation._lastResults=res;
      _mcRunning=false;_mcController=null;
      _refreshMCCard();
      _refreshSustainMcNote(); // reflect the new success % in the Overview reconciliation note
    },
  });
}

// Threshold color for a probability-of-success value.
function mcColor(p){return p>=0.85?'var(--success)':p>=0.70?'var(--accent)':p>=0.50?'var(--warning)':'var(--danger)';}
function mcLabel(p){return p>=0.90?'Very Strong':p>=0.80?'Strong':p>=0.70?'Solid':p>=0.55?'Fair':p>=0.35?'At Risk':'Fragile';}

// Semicircular probability-of-success gauge (SVG).
function mcGauge(prob){
  const W=230,H=140,cx=W/2,cy=125,r=92,col=mcColor(prob);
  const polar=(ang)=>{const a=ang*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  const arc=(a0,a1)=>{const[sx,sy]=polar(a0),[ex,ey]=polar(a1);const large=Math.abs(a1-a0)>180?1:0;return`M ${sx.toFixed(1)} ${sy.toFixed(1)} A ${r} ${r} 0 ${large} 1 ${ex.toFixed(1)} ${ey.toFixed(1)}`;};
  const endAng=180+180*Math.max(0,Math.min(1,prob));
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;margin:0 auto">
    <path d="${arc(180,360)}" fill="none" stroke="var(--surface3)" stroke-width="16" stroke-linecap="round"/>
    <path d="${arc(180,endAng)}" fill="none" stroke="${col}" stroke-width="16" stroke-linecap="round"/>
    <text x="${cx}" y="${cy-24}" text-anchor="middle" font-size="42" font-weight="800" fill="${col}">${Math.round(prob*100)}%</text>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="12" fill="var(--text-muted)">success</text>
  </svg>`;
}

// Small stat tile.
function _mcTile(label,value,color,sub){
  return`<div style="background:var(--surface3);border-radius:10px;padding:12px 14px;min-width:0">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:4px">${label}</div>
    <div style="font-size:18px;font-weight:700;color:${color||'var(--text)'};line-height:1.15;overflow:hidden;text-overflow:ellipsis">${value}</div>
    ${sub?`<div style="font-size:10px;color:var(--text-muted);margin-top:2px">${sub}</div>`:''}

}

      ${tog('mcSeqReturns','Sequence-of-returns','Randomize the order/timing of returns')}

      ${tog('mcRespectCrashes','Overlay crash scenarios','Apply enabled crash-simulator scenarios')}

  </div>`;
}

/* ================================================================
   PATH TO CONFIDENCE — UI (Overview card, sits right under Monte Carlo)
   Wraps RIQ.PathToConfidence. Respects the Today's/Future $ toggle, dark/light
   theme, and the input-focus-guard convention (tunable inputs commit on change,
   never triggering a model re-render mid-keystroke).
   ================================================================ */
let _p2cRunning=false,_p2cController=null,_p2cProgress=0,_p2cMsg='';

function renderPathToConfidenceCard(){
  return`<div class="config-card" id="p2c-card" style="margin-bottom:16px;padding:18px 20px">${_p2cCardBody()}</div>`;
}
function _refreshP2CCard(){const el=document.getElementById('p2c-card');if(el)el.innerHTML=_p2cCardBody();}

// Tunable-input handler: updates state, persists, refreshes ONLY this card (no model recalc needed —
// these knobs never feed buildModel). Called from onchange so it commits after the field loses focus.
function p2cSet(key,val){
  let v=parseFloat(String(val).replace(/,/g,''));
  if(!isFinite(v))v=0;
  if(key==='p2cTargetConf')v=Math.max(1,Math.min(99,Math.round(v)));
  if(key==='p2cMaxDelay')v=Math.max(0,Math.min(5,Math.round(v)));
  if(key==='p2cLegacyFloor')v=Math.max(0,Math.round(v));
  state[key]=v;saveState();
  RIQ.PathToConfidence.invalidate(); // tunables changed → old path is stale
  _refreshP2CCard();
}

// Baseline success/legacy from the most recent Monte Carlo run (for display before the optimizer runs).
function _p2cBaselineFromMC(){
  const res=window.RIQ&&RIQ.Simulation&&RIQ.Simulation._lastResults;
  if(!res)return null;
  const inp=RIQ.PathToConfidence.resolveInputs();
  return {successProb:res.successProb,
    legacyToday:RIQ.PathToConfidence._toToday((res.endStats&&res.endStats.median)||0,inp),
    medianNominal:(res.endStats&&res.endStats.median)||0};
}

function runPathToConfidence(){
  if(_p2cRunning){if(_p2cController)_p2cController.cancel();_p2cRunning=false;_p2cProgress=0;_refreshP2CCard();return;}
  if(!(window.RIQ&&RIQ.PathToConfidence&&RIQ.Simulation)){showToast('Optimizer unavailable');return;}
  _p2cRunning=true;_p2cProgress=0;_p2cMsg='Starting…';_refreshP2CCard();
  _p2cController=RIQ.PathToConfidence.optimize({
    onProgress:(pct,msg)=>{
      _p2cProgress=pct;_p2cMsg=msg||'';
      const bar=document.getElementById('p2c-progress-bar');
      const txt=document.getElementById('p2c-progress-text');
      if(bar)bar.style.width=(pct*100).toFixed(1)+'%';
      if(txt)txt.textContent=(msg||'Optimizing…')+' · '+Math.round(pct*100)+'%';
    },
    onComplete:()=>{_p2cRunning=false;_p2cController=null;_p2cProgress=1;_refreshP2CCard();},
  });
  _refreshP2CCard();
}

function applyP2CStep(idx){
  if(RIQ.PathToConfidence.applyStep(idx)){showToast('Applied step');}
}
function applyP2CAll(){
  const r=RIQ.PathToConfidence.getLast();
  if(r&&r.steps&&r.steps.length&&RIQ.PathToConfidence.applyAll()){showToast('Applied the full path ('+r.steps.length+' step'+(r.steps.length>1?'s':'')+')');}
}

// Small chip helper (colored delta).
function _p2cChip(txt,color){return`<span style="font-size:10.5px;font-weight:700;color:${color};border:1px solid ${color};border-radius:5px;padding:1px 5px;white-space:nowrap">${txt}</span>`;}

function _p2cCardBody(){
  const P=window.RIQ&&RIQ.PathToConfidence;
  const s=state;
  const targetPct=Math.max(1,Math.min(99,Math.round(+s.p2cTargetConf||90)));
  const delay=Math.max(0,Math.min(5,Math.round(+s.p2cMaxDelay||0)));
  const floor=Math.max(0,Math.round(+s.p2cLegacyFloor||0));
  const runBtn=`<button class="btn ${_p2cRunning?'btn-secondary':'btn-primary'} btn-sm" onclick="runPathToConfidence()" style="white-space:nowrap">${_p2cRunning?'✕ Cancel':'🧭 Find my path'}</button>`;

  const header=`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent)">🧭 Path to ${targetPct}% Confidence</div>
    <div style="font-size:12px;color:var(--text-muted)">Constrained goal-seek · won't cut spending · retirement delay capped at your band</div>
    <div style="margin-left:auto;display:flex;gap:8px">${runBtn}</div>
  </div>`;

  // ── Tunable controls ──
  const numInput=(key,val,step,min,max,suffix,width)=>`<input type="number" value="${val}" step="${step||1}" ${min!=null?`min="${min}"`:''} ${max!=null?`max="${max}"`:''} onchange="p2cSet('${key}',this.value)" style="width:${width||80}px;background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 7px;font-size:12px">${suffix?`<span style="font-size:11px;color:var(--text-muted);margin-left:3px">${suffix}</span>`:''}`;
  const fld=(label,inner,tip)=>`<div style="display:flex;flex-direction:column;gap:4px"><label style="font-size:11px;color:var(--text-muted)"${tip?` title="${tip}"`:''}>${label}</label><div style="display:flex;align-items:center;gap:6px">${inner}</div></div>`;
  const delaySlider=`<input type="range" min="0" max="5" step="1" value="${delay}" oninput="document.getElementById('p2c-delay-num').value=this.value" onchange="p2cSet('p2cMaxDelay',this.value)" style="width:110px;vertical-align:middle">
    <input id="p2c-delay-num" type="number" min="0" max="5" step="1" value="${delay}" onchange="p2cSet('p2cMaxDelay',this.value)" style="width:52px;background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 7px;font-size:12px"><span style="font-size:11px;color:var(--text-muted)">yrs</span>`;
  const controls=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin:12px 0 6px">
    ${fld('Target confidence',numInput('p2cTargetConf',targetPct,1,1,99,'%'),'The Monte Carlo success probability to aim for')}
    ${fld('Allowable retirement delay',delaySlider,'The optimizer may only push your retirement age within this band (0–5 years)')}
    ${fld('Legacy floor (today\'s $)',numInput('p2cLegacyFloor',floor,10000,0,null,'',120),'Minimum ending estate to preserve, in today\'s dollars')}
  </div>`;

  // ── Baseline strip ──
  const baseMC=_p2cBaselineFromMC();
  const lastR=P&&P.getLast();
  const baseline=(lastR&&!lastR.error&&lastR.baseline)?lastR.baseline:baseMC;
  let baselineStrip;
  if(baseline){
    const bcol=mcColor(baseline.successProb);
    baselineStrip=`<div style="display:flex;flex-wrap:wrap;gap:18px;align-items:center;background:var(--surface3);border-radius:10px;padding:10px 14px;margin-top:4px">
      <div><div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)">Baseline success</div><div style="font-size:20px;font-weight:800;color:${bcol}">${Math.round(baseline.successProb*100)}%</div></div>
      <div style="width:1px;align-self:stretch;background:var(--border)"></div>
      <div><div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)">Baseline legacy (today's $)</div><div style="font-size:20px;font-weight:800;color:${baseline.legacyToday>=floor?'var(--success)':'var(--warning)'}">${fmtK(baseline.legacyToday)}</div></div>
      <div style="font-size:11px;color:var(--text-muted);max-width:340px">Baseline uses your current plan with the Monte Carlo regimes selected in the card above (worst-case toggles honored). Floor is compared in today's dollars.</div>
    </div>`;
  } else {
    baselineStrip=`<div style="background:var(--surface3);border-radius:10px;padding:10px 14px;margin-top:4px;font-size:12px;color:var(--text-muted)">Run the Monte Carlo simulation above (or click <strong>Find my path</strong>) to establish your baseline success probability and legacy.</div>`;
  }

  // ── Progress ──
  const progress=_p2cRunning?`<div style="margin:12px 0 4px">
      <div id="p2c-progress-text" style="font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:8px">${escHtml(_p2cMsg||'Optimizing…')} · ${Math.round(_p2cProgress*100)}%</div>
      <div style="height:10px;background:var(--surface3);border-radius:7px;overflow:hidden"><div id="p2c-progress-bar" style="height:100%;width:${(_p2cProgress*100).toFixed(1)}%;background:linear-gradient(90deg,var(--accent),var(--accent-hover));transition:width .12s linear"></div></div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px">Runs many reduced-trial (${P?P.SEARCH_TRIALS:600}) Monte Carlo searches, then confirms the winner at ${P?P.CONFIRM_TRIALS:2500} trials. Time-sliced — the UI stays responsive.</div>
    </div>`:'';

  // ── Result path ──
  let result='';
  if(!_p2cRunning&&lastR&&!lastR.error){
    result=_p2cResultHTML(lastR,floor);
  } else if(!_p2cRunning&&lastR&&lastR.error){
    result=`<div style="margin-top:10px;padding:12px 14px;background:var(--danger-bg);border:1px solid rgba(239,68,68,.35);border-radius:10px;color:var(--danger);font-size:12.5px">${escHtml(lastR.shortfall||'The search could not complete.')}</div>`;
  } else if(!_p2cRunning){
    result=`<div style="margin-top:12px;padding:16px;text-align:center;color:var(--text-muted);font-size:12.5px">Click <strong>Find my path</strong> to search Social Security timing, contributions, ETF/allocation profiles, Roth conversions, fee reduction, a bond-tent glide path, and a retirement delay (within your band) for the smallest combination that reaches ${targetPct}% confidence while keeping ${fmtK(floor)} of legacy.</div>`;
  }

  // ── ETF library (always visible, illustrative) ──
  const etfLib=_p2cEtfLibraryHTML();

  return header+controls+baselineStrip+progress+result+etfLib;
}

function _p2cResultHTML(r,floor){
  const fcol=mcColor(r.final.successProb);

    ?`<span style="font-size:11px;font-weight:700;color:var(--success);border:1px solid var(--success);border-radius:6px;padding:2px 8px">✓ Target reached</span>`

      const legacyCol=st.legacyAfterToday>=floor?'var(--success)':'var(--warning)';

        <div style="min-width:0">
          <div style="font-size:12.5px;font-weight:600;color:var(--text)">${escHtml(st.label)}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">Success ${Math.round(st.successBefore*100)}% → <strong style="color:var(--text)">${Math.round(st.successAfter*100)}%</strong> &nbsp;·&nbsp; Legacy <span style="color:${legacyCol}">${fmtK(st.legacyAfterToday)}</span> <span style="color:var(--text-faint)">(cumulative, today's $)</span></div>
        </div>

    stepsHtml=`<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface2)">

/* ================================================================
   RENDER: MONTE CARLO TAB — full visibility into every trial
   ----------------------------------------------------------------
   Runs RIQ.Simulation with retainTrials:true so EVERY simulated lifetime is
   inspectable. The per-trial table is VIRTUALIZED (windowed) — only ~30 rows
   are ever in the DOM regardless of trial count, so 10k–50k trials never freeze
   the browser. Sortable, filterable, CSV-exportable, with representative-path
   drill-down. Pure view: never mutates the deterministic model. Lazy: nothing
   heavy runs until the user clicks Run (or a retained run is already cached).
   ================================================================ */
let _mctResults=null;                 // retained results (includes perTrial typed arrays + samplePaths)
let _mctRunning=false,_mctController=null,_mctProgress=0;
let _mctOrder=null;                   // Int32Array — all trial indices in current sort order
let _mctView=null;                    // Int32Array — filtered subset actually shown in the table
let _mctSelTrial=null;                // selected trial index for drill-down
let _mctFilterMin='',_mctFilterMax=''; // ending-estate range filter (raw nominal $), transient view state
const _MCT_ROWH=30;                   // fixed virtual row height (px)
const _MCT_OVERSCAN=6;                // extra rows rendered above/below the viewport
const _MCT_TRIALS=[1000,5000,10000,25000,50000];
const _MCT_COLS='64px minmax(120px,1.4fr) 92px 88px 118px minmax(120px,1.2fr) 112px';

// ── Run a retained simulation (separate from the Overview auto-run) ──
function runMonteCarloTab(){
  if(_mctRunning){if(_mctController)_mctController.cancel();_mctRunning=false;_mctProgress=0;renderMonteCarlo();return;}
  if(!(window.RIQ&&RIQ.Simulation))return;
  _mctRunning=true;_mctProgress=0;_mctSelTrial=null;
  renderMonteCarlo();
  const t0=Date.now();
  _mctController=RIQ.Simulation.run({
    retainTrials:true,samplePaths:7,
    onProgress:(pct)=>{
      _mctProgress=pct;
      const bar=document.getElementById('mct-progress-bar');
      const txt=document.getElementById('mct-progress-text');
      if(bar)bar.style.width=(pct*100).toFixed(1)+'%';
      if(txt){const cfg=RIQ.Simulation.resolveConfig();txt.textContent=`Running ${cfg.trials.toLocaleString()} simulations… ${Math.round(pct*100)}%`;}
    },
    onComplete:(res)=>{
      res.elapsedMs=Date.now()-t0;
      _mctResults=res;
      RIQ.Simulation._lastResults=res; // share the summary with the Overview card (extra fields are harmless)
      _mctRunning=false;_mctController=null;_mctProgress=1;_mctSelTrial=null;
      _mctBuildView();
      renderMonteCarlo();
      _refreshSustainMcNote(); // keep the Overview reconciliation note in sync even when run from the MC tab
    },
  });
}

// Settings scoped to the tab — update state + re-render only the controls region (keeps scroll/results).
function mctSet(key,val){
  if(typeof val==='string'&&val!==''&&!isNaN(+val)&&key!=='mcReturnModel')val=+val;
  state[key]=val;saveState();
  const el=document.getElementById('mct-controls');if(el)el.innerHTML=_mctControlsBody();
}
function mctToggle(key){state[key]=!state[key];saveState();const el=document.getElementById('mct-controls');if(el)el.innerHTML=_mctControlsBody();}
function mctSetTrials(n){state.mcTrials=Math.max(1000,Math.min(50000,n|0));saveState();const el=document.getElementById('mct-controls');if(el)el.innerHTML=_mctControlsBody();}

// ── Sort / filter handlers ──
function mctSort(col){
  if(state.mcTableSort===col)state.mcTableSortDir=state.mcTableSortDir==='asc'?'desc':'asc';
  else{state.mcTableSort=col;state.mcTableSortDir=col==='trial'?'asc':'desc';}
  saveState();_mctBuildView();_mctRefreshTable();
}
function mctSetFilter(mode){state.mcTableFilter=mode;saveState();_mctBuildView();_mctRefreshTable();}
function mctSetRange(which,val){if(which==='min')_mctFilterMin=val;else _mctFilterMax=val;_mctBuildView();_mctRefreshTable();}
function mctClearRange(){_mctFilterMin='';_mctFilterMax='';const a=document.getElementById('mct-range-min'),b=document.getElementById('mct-range-max');if(a)a.value='';if(b)b.value='';_mctBuildView();_mctRefreshTable();}

// Build the sorted + filtered index view (typed arrays → fast even at 50k trials).
function _mctBuildView(){
  const res=_mctResults;if(!res||!res.perTrial){_mctOrder=null;_mctView=null;return;}
  const pt=res.perTrial,N=pt.n;
  const dir=state.mcTableSortDir==='desc'?-1:1;
  const col=state.mcTableSort||'trial';
  const key=(i)=>{
    switch(col){
      case 'estate':return pt.endEstate[i];
      case 'failAge':return pt.failAge[i]>=0?pt.failAge[i]:1e9; // successes (no failure) sort last on ascending
      case 'worstRet':return pt.worstRet[i];
      case 'minBal':return pt.minBal[i];
      case 'maxDD':return pt.maxDD[i];
      default:return i;
    }
  };
  const order=Int32Array.from({length:N},(_,i)=>i);
  if(col!=='trial'||dir!==1)order.sort((a,b)=>{const ka=key(a),kb=key(b);return ka<kb?-dir:ka>kb?dir:(a-b);});
  _mctOrder=order;
  const mode=state.mcTableFilter||'all';
  const mn=(_mctFilterMin!==''&&isFinite(+_mctFilterMin))?+_mctFilterMin:null;
  const mx=(_mctFilterMax!==''&&isFinite(+_mctFilterMax))?+_mctFilterMax:null;
  if(mode==='all'&&mn===null&&mx===null){_mctView=order;return;}
  const view=[];
  for(let k=0;k<order.length;k++){
    const i=order[k],failed=pt.failAge[i]>=0;
    if(mode==='fail'&&!failed)continue;
    if(mode==='success'&&failed)continue;
    const e=pt.endEstate[i];
    if(mn!==null&&e<mn)continue;
    if(mx!==null&&e>mx)continue;
    view.push(i);
  }
  _mctView=Int32Array.from(view);
}

function _mctViewLabel(){
  if(!_mctResults||!_mctView)return'';
  const shown=_mctView.length,total=_mctResults.perTrial.n;
  return shown===total?`${total.toLocaleString()} trials`:`${shown.toLocaleString()} of ${total.toLocaleString()} trials`;
}

// ── Virtualization: only render the rows inside (and just around) the viewport ──
function _mctOnScroll(){_mctRenderWindow();}
function _mctRefreshTable(){
  const sp=document.getElementById('mct-spacer');
  if(sp&&_mctView)sp.style.height=(_mctView.length*_MCT_ROWH)+'px';
  const cl=document.getElementById('mct-count');if(cl)cl.textContent=_mctViewLabel();
  const hd=document.getElementById('mct-thead');if(hd)hd.innerHTML=_mctHeadCells();
  _mctRenderWindow();
}
function _mctRenderWindow(){
  const sc=document.getElementById('mct-scroll'),rows=document.getElementById('mct-rows');
  if(!sc||!rows||!_mctView||!_mctResults)return;
  const total=_mctView.length;
  if(!total){rows.innerHTML='<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px">No trials match the current filter.</div>';rows.style.transform='translateY(0)';return;}
  const vh=sc.clientHeight||460;
  const first=Math.max(0,Math.floor(sc.scrollTop/_MCT_ROWH)-_MCT_OVERSCAN);
  const count=Math.ceil(vh/_MCT_ROWH)+_MCT_OVERSCAN*2;
  const last=Math.min(total,first+count);
  rows.style.transform='translateY('+(first*_MCT_ROWH)+'px)';
  let html='';
  for(let k=first;k<last;k++)html+=_mctRowHtml(_mctView[k],k);
  rows.innerHTML=html;
}
function _mctRowHtml(i,k){
  const res=_mctResults,pt=res.perTrial,yEnd=res.lifeAge-res.curAge;
  const failed=pt.failAge[i]>=0,sel=_mctSelTrial===i;
  const bg=sel?'var(--accent-glow)':(k%2?'var(--surface2)':'transparent');
  const out=failed?'<span style="color:var(--danger);font-weight:700">✗ Fail</span>':'<span style="color:var(--success);font-weight:700">✓ OK</span>';
  const fa=failed?('Age '+pt.failAge[i]):'<span style="color:var(--text-faint)">—</span>';
  const wr=pt.worstRet[i]*100,dd=pt.maxDD[i]*100;
  return`<div onclick="_mctSelectTrial(${i})" title="Click for trial detail" style="display:grid;grid-template-columns:${_MCT_COLS};height:${_MCT_ROWH}px;align-items:center;cursor:pointer;background:${bg};border-bottom:1px solid var(--border);font-size:12.5px;text-align:center" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background='${bg}'">
    <div style="color:var(--text-muted)">${(i+1).toLocaleString()}</div>
    <div style="font-weight:600">${displayMoney(pt.endEstate[i],yEnd)}</div>
    <div>${out}</div>
    <div>${fa}</div>
    <div style="color:${wr<0?'var(--danger)':'var(--text)'}">${wr.toFixed(1)}%</div>
    <div>${displayMoney(pt.minBal[i],yEnd)}</div>
    <div style="color:${dd>=40?'var(--danger)':dd>=25?'var(--warning)':'var(--text)'}">${dd.toFixed(1)}%</div>
  </div>`;
}
function _mctHeadCells(){
  const dir=state.mcTableSortDir==='asc'?' ▲':' ▼';
  const th=(label,col,sortable)=>{const active=sortable&&state.mcTableSort===col;
    return`<div ${sortable?`onclick="mctSort('${col}')" style="cursor:pointer;`:'style="'}padding:0 4px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:${active?'var(--accent)':'var(--text-muted)'};text-align:center;user-select:none">${label}${active?dir:''}</div>`;};
  return th('#','trial',true)+th('Ending Estate','estate',true)+th('Outcome','',false)+th('Fail Age','failAge',true)+th('Worst Yr','worstRet',true)+th('Min Ret. Bal','minBal',true)+th('Max Drawdown','maxDD',true);
}

// ── Drill-down: representative full paths (best/median/worst etc.) ──
function _mctSampleFor(i){const s=_mctResults&&_mctResults.samplePaths;if(!s)return null;for(let j=0;j<s.length;j++)if(s[j].trialIndex===i)return s[j];return null;}
function _mctSelectTrial(i){
  _mctSelTrial=i;
  // Repaint currently-visible rows so the selection highlight updates without a full re-render.
  _mctRenderWindow();
  const el=document.getElementById('mct-detail');
  if(el){el.innerHTML=_mctDetailBody();
    const c=document.getElementById('mct-detail-chart');const sp=_mctSampleFor(i);
    if(c&&sp)renderMCMiniPath(c,sp,_mctResults);}
}
function _mctDetailBody(){

// Mini SVG trajectory for a retained representative trial (matches the app's chart style).
function renderMCMiniPath(container,sp,res){
  container.innerHTML='';
  const W=container.offsetWidth||600,H=container.offsetHeight||200;
  if(W<40||H<40)return;
  const NS='http://www.w3.org/2000/svg';
  const ages=res.ages,n=ages.length;
  const PAD={t:12,r:14,b:24,l:60},cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const adj=(v,age)=>adjV(v,age-res.curAge);
  const vals=sp.vals.map((v,i)=>adj(v,ages[i]));
  const maxVal=niceMax(Math.max(1,...vals));
  const minAge=ages[0],maxAge=ages[n-1];
  const xp=(age)=>PAD.l+(age-minAge)/Math.max(maxAge-minAge,1)*cW;
  const yp=(v)=>PAD.t+cH-Math.max(0,Math.min(v,maxVal))/maxVal*cH;
  const el=(t,a={})=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const txt=(c,x,y,o={})=>{const t=el('text',{x,y,'font-size':o.size||10,'text-anchor':o.anchor||'end',fill:o.fill||getCSSVar('--text-muted')});t.textContent=c;return t;};
  const svg=el('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});svg.style.cssText='display:block;width:100%;height:100%;overflow:visible';
  const grid=getCSSVar('--chart-grid')||'rgba(255,255,255,.06)',acc=getCSSVar('--accent')||'#00bfb3';
  for(let i=0;i<=4;i++){const v=maxVal*i/4,y=yp(v);svg.appendChild(el('line',{x1:PAD.l,y1:y,x2:PAD.l+cW,y2:y,stroke:grid,'stroke-width':1}));svg.appendChild(txt(fmtKM(v),PAD.l-6,y+4));}
  const xStep=Math.max(1,Math.ceil((maxAge-minAge)/8));
  for(let age=minAge;age<=maxAge;age+=xStep)svg.appendChild(txt(age,xp(age),PAD.t+cH+16,{anchor:'middle'}));
  // Area + line
  let areaPts=`${xp(minAge).toFixed(1)},${yp(0).toFixed(1)} `;
  vals.forEach((v,i)=>areaPts+=`${xp(ages[i]).toFixed(1)},${yp(v).toFixed(1)} `);
  areaPts+=`${xp(maxAge).toFixed(1)},${yp(0).toFixed(1)}`;
  svg.appendChild(el('polygon',{points:areaPts,fill:acc,opacity:'0.13',stroke:'none'}));
  const linePts=vals.map((v,i)=>`${xp(ages[i]).toFixed(1)},${yp(v).toFixed(1)}`).join(' ');
  svg.appendChild(el('polyline',{points:linePts,fill:'none',stroke:acc,'stroke-width':2.4}));
  // Retire + failure markers
  const vline=(age,color,dash,label)=>{if(age<minAge||age>maxAge)return;const x=xp(age);svg.appendChild(el('line',{x1:x,y1:PAD.t,x2:x,y2:PAD.t+cH,stroke:color,'stroke-width':1,'stroke-dasharray':dash}));svg.appendChild(txt(label,x+3,PAD.t+11,{anchor:'start',fill:color,size:9}));};
  vline(res.retAge,'#4a9eff','4,3','Retire '+res.retAge);
  if(sp.failAge!=null)vline(sp.failAge,'#ef4444','5,3','Depleted '+sp.failAge);
  container.appendChild(svg);
}

// Histogram of ending estates across ALL trials (pure SVG) — "what type of scenarios ran".
function renderMCHistogram(container,res){
  container.innerHTML='';
  const W=container.offsetWidth||900,H=container.offsetHeight||240;
  if(W<50||H<50||!res.perTrial)return;
  const NS='http://www.w3.org/2000/svg';
  const pt=res.perTrial,N=pt.n,yEnd=res.lifeAge-res.curAge;
  let mn=Infinity,mx=-Infinity;const vals=new Float64Array(N);
  for(let i=0;i<N;i++){const v=adjV(pt.endEstate[i],yEnd);vals[i]=v;if(v<mn)mn=v;if(v>mx)mx=v;}
  if(!isFinite(mn)||!isFinite(mx))return;
  const BINS=40,range=Math.max(1,mx-mn),bw=range/BINS;
  const counts=new Array(BINS).fill(0);
  for(let i=0;i<N;i++){let b=Math.floor((vals[i]-mn)/bw);if(b<0)b=0;if(b>=BINS)b=BINS-1;counts[b]++;}
  const maxC=Math.max(1,...counts);
  const PAD={t:12,r:16,b:30,l:60},cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const el=(t,a={})=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const txt=(c,x,y,o={})=>{const t=el('text',{x,y,'font-size':o.size||10,'text-anchor':o.anchor||'end',fill:o.fill||getCSSVar('--text-muted')});t.textContent=c;return t;};
  const svg=el('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});svg.style.cssText='display:block;width:100%;height:100%;overflow:visible';
  const grid=getCSSVar('--chart-grid')||'rgba(255,255,255,.06)',acc=getCSSVar('--accent')||'#00bfb3',danger=getCSSVar('--danger')||'#ef4444';
  for(let i=0;i<=4;i++){const v=maxC*i/4,y=PAD.t+cH-(v/maxC)*cH;svg.appendChild(el('line',{x1:PAD.l,y1:y,x2:PAD.l+cW,y2:y,stroke:grid,'stroke-width':1}));svg.appendChild(txt(Math.round(v).toLocaleString(),PAD.l-6,y+4));}
  const bwPx=cW/BINS;
  const tt=document.createElement('div');
  tt.style.cssText=`position:absolute;background:${getCSSVar('--tooltip-bg')||'#222'};border:1px solid ${getCSSVar('--border')};border-radius:9px;padding:8px 11px;font-size:12px;line-height:1.6;pointer-events:none;z-index:9999;display:none;box-shadow:var(--shadow);color:${getCSSVar('--text')}`;
  container.appendChild(tt);
  for(let b=0;b<BINS;b++){
    const lo=mn+b*bw,hi=lo+bw,x=PAD.l+b*bwPx,h=(counts[b]/maxC)*cH,y=PAD.t+cH-h;
    const isZero=hi<=0.5; // trials that depleted (ending estate ≈ 0)
    const rect=el('rect',{x:x+0.5,y,width:Math.max(0.5,bwPx-1),height:Math.max(0,h),fill:isZero?danger:acc,opacity:isZero?'0.85':'0.7'});
    svg.appendChild(rect);
    const hit=el('rect',{x,y:PAD.t,width:bwPx,height:cH,fill:'transparent'});hit.style.cursor='crosshair';
    hit.addEventListener('mouseenter',()=>{tt.style.display='block';tt.innerHTML=`<div style="font-weight:700;margin-bottom:3px">${fmtKM(lo)} – ${fmtKM(hi)}</div><div style="color:var(--text-muted)">${counts[b].toLocaleString()} trials · ${(counts[b]/N*100).toFixed(1)}%</div>`;let lx=x+bwPx/2+8;if(lx+150>W)lx=x-150;tt.style.left=lx+'px';tt.style.top=Math.max(0,y-10)+'px';});
    hit.addEventListener('mouseleave',()=>{tt.style.display='none';});
    svg.appendChild(hit);
  }
  const xStep=Math.max(1,Math.round(BINS/6));
  for(let b=0;b<=BINS;b+=xStep){const v=mn+b*bw,x=PAD.l+b*bwPx;svg.appendChild(txt(fmtKM(v),x,PAD.t+cH+16,{anchor:'middle',size:9}));}
  // Median marker
  const med=adjV(res.endStats.median,yEnd);
  if(med>=mn&&med<=mx){const x=PAD.l+((med-mn)/range)*cW;svg.appendChild(el('line',{x1:x,y1:PAD.t,x2:x,y2:PAD.t+cH,stroke:acc,'stroke-width':1.5,'stroke-dasharray':'4,3'}));svg.appendChild(txt('median',x+3,PAD.t+11,{anchor:'start',fill:acc,size:9}));}
  container.appendChild(svg);
}

// Export EVERY trial (raw nominal $) to CSV without rendering them all in the DOM.
function downloadTrialsCSV(){
  const res=_mctResults;
  if(!res||!res.perTrial){showToast('Run a simulation first');return;}
  const pt=res.perTrial,N=pt.n;
  const lines=['trial,ending_estate_nominal,outcome,failure_age,worst_annual_return_pct,min_retirement_balance_nominal,max_drawdown_pct'];
  for(let i=0;i<N;i++){
    const failed=pt.failAge[i]>=0;
    lines.push([i+1,Math.round(pt.endEstate[i]),failed?'fail':'success',failed?pt.failAge[i]:'',(pt.worstRet[i]*100).toFixed(2),Math.round(pt.minBal[i]),(pt.maxDD[i]*100).toFixed(2)].join(','));
  }
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`retireiq-montecarlo-${N}-trials.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Exported ${N.toLocaleString()} trials to CSV`);
}

/* ================================================================
   AI RECOMMENDATIONS — UI (Overview card + shared list renderer)

let _recsRunning=false;
function _refreshRecsCard(){const el=document.getElementById('ai-recs-card');if(el)el.innerHTML=_recsCardBody();}
function runRecommendations(){
  if(_recsRunning)return;
  _recsRunning=true;_refreshRecsCard();
  // Defer so the "Analyzing…" state paints before the (synchronous) optimizer work.
  requestAnimationFrame(()=>setTimeout(()=>{
    try{RIQ.Recommendations.generate(true);}catch(e){console.error('recs generate',e);}
    _recsRunning=false;
    if(activeTab==='overview')_refreshRecsCard();
  },20));
}
function applyRecommendation(id){
  const r=RIQ.Recommendations&&RIQ.Recommendations.apply(id);
  if(r)showToast('Applied: '+r.title);
}
function _recImpactBadge(r){
  const v=r.impactValue||0;
  if(r.impactType==='tax')return`<span style="background:rgba(34,197,94,.14);color:var(--success);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:700;white-space:nowrap">\u2212${fmtK(Math.abs(v))} lifetime tax</span>`;

let _ssMCRunning=false,_ssMCController=null,_ssMCProgress=0;

function setSSOptObjective(v){
  state.ssOptObjective=v;saveState();
  RIQ.SocialSecurity._cache=null;RIQ.SocialSecurity._mcRan=false; // objective changes recommendation
  _refreshSSOptCard();
}

// Apply the recommended claim age(s) into state and recalculate everything.
function applyRecommendedSS(){
  const r=RIQ.SocialSecurity&&RIQ.SocialSecurity._cache&&RIQ.SocialSecurity._cache.result;
  if(!r){showToast('Run the optimizer first');return;}
  const rec=r.recommended;
  state.ssClaimAge=rec.uClaim;
  if(state.spouseDob)state.spouseSSClaim=rec.sClaim;
  RIQ.SocialSecurity._cache=null;RIQ.SocialSecurity._mcRan=false;
  saveState();
  _renderedTabs.delete('configure'); // refresh the Configure SS selects on next visit
  recalcNow(); // rebuilds _model + re-renders Overview (incl. this card)
  showToast(state.spouseDob?`Applied claim ages ${rec.uClaim} / ${rec.sClaim}`:`Applied claim age ${rec.uClaim}`);
}

// Run the Monte Carlo failure-probability comparison (current vs recommended, chained).
function runSSFailure(){
  if(_ssMCRunning){if(_ssMCController)_ssMCController.cancel();_ssMCRunning=false;_refreshSSOptCard();return;}
  if(!(window.RIQ&&RIQ.SocialSecurity&&RIQ.SocialSecurity.runFailureAnalysis))return;
  RIQ.SocialSecurity.optimize(); // ensure cache is populated
  _ssMCRunning=true;_ssMCProgress=0;_refreshSSOptCard();
  _ssMCController=RIQ.SocialSecurity.runFailureAnalysis({
    onEach:(tag,mtr,done,total)=>{_ssMCProgress=done/total;const t=document.getElementById('ss-mc-progress-text');if(t)t.textContent=`Simulating claim strategies… ${done}/${total}`;},
    onDone:()=>{_ssMCRunning=false;_ssMCController=null;_refreshSSOptCard();},
  });
}

// Couple best-combination matrix: PV lifetime benefit by (your claim × spouse claim), best cell highlighted.
function _ssCoupleMatrixHTML(r){
  if(!r.couple)return'';
  const ages=r.ages,best=r.couple.best;
  const useNominal=state.moneyMode!=='today';
  const val=(c)=>useNominal?c.nominal:c.pv;
  const cells={};r.couple.grid.forEach(c=>{cells[c.u+'/'+c.s]=c;});
  let vals=r.couple.grid.map(val);const mn=Math.min(...vals),mx=Math.max(...vals);
  const heat=(v)=>{const t=mx>mn?(v-mn)/(mx-mn):0;const a=(0.08+t*0.5).toFixed(2);return`background:rgba(0,191,179,${a})`;};
  const uName=ownerLabel('primary'),sName=ownerLabel('spouse');
  let head=`<th style="padding:4px 6px;font-size:10px;color:var(--text-muted);text-align:right"><span style="color:var(--accent)">${escHtml(uName)}</span> ↓ / <span style="color:var(--orange)">${escHtml(sName)}</span> →</th>`+ages.map(s=>`<th style="padding:4px 6px;font-size:11px;color:var(--text-muted)">${s}</th>`).join('');
  let body=ages.map(u=>{
    let row=`<td style="padding:4px 6px;font-size:11px;color:var(--text-muted);text-align:right">${u}</td>`;
    row+=ages.map(s=>{const c=cells[u+'/'+s];if(!c)return'<td></td>';const isBest=best&&c.u===best.u&&c.s===best.s;
      return`<td title="${escHtml(uName)} ${u} · ${escHtml(sName)} ${s}: ${fmtK(val(c))}" style="padding:4px 6px;text-align:center;font-size:10.5px;${heat(val(c))};${isBest?'outline:2px solid var(--accent);font-weight:800;color:var(--accent)':'color:var(--text)'};border-radius:4px">${isBest?'★':''}${fmtKM(val(c))}</td>`;}).join('');
    return`<tr>${row}</tr>`;
  }).join('');
  return`<div style="margin-top:16px">
    <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px">Couple joint optimization — ${useNominal?'nominal':'present-value'} lifetime household benefit</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">★ = best combination (<span style="color:var(--accent);font-weight:600">${ownerLabel('primary')}</span> claims <strong style="color:var(--accent)">${best.u}</strong>, <span style="color:var(--orange);font-weight:600">${ownerLabel('spouse')}</span> claims <strong style="color:var(--accent)">${best.s}</strong>) · includes spousal &amp; survivor benefits</div>
    <div style="overflow-x:auto"><table style="border-collapse:separate;border-spacing:3px;min-width:520px"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
  </div>`;
}

function renderMCFanChart(container,res){
  container.innerHTML='';

  const ages=res.ages,n=ages.length;
  const adj=(v,age)=>adjV(v,age-res.curAge);

  const rawMax=Math.max(1,...B.p95);
  const maxVal=niceMax(rawMax);
  const minAge=ages[0],maxAge=ages[n-1];
  const xp=(age)=>PAD.l+(age-minAge)/Math.max(maxAge-minAge,1)*cW;

  svg.style.cssText='display:block;width:100%;height:100%;overflow:visible';

  const txt=(c,x,y,o={})=>{const t=el('text',{x,y,'font-size':o.size||10,'text-anchor':o.anchor||'end',fill:o.fill||getCSSVar('--text-muted')});t.textContent=c;return t;};
  const grid=getCSSVar('--chart-grid')||'rgba(255,255,255,.06)';

  const xStep=Math.max(1,Math.ceil((maxAge-minAge)/10));
  for(let age=minAge;age<=maxAge;age+=xStep)svg.appendChild(txt(age,xp(age),PAD.t+cH+16,{anchor:'middle'}));
  svg.appendChild(txt(maxAge,xp(maxAge),PAD.t+cH+16,{anchor:'middle'}));
  // Filled bands (forward high, reverse low)
  const bandPoly=(lo,hi,fill,op)=>{let pts='';for(let i=0;i<n;i++)pts+=`${xp(ages[i]).toFixed(1)},${yp(hi[i]).toFixed(1)} `;for(let i=n-1;i>=0;i--)pts+=`${xp(ages[i]).toFixed(1)},${yp(lo[i]).toFixed(1)} `;const pg=el('polygon',{points:pts.trim(),fill,opacity:op,stroke:'none'});svg.appendChild(pg);};
  const acc=getCSSVar('--accent')||'#00bfb3';
  bandPoly(B.p5,B.p95,acc,'0.10');

  bandPoly(B.p25,B.p75,acc,'0.28');
  // Retire + SS markers
  const vline=(age,color,dash,label,labY)=>{if(age<minAge||age>maxAge)return;const x=xp(age);svg.appendChild(el('line',{x1:x,y1:PAD.t,x2:x,y2:PAD.t+cH,stroke:color,'stroke-width':1,'stroke-dasharray':dash}));svg.appendChild(txt(label,x+3,labY,{anchor:'start',fill:color,size:9}));};
  vline(res.retAge,'#4a9eff','4,3','Retire '+res.retAge,PAD.t+11);
  vline(+state.ssClaimAge,'#22c55e','3,3','SS',PAD.t+cH-6);
  if(res.medianFailAge!=null)vline(res.medianFailAge,'#ef4444','5,3','Median fail '+res.medianFailAge,PAD.t+24);
  // Median line
  const medPts=ages.map((a,i)=>`${xp(a).toFixed(1)},${yp(B.p50[i]).toFixed(1)}`).join(' ');
  svg.appendChild(el('polyline',{points:medPts,fill:'none',stroke:acc,'stroke-width':2.6}));

  const guide=el('line',{stroke:'rgba(150,150,170,.5)','stroke-width':1,x1:0,x2:0,y1:PAD.t,y2:PAD.t+cH});guide.style.display='none';svg.appendChild(guide);

  container.appendChild(tt);
  const colW=cW/Math.max(n,1);

    const x=xp(age);
    const hr=el('rect',{x:x-colW/2,y:PAD.t,width:colW,height:cH,fill:'transparent'});
    hr.style.cursor='crosshair';

      guide.setAttribute('x1',x);guide.setAttribute('x2',x);guide.style.display='block';
      tt.style.display='block';
      tt.innerHTML=`<div style="font-weight:700;margin-bottom:5px">Age ${age}</div>`+
        [['95th',B.p95[i],'var(--success)'],['75th',B.p75[i],'var(--text)'],['Median',B.p50[i],acc],['25th',B.p25[i],'var(--text)'],['5th',B.p5[i],'var(--danger)']]

      tt.style.left=lx+'px';tt.style.top=(yp(B.p50[i])-10)+'px';
    });
    hr.addEventListener('mouseleave',()=>{guide.style.display='none';tt.style.display='none';});
    svg.appendChild(hr);
  });
  container.appendChild(svg);
}

/* ================================================================
   RENDER: CHART
   ================================================================ */
function renderChart(container,model,crashModel){
  container.innerHTML='';
  const W=container.offsetWidth||900,H=container.offsetHeight||380;
  if(W<50||H<50)return;
  const PAD={t:22,r:22,b:42,l:72};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const rows=model.rows;
  if(!rows.length)return;
  // X-axis: always derived from actual model row range (currentAge → lifeExpectancy)
  const minAge=rows[0].age,maxAge=rows[rows.length-1].age;
  // Compute display-adjusted values (respects Today's $ / Future $ toggle)
  const adjRow=(r)=>adjV(r.total,r.age-model.curAge);
  const adjBal=(r,accId)=>adjV(r.bals[accId]||0,r.age-model.curAge);
  const allAdj=rows.map(adjRow);
  const crashAdj=crashModel?crashModel.rows.map(r=>adjV(r.total,r.age-model.curAge)):[];
  // Y-axis: nice rounded ceiling so labels are clean and peak never clips
  const rawMax=Math.max(...allAdj,...crashAdj,1);
  const maxVal=niceMax(rawMax);
  function xp(age){return PAD.l+(age-minAge)/(Math.max(maxAge-minAge,1))*cW;}
  function yp(v){return PAD.t+cH-Math.max(0,Math.min(v,maxVal))/maxVal*cH;}
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  // viewBox ensures chart scales if CSS resizes the container after render
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio','none');
  svg.style.display='block';svg.style.overflow='visible';svg.style.width='100%';svg.style.height='100%';
  const defs=document.createElementNS(NS,'defs');
  // Use a unique clipPath ID per chart instance to avoid ID collisions when
  // the overview chart and the projections mini-chart both exist in the DOM
  const clipId=`plot-${++_chartClipCounter}`;
  const clip=document.createElementNS(NS,'clipPath');clip.setAttribute('id',clipId);
  // Extend clip rect slightly inward-padded so thick stroke edges aren't hairline-clipped
  const cr=document.createElementNS(NS,'rect');
  cr.setAttribute('x',PAD.l-2);cr.setAttribute('y',PAD.t-2);
  cr.setAttribute('width',cW+4);cr.setAttribute('height',cH+4);
  clip.appendChild(cr);defs.appendChild(clip);svg.appendChild(defs);
  function el(tag,attrs={},style={}){
    const e=document.createElementNS(NS,tag);
    Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
    Object.entries(style).forEach(([k,v])=>e.style[k]=v);
    return e;
  }
  function txt(content,x,y,opts={}){
    const t=el('text',{x,y,'font-size':opts.size||10,'text-anchor':opts.anchor||'end',fill:opts.fill||getCSSVar('--text-muted')});
    t.textContent=content;return t;
  }
  function line(x1,y1,x2,y2,attrs={}){return el('line',{x1,y1,x2,y2,...attrs});}
  function poly(pts,stroke,width,opts={}){return el('polyline',{'points':pts,'fill':'none',stroke,'stroke-width':width,'clip-path':`url(#${clipId})`,...opts});}
  const gridColor=getCSSVar('--chart-grid');
  // Y-axis: 6 evenly-spaced ticks from 0 → maxVal (nice ceiling)
  const YTICKS=6;
  for(let i=0;i<=YTICKS;i++){const v=maxVal*i/YTICKS,y=yp(v);svg.appendChild(line(PAD.l,y,PAD.l+cW,y,{stroke:gridColor,'stroke-width':'1'}));svg.appendChild(txt(fmtKM(v),PAD.l-6,y+4));}
  // X-axis: evenly-spaced labels, always including the final age
  const xStep=Math.max(1,Math.ceil((maxAge-minAge)/10));
  const xLabels=new Set();
  for(let age=minAge;age<=maxAge;age+=xStep)xLabels.add(age);
  xLabels.add(maxAge); // always show the last age
  xLabels.forEach(age=>svg.appendChild(txt(age,xp(age),PAD.t+cH+17,{anchor:'middle'})));
  if(state.retireAge>=minAge&&state.retireAge<=maxAge){
    const rx=xp(state.retireAge);
    svg.appendChild(line(rx,PAD.t,rx,PAD.t+cH,{stroke:'#4a9eff','stroke-width':'1','stroke-dasharray':'4,3'}));
    svg.appendChild(txt(`Retire ${state.retireAge}`,rx+4,PAD.t+13,{anchor:'start',fill:'#4a9eff',size:10}));
  }
  if(state.ssClaimAge>=minAge&&state.ssClaimAge<=maxAge){
    const sx=xp(state.ssClaimAge);
    svg.appendChild(line(sx,PAD.t,sx,PAD.t+cH,{stroke:'#22c55e','stroke-width':'1','stroke-dasharray':'3,3'}));
    svg.appendChild(txt('SS',sx+3,PAD.t+cH-10,{anchor:'start',fill:'#22c55e',size:9}));
  }
  // Draw per-scenario crash markers (one vertical dashed line per enabled crash)
  const enabledCrashes=(state.crashes||[]).filter(c=>c.enabled&&c.crashAge>=minAge&&c.crashAge<=maxAge);
  enabledCrashes.forEach((cr,ci)=>{
    const cx=xp(cr.crashAge),cex=xp(Math.min(cr.crashAge+cr.recoveryYears,maxAge));
    svg.appendChild(el('rect',{x:cx,y:PAD.t,width:Math.max(0,cex-cx),height:cH,fill:'rgba(239,68,68,0.04)'}));
    svg.appendChild(line(cx,PAD.t,cx,PAD.t+cH,{stroke:'#ef4444','stroke-width':'1.5','stroke-dasharray':'5,3'}));
    svg.appendChild(txt(`📉 ${cr.label||'Crash'}`,cx+4,PAD.t+14+ci*14,{anchor:'start',fill:'#ef4444',size:9}));
  });
  if(showAllAccounts){
    accounts.forEach(acc=>{
      const pts=rows.map(r=>`${xp(r.age)},${yp(adjBal(r,acc.id))}`).join(' ');
      svg.appendChild(poly(pts,acc.color,1.5,{opacity:'.55'}));
    });
  } else {
    const rothAccs=accounts.filter(a=>a.type==='roth');
    if(rothAccs.length){
      const pts=rows.map(r=>{
        const raw=rothAccs.reduce((s,a)=>s+(r.bals[a.id]||0),0);
        return`${xp(r.age)},${yp(adjV(raw,r.age-model.curAge))}`;
      }).join(' ');
      svg.appendChild(poly(pts,'#22c55e',2));
    }
  }
  // When crashes active, crashModel = baseline (no-crash) — draw as grey dashed reference line
  if(enabledCrashes.length&&crashModel){
    const pts=crashModel.rows.map(r=>`${xp(r.age)},${yp(adjV(r.total,r.age-model.curAge))}`).join(' ');
    svg.appendChild(poly(pts,'var(--text-faint)',1.5,{'stroke-dasharray':'6,4','opacity':'.6'}));
  }
  // Main portfolio trajectory line (crash-affected when crashes are enabled)
  svg.appendChild(poly(rows.map(r=>`${xp(r.age)},${yp(adjRow(r))}`).join(' '),'#00bfb3',3));
  const guide=el('line',{stroke:'rgba(255,255,255,.2)','stroke-width':'1',x1:0,x2:0,y1:PAD.t,y2:PAD.t+cH});
  guide.style.display='none';guide.style.pointerEvents='none';
  svg.appendChild(guide);
  const tt=document.createElement('div');
  const tbg=getCSSVar('--tooltip-bg'),tbdr=getCSSVar('--border'),tcl=getCSSVar('--text');
  tt.style.cssText=`position:absolute;background:${tbg};border:1px solid ${tbdr};border-radius:10px;padding:12px 16px;font-size:13px;line-height:1.7;pointer-events:none;z-index:9999;display:none;min-width:200px;max-width:300px;word-wrap:break-word;box-shadow:var(--shadow);color:${tcl}`;
  const colW=cW/Math.max(rows.length,1);
  rows.forEach((row,i)=>{
    const x=xp(row.age);
    const hr=el('rect',{x:x-colW/2,y:PAD.t,width:colW,height:cH,fill:'transparent'});
    hr.style.cursor='crosshair';
    hr.addEventListener('mouseenter',()=>{
      guide.setAttribute('x1',x);guide.setAttribute('x2',x);guide.style.display='block';
      const yrs=row.age-model.curAge;const d2=(v)=>displayMoney(v,yrs);
      const cRow=crashModel?crashModel.rows.find(r=>r.age===row.age):null;
      let h=`<div style="font-weight:700;margin-bottom:7px;font-size:14px">Age ${row.age} <span style="color:var(--text-muted);font-size:12px;font-weight:400">· ${row.yr}</span></div>`;
      h+=`<div style="display:flex;justify-content:space-between;gap:18px;margin-bottom:2px"><span style="color:var(--text-muted)">Total</span><strong style="color:#00bfb3">${d2(row.total)}</strong></div>`;
      // Only show per-account breakdown when individual lines are visible on the chart
      if(showAllAccounts){
        // Render grouped by account type
        const ttGroups={};GROUP_ORDER.forEach(g=>{ttGroups[g]=[];});
        accounts.forEach(acc=>{const g=GROUP_TYPE_MAP[acc.type]||'Other';(ttGroups[g]||(ttGroups['Other'])).push(acc);});
        GROUP_ORDER.forEach(gName=>{
          const accs=ttGroups[gName];if(!accs.length)return;
          const gBal=accs.reduce((s,a)=>s+(row.bals?.[a.id]||0),0);if(gBal===0)return;
          const gc=GROUP_COLORS[gName]||'var(--text-muted)';
          h+=`<div style="display:flex;justify-content:space-between;gap:12px;margin-top:5px;padding-top:4px;border-top:1px solid var(--border)"><span style="font-size:11px;font-weight:700;color:${gc}">&#9658; ${escHtml(gName)}</span><strong style="font-size:11px;color:${gc}">${d2(gBal)}</strong></div>`;
          if(accs.length>1){accs.forEach(acc=>{const bal=row.bals?.[acc.id]||0;if(bal===0)return;h+=`<div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:1px;padding-left:12px"><span style="font-size:11px;color:${acc.color}">&#183; ${escHtml(acc.name)}</span><strong style="font-size:11px;color:${acc.color}">${d2(bal)}</strong></div>`;});}
        });
      } else {
        // Show the Roth line that IS drawn when accounts are collapsed
        const rothAccs=accounts.filter(a=>a.type==='roth');
        const rothTotal=rothAccs.reduce((s,a)=>s+(row.bals?.[a.id]||0),0);
        if(rothTotal>0)h+=`<div style="display:flex;justify-content:space-between;gap:18px;margin-bottom:2px"><span style="color:#22c55e">Roth (Legacy)</span><strong style="color:#22c55e">${d2(rothTotal)}</strong></div>`;
      }
      if(row.isCrashYear)h+=`<div style="color:var(--danger);font-size:11px;margin-top:3px">📉 ${(row.activeCrashIds||[]).map(id=>(state.crashes||[]).find(c=>c.id===id)?.label||'Crash').join(' + ')}</div>`;
      if(cRow)h+=`<div style="display:flex;justify-content:space-between;gap:18px;margin-bottom:2px"><span style="color:var(--text-muted)">Base (no crash)</span><strong style="color:var(--text-muted)">${d2(cRow.total)}</strong></div>`;
      if(row.totalSS>0)h+=`<div style="display:flex;justify-content:space-between;gap:18px;margin-bottom:2px"><span style="color:var(--text-muted)">SS income</span><strong style="color:#22c55e">${d2(row.totalSS)}/yr</strong></div>`;
      if(row.netDraw>0)h+=`<div style="display:flex;justify-content:space-between;gap:18px;margin-bottom:2px"><span style="color:var(--text-muted)">Portfolio draw</span><strong style="color:#ef4444">${d2(row.netDraw)}</strong></div>`;
      h+=`<div style="margin-top:7px;padding-top:7px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted)">${row.phase==='Building'?'▲ Building':row.phase==='Pause'?'⛵ Pause':'▼ Retirement'}</div>`;
      tt.innerHTML=h;tt.style.display='block';
    });
    hr.addEventListener('mousemove',(e)=>{
      const rect=container.getBoundingClientRect();
      const tipW=tt.offsetWidth||300;
      const tipH=tt.offsetHeight||180;
      let tx=e.clientX-rect.left+16;
      let ty=e.clientY-rect.top-20;
      // Flip horizontally if tooltip would overflow right edge of container
      if(tx+tipW>W-4)tx=e.clientX-rect.left-tipW-8;
      // Keep within left edge
      tx=Math.max(4,tx);
      // Flip vertically if tooltip would clip below container
      if(ty+tipH>container.offsetHeight)ty=e.clientY-rect.top-tipH-4;
      if(ty<0)ty=4;
      tt.style.left=tx+'px';tt.style.top=ty+'px';
    });
    hr.addEventListener('mouseleave',()=>{tt.style.display='none';guide.style.display='none';});
    svg.appendChild(hr);
  });
  container.appendChild(svg);container.appendChild(tt);
}
