      const n=incomes.length||1;
      const avgIncome=incomes.reduce((s,v)=>s+v,0)/n;
      const variance=incomes.reduce((s,v)=>s+(v-avgIncome)*(v-avgIncome),0)/n;
      const volatility=Math.sqrt(Math.max(0,variance));
      out={key,lifetimeTax:cost.incomeTax,endEstate:cost.endEstate,avgIncome,volatility,
        remaining:cost.endEstate,endingRoth:cost.endingRoth,totalLifetimeTax:cost.totalLifetimeTax,
        years:ret.length,retYears:n};
    }catch(e){out={key,lifetimeTax:0,endEstate:0,avgIncome:0,volatility:0,remaining:0,endingRoth:0,totalLifetimeTax:0,error:String(e&&e.message||e)};}
    state.withdrawalStrategy=saved;
    return out;
  }
  RIQ.Withdrawal.evaluateStrategy=evaluateStrategy;
  RIQ.Withdrawal.evaluateAll=function(){return RIQ.Withdrawal.catalog.map(c=>evaluateStrategy(c.key));};

  // ── Strategy Lab: chained async Monte Carlo (failure probability) for every strategy ──
  // Runs strategies sequentially through RIQ.Simulation so the UI never freezes. trialsOverride
  // keeps each pass responsive. onEach(key,result) fires per completion; onDone() at the end.
  RIQ.Withdrawal._labMC=null; // {key:successProb,...}
  function runLabMonteCarlo(opts){
    opts=opts||{};
    const keys=RIQ.Withdrawal.catalog.map(c=>c.key);
    const trials=Math.max(500,Math.min(+opts.trials||1500,5000));
    const seed=opts.seed!=null?opts.seed:12345;
    const savedStrat=state.withdrawalStrategy;
    const out={};
    let i=0,cancelled=false;
    function next(){
      if(cancelled){state.withdrawalStrategy=savedStrat;return;}
      if(i>=keys.length){state.withdrawalStrategy=savedStrat;RIQ.Withdrawal._labMC=out;if(opts.onDone)opts.onDone(out);return;}
      const key=keys[i++];
      state.withdrawalStrategy=key;
      RIQ.Simulation.run({
        trialsOverride:trials,seed,
        onComplete:function(res){
          out[key]={successProb:res.successProb,ci:res.ci,medianEstate:res.endStats.median,failCount:res.failCount,trials:res.trials};
          if(opts.onEach)opts.onEach(key,out[key],i,keys.length);
          next();
        },
      });
    }
    next();
    return {cancel(){cancelled=true;}};
  }
  RIQ.Withdrawal.runLabMonteCarlo=runLabMonteCarlo;
})();

/* ================================================================
   RIQ.SocialSecurity — CLAIMING-AGE OPTIMIZER (Phase 5)
   ----------------------------------------------------------------
   Pure benefit engine + optimizer that layers on top of the existing SS logic
   in buildModel() WITHOUT changing it. It reuses getFRA()/ssAdj() (the same
   actuarial rules the model uses) and, for portfolio/tax/failure metrics, it
   re-runs the real buildModel()/RIQ.Simulation with a temporarily-patched claim
   age (state is always restored, so the live deterministic model is untouched).

   Claiming rules implemented (SSA):
     • Early-claim reduction: 5/9 of 1% per month for the first 36 months before
       FRA, 5/12 of 1% per month beyond 36 (via the shared ssAdj()).
     • Delayed retirement credits: +8%/yr from FRA to age 70 (via ssAdj()).
     • COLA: state.ssInflation compounded from claim (matches the model).
     • Spousal: greater of own vs 50% of the higher earner's PIA at FRA, with the
       standard spousal early-claim reduction (no delayed credits on spousal).
     • Survivor: the surviving spouse steps up to the greater of their own benefit
       or the deceased's benefit (delayed credits to death, no early reduction if
       the worker died before claiming).
   ================================================================ */
(function(){
  'use strict';
  RIQ.SocialSecurity=RIQ.SocialSecurity||{};
  const SS=RIQ.SocialSecurity;
  // Preserve existing pass-throughs (fra/adjust) and formalize them.
  SS.fra=SS.fra||((...a)=>getFRA(...a));
  SS.adjust=SS.adjust||((...a)=>ssAdj(...a));

  const CLAIM_AGES=[62,63,64,65,66,67,68,69,70];
  SS.CLAIM_AGES=CLAIM_AGES;

  // Monthly benefit at a given claim age (own record). Reuses ssAdj — identical rules to buildModel.
  function monthlyBenefit(monthlyFRA,claimAge,fra){return (monthlyFRA||0)*ssAdj(claimAge,fra);}
  SS.monthlyBenefit=monthlyBenefit;

  // Spousal reduction factor applied to the 50%-of-PIA spousal benefit.
  // SSA: −25/36 of 1% per month for the first 36 months early, −5/12 of 1% beyond; no delayed credits.
  function spousalReduction(claimAge,fra){
    const moEarly=Math.round((fra-claimAge)*12);
    if(moEarly<=0)return 1; // at/after FRA → full 50% (spousal never earns delayed credits)
    const first=Math.min(moEarly,36),beyond=Math.max(0,moEarly-36);
    return Math.max(0,1-first*(25/36/100)-beyond*(5/12/100));
  }
  SS.spousalReduction=spousalReduction;

  // A person's own annual benefit at a given age, assuming they claim at p.claim and COLA compounds
  // from claim. forceClaim=true is used for the survivor basis (worker died): credit delayed credits
  // up to death (cap 70), and apply no early reduction if death preceded the chosen claim age.
  function ownAnnual(p,ageNow,cola,forceClaim){
    if(ageNow>=p.claim){
      return p.mFRA*ssAdj(p.claim,p.fra)*12*Math.pow(1+cola,ageNow-p.claim);
    }
    if(forceClaim){
      const effAge=Math.min(70,Math.max(p.fra,ageNow));
      return p.mFRA*ssAdj(effAge,p.fra)*12*Math.pow(1+cola,Math.max(0,ageNow-effAge));
    }
    return 0;
  }

  // Build the household year-by-year SS income stream for a candidate pair of claim ages.
  // Handles own, spousal (both directions), and survivor step-up. Returns nominal + present-value
  // lifetime totals and a cumulative-by-age series (used for the break-even visualization).
  function householdStream(P){
    const cola=P.cola,d=P.discount;
    const rows=[];let nominal=0,pv=0,cum=0;const cumArr=[];
    const span=Math.max(P.uLifeAge-P.uCurAge,P.hasSpouse?(P.sLifeAge-P.sCurAge):0);
    for(let y=0;y<=span;y++){
      const uAge=P.uCurAge+y,sAge=P.sCurAge+y;
      const uAlive=uAge<=P.uLifeAge;
      const sAlive=P.hasSpouse&&sAge<=P.sLifeAge;
      if(!uAlive&&!sAlive)break;
      const uOwn=uAlive?ownAnnual(P.user,uAge,cola,false):0;
      const sOwn=(sAlive&&P.hasSpouse)?ownAnnual(P.spouse,sAge,cola,false):0;
      let hh=0;
      if(uAlive&&sAlive){
        const uClaimed=uAge>=P.user.claim,sClaimed=sAge>=P.spouse.claim;
        // Spousal top-ups require the primary worker to have filed. Symmetric (either can claim off the other).
        const sSpousal=(uClaimed&&sClaimed)?0.5*P.user.mFRA*spousalReduction(P.spouse.claim,P.spouse.fra)*12*Math.pow(1+cola,Math.max(0,uAge-P.user.claim)):0;
        const uSpousal=(sClaimed&&uClaimed)?0.5*P.spouse.mFRA*spousalReduction(P.user.claim,P.user.fra)*12*Math.pow(1+cola,Math.max(0,sAge-P.spouse.claim)):0;
        hh=Math.max(uOwn,uSpousal)+Math.max(sOwn,sSpousal);
      } else if(uAlive&&!sAlive){
        const surv=P.hasSpouse?ownAnnual(P.spouse,sAge,cola,true):0; // survivor step-up to deceased spouse's benefit
        hh=Math.max(uOwn,surv);
      } else if(!uAlive&&sAlive){
        const surv=ownAnnual(P.user,uAge,cola,true);
        hh=Math.max(sOwn,surv);
      }
      nominal+=hh;pv+=hh/Math.pow(1+d,y);cum+=hh;
      cumArr.push({age:uAge,cum});
      rows.push({y,uAge,sAge,uAlive,sAlive,household:Math.round(hh)});
    }
    return{rows,nominal,pv,cumArr};
  }
  SS.householdStream=householdStream;

  // Resolve everything the engine needs from the current state (pure; no side effects).
  function resolveInputs(){
    const uCurAge=computeAge(state.dob);
    const uFRA=getFRA(new Date(state.dob||'1985-01-01').getFullYear());
    const hasSpouse=!!state.spouseDob;
    const sCurAge=hasSpouse?computeAge(state.spouseDob):0;
    const sFRA=hasSpouse?getFRA(new Date(state.spouseDob).getFullYear()):67;
    const lifeAge=+(state.lifeExpectancy||90);
    return{
      uCurAge,uFRA,hasSpouse,sCurAge,sFRA,
      uMonthlyFRA:+state.ssMonthly||0,
      sMonthlyFRA:hasSpouse?(+state.spouseSSMonthly||0):0,
      cola:(+state.ssInflation||2.5)/100,
      discount:(+state.ssOptDiscountRate||2.5)/100,
      // Each spouse is planned through the same life-expectancy AGE; because DOBs differ, the death
      // CALENDAR years differ, which naturally produces a survivor window for the longer-lived spouse.
      uLifeAge:lifeAge,sLifeAge:lifeAge,
      curClaim:+state.ssClaimAge||67,
      curSpouseClaim:hasSpouse?(+state.spouseSSClaim||67):67,
    };
  }
  SS.resolveInputs=resolveInputs;

  // Lifetime benefit (nominal + PV) and cumulative series for one candidate claim pair.
  function evalBenefit(inp,uClaim,sClaim){
    const P={
      cola:inp.cola,discount:inp.discount,hasSpouse:inp.hasSpouse,
      uCurAge:inp.uCurAge,sCurAge:inp.sCurAge,uLifeAge:inp.uLifeAge,sLifeAge:inp.sLifeAge,
      user:{mFRA:inp.uMonthlyFRA,claim:uClaim,fra:inp.uFRA},
      spouse:{mFRA:inp.sMonthlyFRA,claim:sClaim,fra:inp.sFRA},
    };
    const st=householdStream(P);
    return{uClaim,sClaim,nominal:st.nominal,pv:st.pv,cumArr:st.cumArr};
  }
  SS.evalBenefit=evalBenefit;

  // Break-even age: the user-age at which a later-claiming candidate's cumulative benefit catches
  // up to the claim-at-62 baseline. Both series start at 0, and the earlier (62) strategy pulls
  // ahead first; the break-even is where the candidate overtakes it again. Returns null when the
  // candidate never falls behind (e.g. it IS the 62 baseline) or never catches up within the horizon.
  function breakEvenAge(candCum,baseCum){
    const n=Math.min(candCum.length,baseCum.length);
    let baseAhead=false;
    for(let i=0;i<n;i++){
      const c=candCum[i].cum,b=baseCum[i].cum;
      if(b>c+1e-6)baseAhead=true;                     // claim-at-62 has pulled ahead
      else if(baseAhead&&c>=b-1e-6)return candCum[i].age; // candidate has caught back up
    }
    return null;
  }
  SS.breakEvenAge=breakEvenAge;

  // Portfolio + tax metrics for a candidate: re-run the REAL buildModel() with the claim age(s)
  // temporarily patched in, then restore state. Returns ending estate + lifetime income tax.
  function portfolioMetrics(uClaim,sClaim){
    const savedU=state.ssClaimAge,savedS=state.spouseSSClaim,savedCache=state.ssOptCache;
    state.ssClaimAge=uClaim;if(state.spouseDob)state.spouseSSClaim=sClaim;
    let estate=0,tax=0,ok=false;
    try{
      const m=buildModel();
      estate=(m.meta&&m.meta.estateAtEnd)||0;
      const T=m.totals||{};
      tax=(T.fedTaxSum||0)+(T.stateTaxSum||0)+(T.convTaxSum||0);
      ok=true;
    }catch(e){/* leave defaults */}
    state.ssClaimAge=savedU;state.spouseSSClaim=savedS;state.ssOptCache=savedCache;
    return{estate,tax,ok};
  }
  SS.portfolioMetrics=portfolioMetrics;

  // Plain-English rationale for the recommendation.
  function explain(inp,rec,cur,objective){
    const married=inp.hasSpouse;
    const who=married?`you at ${rec.uClaim} and your spouse at ${rec.sClaim}`:`claiming at ${rec.uClaim}`;
    const pvDelta=Math.round(rec.pv-cur.pv);
    const estDelta=Math.round((rec.estate||0)-(cur.estate||0));
    const parts=[];
    if(objective==='pv'){
      parts.push(`Claiming ${who} maximizes your household's present-value lifetime Social Security benefit`);
      if(pvDelta!==0)parts.push(`— about ${fmtK(Math.abs(pvDelta))} ${pvDelta>=0?'more':'less'} than your current plan (present value).`);
      else parts.push('.');
    } else if(objective==='estate'){
      parts.push(`Claiming ${who} produces the largest projected ending estate`);
      if(estDelta!==0)parts.push(`— about ${fmtK(Math.abs(estDelta))} ${estDelta>=0?'higher':'lower'} at age ${inp.uLifeAge} than your current claim age(s).`);
      else parts.push('.');
    } else {
      parts.push(`Claiming ${who} minimizes your Monte Carlo probability of running out of money`);
      if(rec.failure!=null&&cur.failure!=null){const dp=Math.round((cur.failure-rec.failure)*1000)/10;parts.push(`— roughly ${Math.abs(dp)} pts ${dp>=0?'lower':'higher'} failure risk than your current plan.`);}
      else parts.push('.');
    }
    if(rec.uClaim>=70||(married&&rec.sClaim>=70)){
      parts.push(' Delaying to 70 secures the largest delayed-retirement credits, and the higher benefit becomes a permanent survivor benefit that protects the longer-lived spouse.');
    } else if(rec.uClaim<=62){
      parts.push(' Claiming early starts income sooner; the break-even math favors it when the plan values cash-in-hand or a shorter horizon.');
    }
    if(rec.breakEven!=null&&objective==='pv'){parts.push(` Versus claiming at 62, this strategy breaks even around age ${rec.breakEven}.`);}
    return parts.join('');
  }

  // Main optimizer. Returns a full result bundle for the UI. Cached by a state signature so
  // repeated renders (and money-mode toggles) don't re-run buildModel unnecessarily.
  function _sig(){const s={...state};delete s.moneyMode;delete s.ssOptCache;return JSON.stringify(s)+'|'+JSON.stringify(accounts);}

  function optimize(opts){
    opts=opts||{};
    const objective=opts.objective||state.ssOptObjective||'pv';
    const sig=_sig()+'|'+objective;
    if(!opts.force&&SS._cache&&SS._cache.sig===sig)return SS._cache.result;
    const inp=resolveInputs();

    // ── Individual axis (user claim varies; spouse held at current claim) ──
    const baseline=evalBenefit(inp,62,inp.curSpouseClaim); // claim-at-62 baseline for break-even
    const individual=CLAIM_AGES.map(a=>{
      const b=evalBenefit(inp,a,inp.curSpouseClaim);
      const pm=portfolioMetrics(a,inp.curSpouseClaim);
      return{claim:a,pv:b.pv,nominal:b.nominal,estate:pm.estate,tax:pm.tax,
        breakEven:breakEvenAge(b.cumArr,baseline.cumArr),cumArr:b.cumArr};
    });

    // ── Couple joint optimization (full 9×9 grid on PV; estate on grid only when needed) ──
    let couple=null;
    if(inp.hasSpouse){
      const grid=[];let best=null;
      const gridEstate=(objective==='estate');
      for(const u of CLAIM_AGES)for(const s of CLAIM_AGES){
        const b=evalBenefit(inp,u,s);
        let estate=null;
        if(gridEstate){estate=portfolioMetrics(u,s).estate;}
        const cell={u,s,pv:b.pv,nominal:b.nominal,estate};
        grid.push(cell);
        const score=gridEstate?estate:b.pv;
        const bestScore=best?(gridEstate?best.estate:best.pv):-Infinity;
        if(!best||score>bestScore)best=cell;
      }
      couple={grid,best};
    }

    // ── Current-plan metrics ──
    const curB=evalBenefit(inp,inp.curClaim,inp.curSpouseClaim);
    const curPM=portfolioMetrics(inp.curClaim,inp.curSpouseClaim);
    const current={uClaim:inp.curClaim,sClaim:inp.curSpouseClaim,pv:curB.pv,nominal:curB.nominal,
      estate:curPM.estate,tax:curPM.tax,cumArr:curB.cumArr};

    // ── Choose recommendation for the objective ──
    let rec;
    if(inp.hasSpouse){
      let pick;
      if(objective==='estate'){pick=couple.best;}
      else{pick=couple.grid.reduce((a,b)=>b.pv>a.pv?b:a,couple.grid[0]);} // pv (and default for 'failure' before MC)
      const bb=evalBenefit(inp,pick.u,pick.s);
      const pm=(pick.estate!=null)?{estate:pick.estate,tax:portfolioMetrics(pick.u,pick.s).tax}:portfolioMetrics(pick.u,pick.s);
      rec={uClaim:pick.u,sClaim:pick.s,pv:bb.pv,nominal:bb.nominal,estate:pm.estate,tax:pm.tax,
        breakEven:breakEvenAge(bb.cumArr,baseline.cumArr)};
    } else {
      let pick;
      if(objective==='estate'){pick=individual.reduce((a,b)=>b.estate>a.estate?b:a,individual[0]);}
      else{pick=individual.reduce((a,b)=>b.pv>a.pv?b:a,individual[0]);}
      rec={uClaim:pick.claim,sClaim:inp.curSpouseClaim,pv:pick.pv,nominal:pick.nominal,
        estate:pick.estate,tax:pick.tax,breakEven:pick.breakEven};
    }
    rec.failure=null;current.failure=null; // populated on demand via runFailureAnalysis()

    const result={objective,married:inp.hasSpouse,inp,ages:CLAIM_AGES.slice(),
      baseline,individual,couple,current,recommended:rec,
      explanation:explain(inp,rec,current,objective),generatedAt:Date.now()};
    result.explanation=explain(inp,rec,current,objective);
    SS._cache={sig,result};
    return result;
  }
  SS.optimize=optimize;
  SS._cache=null;

  // ── Monte Carlo failure probability for a specific claim pair (async, reuses RIQ.Simulation) ──
  // Patches state, runs a modest-trial simulation, restores state, and invokes cb(successProb,failProb).
  function runFailureFor(uClaim,sClaim,trials,seed,cb){
    const savedU=state.ssClaimAge,savedS=state.spouseSSClaim;
    state.ssClaimAge=uClaim;if(state.spouseDob)state.spouseSSClaim=sClaim;
    return RIQ.Simulation.run({trialsOverride:trials,seed,onComplete:function(res){
      state.ssClaimAge=savedU;state.spouseSSClaim=savedS;
      cb({successProb:res.successProb,failure:1-res.successProb,ci:res.ci,medianEstate:res.endStats.median});
    }});
  }
  SS.runFailureFor=runFailureFor;

  // Compare current vs recommended (and, for 'failure' objective, also the individual axis) via MC.
  // Chained so the UI never freezes. onEach(tag,metrics) per completion; onDone() at the end.
  function runFailureAnalysis(opts){
    opts=opts||{};
    const r=SS._cache&&SS._cache.result;if(!r){if(opts.onDone)opts.onDone();return{cancel(){}};}
    const trials=Math.max(500,Math.min(+state.ssOptMCTrials||2000,5000));
    const seed=opts.seed!=null?opts.seed:24680;
    // Candidate set: current + recommended (+ every individual age when objective==='failure').
    const set=[{tag:'current',u:r.current.uClaim,s:r.current.sClaim}];
    const seen=new Set([r.current.uClaim+'/'+r.current.sClaim]);
    const recKey=r.recommended.uClaim+'/'+r.recommended.sClaim;
    if(!seen.has(recKey)){set.push({tag:'recommended',u:r.recommended.uClaim,s:r.recommended.sClaim});seen.add(recKey);}
    if(r.objective==='failure'&&!r.married){
      r.individual.forEach(it=>{const k=it.claim+'/'+r.current.sClaim;if(!seen.has(k)){set.push({tag:'age'+it.claim,u:it.claim,s:r.current.sClaim});seen.add(k);}});
    }
    const out={};let i=0,cancelled=false;
    function next(){
      if(cancelled){if(opts.onDone)opts.onDone(out);return;}
      if(i>=set.length){
        // Attach results back onto the cached bundle.
        if(out.current){r.current.failure=out.current.failure;}
        // Re-pick recommendation for the 'failure' objective from the measured set.
        if(r.objective==='failure'){
          let bestTag=null,bestFail=Infinity;
          set.forEach(c=>{const o=out[c.tag];if(o&&o.failure<bestFail){bestFail=o.failure;bestTag=c;}});
          if(bestTag){const bb=evalBenefit(r.inp,bestTag.u,bestTag.s);const pm=portfolioMetrics(bestTag.u,bestTag.s);
            r.recommended={uClaim:bestTag.u,sClaim:bestTag.s,pv:bb.pv,nominal:bb.nominal,estate:pm.estate,tax:pm.tax,
              breakEven:breakEvenAge(bb.cumArr,r.baseline.cumArr),failure:bestFail};
            r.explanation=explain(r.inp,r.recommended,r.current,'failure');}
        } else if(out.recommended){r.recommended.failure=out.recommended.failure;r.explanation=explain(r.inp,r.recommended,r.current,r.objective);}
        SS._mcRan=true;
        if(opts.onDone)opts.onDone(out);return;
      }
      const c=set[i++];
      runFailureFor(c.u,c.s,trials,seed,function(mtr){
        out[c.tag]=mtr;
        if(opts.onEach)opts.onEach(c.tag,mtr,i,set.length);
        next();
      });
    }
    next();
    return{cancel(){cancelled=true;}};
  }
  SS.runFailureAnalysis=runFailureAnalysis;
})();

/* ================================================================
   RIQ.Scenarios — SCENARIO COMPARISON / MANAGER (Feature 5)
   ----------------------------------------------------------------
   Saves complete named plan snapshots (deep copy of state + accounts +
   overrides/toggles/irsOv) and evaluates them in ISOLATION: buildModel() is
   run against a temporarily-swapped set of globals, which are always restored
   in a finally block, so the live deterministic model is never mutated.
   Snapshots live on state.savedScenarios (EMPTY by default → estate unchanged),
   are preserved by exportWithData() and stripped by exportCleanTemplate().
   ================================================================ */
RIQ.Scenarios=(function(){
  'use strict';
  const _evalCache=new Map();   // id → metrics (snapshots are immutable, so cache is durable)
  let _mc={};                   // key → {successProb, median} from optional Monte Carlo
  function uid(){return 's'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
  function list(){if(!Array.isArray(state.savedScenarios))state.savedScenarios=[];return state.savedScenarios;}
  function find(id){return list().find(s=>s.id===id)||null;}
  // Deep snapshot of the current plan (excludes savedScenarios + transient caches).
  function snapshot(name){
    const st=JSON.parse(JSON.stringify(state));
    delete st.savedScenarios; delete st.ssOptCache;
    return {
      id:uid(),
      name:(name&&String(name).trim())||('Plan '+(list().length+1)),
      createdAt:new Date().toISOString(),
      state:st,
      accounts:JSON.parse(JSON.stringify(accounts||[])),
      overrides:JSON.parse(JSON.stringify(overrides||{})),
      toggles:JSON.parse(JSON.stringify(toggles||{})),
      irsOv:JSON.parse(JSON.stringify(irsOv||{})),
    };
  }
  function save(name){const s=snapshot(name);list().push(s);return s;}
  function remove(id){state.savedScenarios=list().filter(s=>s.id!==id);_evalCache.delete(id);_evalCache.delete(id+'|s');delete _mc[id];}
  function rename(id,name){const s=find(id);if(s){const n=String(name||'').trim();if(n)s.name=n;}return s;}
  // Load a snapshot into the live globals (overwrites current inputs; preserves the scenario library).
  function load(id){
    const s=find(id);if(!s)return false;
    const keep=state.savedScenarios;
    const merged={...state,...JSON.parse(JSON.stringify(s.state))};
    merged.savedScenarios=keep;
    if(!merged.glideSchedule||!merged.glideSchedule.length)merged.glideSchedule=state.glideSchedule;
    if(!merged.crashes||!merged.crashes.length)merged.crashes=state.crashes;
    Object.assign(state,merged);
    accounts=(s.accounts||[]).map(a=>migrateAccount(JSON.parse(JSON.stringify(a))));
    overrides=JSON.parse(JSON.stringify(s.overrides||{}));
    toggles=JSON.parse(JSON.stringify(s.toggles||{}));
    irsOv=JSON.parse(JSON.stringify(s.irsOv||{}));
    return true;
  }
  // Run fn() with the given plan patched into the globals, then fully restore. Never leaks mutations.
  function _withPlan(plan,fn){
    const sv={state,accounts,overrides,toggles,irsOv};
    try{
      state=Object.assign({},sv.state,plan.state);state.savedScenarios=[]; // never nest snapshots
      accounts=(plan.accounts||[]).map(a=>migrateAccount(JSON.parse(JSON.stringify(a))));
      overrides=JSON.parse(JSON.stringify(plan.overrides||{}));
      toggles=JSON.parse(JSON.stringify(plan.toggles||{}));
      irsOv=JSON.parse(JSON.stringify(plan.irsOv||{}));
      return fn();
    } finally {
      state=sv.state;accounts=sv.accounts;overrides=sv.overrides;toggles=sv.toggles;irsOv=sv.irsOv;
    }
  }
  function _metricsFromModel(m,planState,withSeries){
    const T=m.totals||{},meta=m.meta||{},rows=m.rows||[];
    const retRows=rows.filter(r=>r.phase==='Retirement');
    const ruin=retRows.find(r=>r.isRuined||r.total<=0);
    const peak=rows.reduce((mx,r)=>Math.max(mx,r.total),0);
    const res={
      endingEstate:meta.estateAtEnd||0,
      lifetimeTaxes:(T.fedTaxSum||0)+(T.stateTaxSum||0)+(T.convTaxSum||0),
      retireAge:+((planState||state).retireAge)||null,
      planToAge:+((planState||state).lifeExpectancy)||(rows.length?rows[rows.length-1].age:null),
      totalContributions:T.contribSum||0,
      peakPortfolio:peak,
      portfolioAtRetire:meta.portfolioAtRetire||0,
      depletionAge:ruin?ruin.age:null,
      rothLegacy:T.finalRoth||0,
      curAge:m.curAge,
      firstAge:rows.length?rows[0].age:m.curAge,
      lastAge:rows.length?rows[rows.length-1].age:m.curAge,
    };
    if(withSeries)res.series=rows.map(r=>({age:r.age,total:r.total}));
    return res;
  }
  // Deterministic metrics for a saved snapshot (isolated buildModel; state restored).
  function evaluate(snap,opts){
    opts=opts||{};
    const key=snap.id+(opts.withSeries?'|s':'');
    if(_evalCache.has(key))return _evalCache.get(key);
    const res=_withPlan(snap,function(){
      try{return _metricsFromModel(buildModel(),snap.state,opts.withSeries);}
      catch(e){return{error:String(e&&e.message||e)};}
    });
    _evalCache.set(key,res);
    return res;
  }
  // Live-plan metrics from the already-built global _model (no recompute needed).
  function liveMetrics(opts){
    if(!_model||!_model.rows||!_model.rows.length)return null;
    return _metricsFromModel(_model,state,opts&&opts.withSeries);
  }
  function mcResults(){return _mc;}
  function invalidateCache(){_evalCache.clear();_mc={};}
  // Optional Monte Carlo success probability per entry. entries:[{key,live,plan}]. Chained/async.
  function runSuccess(entries,cbEach,cbDone,trials,seed){
    trials=trials||1500;seed=(seed!=null)?seed:97531;
    let i=0,cancelled=false;
    const sv={state,accounts,overrides,toggles,irsOv};
    function restore(){state=sv.state;accounts=sv.accounts;overrides=sv.overrides;toggles=sv.toggles;irsOv=sv.irsOv;}
    function next(){
      if(cancelled||i>=entries.length){restore();if(cbDone)cbDone(_mc);return;}
      const e=entries[i++];
      if(!e.live&&e.plan){
        state=Object.assign({},sv.state,e.plan.state);state.savedScenarios=[];
        accounts=(e.plan.accounts||[]).map(a=>migrateAccount(JSON.parse(JSON.stringify(a))));
        overrides=JSON.parse(JSON.stringify(e.plan.overrides||{}));
        toggles=JSON.parse(JSON.stringify(e.plan.toggles||{}));
        irsOv=JSON.parse(JSON.stringify(e.plan.irsOv||{}));
      } else { restore(); } // live plan uses current globals
      RIQ.Simulation.run({trialsOverride:trials,seed,onComplete:function(res){
        _mc[e.key]={successProb:res.successProb,median:res.endStats.median};
        restore(); // restore BEFORE the next iteration patches again
        if(cbEach)cbEach(e.key,_mc[e.key],i,entries.length);
        next();
      }});
    }
    next();
    return{cancel(){cancelled=true;restore();}};
  }
  return{list,find,snapshot,save,remove,rename,load,evaluate,liveMetrics,runSuccess,mcResults,invalidateCache};
})();

/* ================================================================
   RIQ.Recommendations — AI RECOMMENDATION ENGINE (Feature 6)
   ----------------------------------------------------------------
   Analyzes the live plan and produces a prioritized, dollar-quantified action
   list by leveraging the existing optimizers (Roth, Social Security, withdrawal
   strategy comparison) and isolated what-if runs (runSimulation/_runIsolatedModel).
   EVERY impact is computed against a temporarily-patched model and the live
   state is always restored — generating recommendations never changes results.
   ================================================================ */
RIQ.Recommendations=(function(){
  'use strict';
  let _cache=null; // {recs, health, generatedAt}
  function invalidate(){_cache=null;}
  function get(){return _cache;}
  const MIN_IMPACT=1000; // ignore negligible sub-$1k deltas
  function generate(force){
    if(_cache&&!force)return _cache;
    if(!_model||!_model.rows||!_model.rows.length){_cache={recs:[],health:null,generatedAt:Date.now()};return _cache;}
    const base=_model,meta=base.meta||{},T=base.totals||{},rows=base.rows,curAge=base.curAge;
    const lastYrs=rows.length?rows[rows.length-1].age-curAge:0;
    const baseEstate=meta.estateAtEnd||0;
    const recs=[];
    let _rid=0;
    const mk=(o)=>{o.id='rec'+(++_rid);o.impactValue=Math.round(o.impactValue||0);o.yrs=lastYrs;recs.push(o);};

    // 1 — Roth conversion optimizer (marginal vs current plan; includes IRMAA + heirs' tax)
    try{
      if(RIQ.Withdrawal&&RIQ.Withdrawal.optimizeRothConversions&&RIQ.Withdrawal.lifetimeTaxCost){
        const hasPre=accounts.some(a=>['pretax','401k','traditional-ira'].includes(a.type));
        const hasRoth=accounts.some(a=>a.type==='roth');
        if(hasPre&&hasRoth){
          const opt=RIQ.Withdrawal.optimizeRothConversions(); // restores state.rothConvCeilingBracket
          const curCost=RIQ.Withdrawal.lifetimeTaxCost(base);
          const best=opt.best;
          const delta=(curCost.totalLifetimeTax||0)-(best.totalLifetimeTax||0);
          if(best&&delta>MIN_IMPACT){
            mk({category:'Tax',title:'Optimize Roth conversions — '+best.label,
              explanation:'A bracket-fill Roth conversion schedule ('+best.label.toLowerCase()+') minimizes projected lifetime tax — federal + state income tax, conversion tax, estimated Medicare IRMAA surcharges, and heirs\u2019 tax on inherited pre-tax under the SECURE 10-year rule. Converting about '+fmtK(best.totalConverted||0)+' across retirement grows the tax-free Roth legacy to '+displayMoney(best.endingRoth||0,lastYrs)+'.',
              impactValue:delta,impactType:'tax',effort:'Medium',
              action:{type:'roth',ceiling:best.ceiling},applyLabel:'Apply conversion plan'});
          }
        }
      }
    }catch(e){console.warn('rec roth',e);}

    // 2 — Social Security claiming age (Δ ending estate)
    try{
      if(RIQ.SocialSecurity&&RIQ.SocialSecurity.optimize&&(+state.ssMonthly||0)>0){
        const r=RIQ.SocialSecurity.optimize({objective:'estate'}); // restores state (portfolioMetrics)
        const rec=r.recommended,cur=r.current;
        const changed=rec.uClaim!==cur.uClaim||(r.married&&rec.sClaim!==cur.sClaim);
        const dEstate=(rec.estate||0)-(cur.estate||0);
        if(changed&&dEstate>MIN_IMPACT){
          const who=r.married?(rec.uClaim+' / '+rec.sClaim):(''+rec.uClaim);
          const now=r.married?(cur.uClaim+' / '+cur.sClaim):(''+cur.uClaim);
          mk({category:'Social Security',title:'Claim Social Security at '+who+' (now '+now+')',
            explanation:'Adjusting your claim age'+(r.married?'s':'')+' to '+who+' produces the largest projected ending estate. Delaying earns +8%/yr in delayed-retirement credits after Full Retirement Age and creates a larger permanent survivor benefit; claiming earlier starts income sooner. The optimizer re-runs the full projection for every claim age and restores your plan afterward.',
            impactValue:dEstate,impactType:'estate',effort:'Easy',
            action:{type:'ss',uClaim:rec.uClaim,sClaim:rec.sClaim,married:r.married},applyLabel:'Apply claim age'+(r.married?'s':'')});
        }
      }
    }catch(e){console.warn('rec ss',e);}

    // 3 — Withdrawal-strategy switch (best ending estate among all strategies)
    try{
      if(RIQ.Withdrawal&&RIQ.Withdrawal.evaluateAll){
        const all=RIQ.Withdrawal.evaluateAll(); // restores state.withdrawalStrategy
        const curKey=state.withdrawalStrategy||'required';
        const cur=all.find(x=>x.key===curKey)||all[0];
        // Only consider strategies that don't materially cut spending — a bigger estate purely from
        // underspending is a trade-off, not an improvement. Require income within 3% of current.
        const incomeFloor=(cur.avgIncome||0)*0.97;
        const eligible=all.filter(x=>(x.avgIncome||0)>=incomeFloor);
        const best=eligible.reduce((a,b)=>(b.endEstate||0)>(a.endEstate||0)?b:a,eligible[0]||cur);
        const dEstate=(best.endEstate||0)-(cur.endEstate||0);
        if(best.key!==curKey&&dEstate>MIN_IMPACT){
          const name=((RIQ.Withdrawal.catalog||[]).find(c=>c.key===best.key)||{}).name||best.key;
          mk({category:'Withdrawal',title:'Switch withdrawal strategy to '+name,
            explanation:'Comparing all '+all.length+' withdrawal strategies through the deterministic model, "'+name+'" funds your spending need while leaving the largest ending estate for your inputs. Review its income smoothness before committing — some strategies trade a higher estate for more year-to-year spending variability.',
            impactValue:dEstate,impactType:'estate',effort:'Medium',
            action:{type:'withdrawalStrategy',key:best.key},applyLabel:'Switch strategy'});
        }
      }
    }catch(e){console.warn('rec wd',e);}

    // 4 — Max out 401(k) contributions (IRS limit + SECURE 2.0 catch-ups)
    try{
      if(!state.use401kMax&&accounts.some(a=>a.type==='401k')){
        const sim=runSimulation({use401kMax:true});
        const d=(sim.finalTotal||0)-baseEstate;
        if(d>MIN_IMPACT)mk({category:'Contributions',title:'Max out your 401(k) each year',
          explanation:'Contributing the full IRS 401(k) limit (with SECURE 2.0 catch-ups at 50+ and the enhanced 60\u201363 super catch-up) instead of your current '+state.deferralPct+'% deferral adds tax-advantaged compounding for the rest of your accumulation years.',
          impactValue:d,impactType:'estate',effort:'Medium',
          action:{type:'stateSet',patch:{use401kMax:true}},applyLabel:'Max 401(k)'});
      }
    }catch(e){console.warn('rec contrib',e);}

    // 5 — Work two more years (sequence-of-returns + longevity)
    try{
      if(+state.retireAge<68){
        const na=+state.retireAge+2;
        const sim=runSimulation({retireAge:na});
        const d=(sim.finalTotal||0)-baseEstate;
        if(d>MIN_IMPACT)mk({category:'Retirement Timing',title:'Work 2 more years — retire at '+na,
          explanation:'Two additional years of contributions plus two fewer years of withdrawals compound strongly and shorten the window most exposed to sequence-of-returns risk right at retirement.',
          impactValue:d,impactType:'estate',effort:'Hard',
          action:{type:'stateSet',patch:{retireAge:na}},applyLabel:'Retire at '+na});
      }
    }catch(e){console.warn('rec retire',e);}

    // 6 — Trim spending 10% (overspending vs sustainability)
    try{
      const cut=Math.round(state.lifestyleBase*0.9);
      const sim=runSimulation({lifestyleBase:cut});
      const d=(sim.finalTotal||0)-baseEstate;
      if(d>MIN_IMPACT)mk({category:'Spending',title:'Trim annual spending by 10% ('+fmt(Math.round(state.lifestyleBase*0.1))+'/yr)',
        explanation:'A lower withdrawal rate extends portfolio longevity and cushions against a bad early-retirement market sequence. Even a temporary reduction in the first retirement years has an outsized effect.',
        impactValue:d,impactType:'estate',effort:'Medium',
        action:{type:'stateSet',patch:{lifestyleBase:cut}},applyLabel:'Reduce spending 10%'});
    }catch(e){console.warn('rec spend',e);}

    // 7 — Modestly higher retirement return / equity glide (risk trade-off)
    try{
      if(+state.retireRate<10){
        const nr=Math.min(10,+state.retireRate+1);
        const sim=runSimulation({retireRate:nr});
        const d=(sim.finalTotal||0)-baseEstate;
        if(d>MIN_IMPACT)mk({category:'Allocation',title:'Hold more equity in retirement ('+state.retireRate+'% \u2192 '+nr+'%)',
          explanation:'A modestly higher expected retirement return reflects a heavier equity allocation. It improves the expected legacy but raises volatility — stress-test it with the Monte Carlo card and crash simulator before adopting.',
          impactValue:d,impactType:'estate',effort:'Medium',
          action:{type:'stateSet',patch:{retireRate:nr}},applyLabel:'Increase return 1%'});
      }
    }catch(e){console.warn('rec alloc',e);}

    // 8 — Sequence-of-returns / crash resilience (downside exposure, informational)
    try{
      if(typeof _runIsolatedModel==='function'){
        const crashAge=Math.max(curAge+1,+state.retireAge);
        const crashEstate=_runIsolatedModel({id:'_recSOR',label:'Stress',enabled:true,crashAge,drop:35,recoveryYears:3});
        const downside=baseEstate-crashEstate;
        if(downside>MIN_IMPACT)mk({category:'Risk',title:'Build sequence-of-returns resilience',
          explanation:'A 35% market drop at age '+crashAge+' (the most dangerous timing) would reduce your ending estate by roughly '+displayMoney(downside,lastYrs)+'. A cash/bond buffer, the Bucket or Guyton-Klinger withdrawal strategy, or a lower early-retirement draw all soften this. Model specific crashes in the Crash Simulator.',
          impactValue:downside,impactType:'risk',effort:'Medium',action:null,applyLabel:null});
      }
    }catch(e){console.warn('rec sor',e);}

    // 9 — Asset-location / tax diversification (informational when no Roth bucket exists)
    try{
      const hasRoth=accounts.some(a=>a.type==='roth');
      const hasPre=accounts.some(a=>['pretax','401k','traditional-ira'].includes(a.type));
      if(!hasRoth&&hasPre)mk({category:'Tax',title:'Diversify your tax buckets — add a Roth',
        explanation:'Your plan has pre-tax accounts but no Roth. A Roth bucket provides tax-free growth, has no RMDs, is the ideal legacy asset, and unlocks bracket-fill Roth-conversion opportunities. Add a Roth account in Configure to model it.',
        impactValue:0,impactType:'info',effort:'Easy',action:null,applyLabel:null});
    }catch(e){console.warn('rec assetloc',e);}

    // 10 — Legacy-target gap (summary)
    try{
      const target=+state.legacyTarget||0;
      const gap=target-baseEstate;
      if(gap>MIN_IMPACT)mk({category:'Legacy',title:'Close the '+fmtK(gap)+' legacy-target gap',
        explanation:'Your projected ending estate of '+displayMoney(baseEstate,lastYrs)+' falls '+fmtK(gap)+' short of your '+fmtK(target)+' legacy target. Stacking the higher-impact actions above (optimize conversions, adjust your claim age, work longer, or trim spending) closes the gap.',
        impactValue:gap,impactType:'gap',effort:'\u2014',action:null,applyLabel:null});
    }catch(e){console.warn('rec legacy',e);}

    recs.sort((a,b)=>b.impactValue-a.impactValue);

    // ── Plan health score (0–100) — cheap, from the already-built model + any MC results ──
    const sc=T.sustainabilityScore||0;
    const mc=(RIQ.Simulation&&RIQ.Simulation._lastResults)?RIQ.Simulation._lastResults.successProb:null;
    const ruin=meta.ruinRow;
    const target=+state.legacyTarget||0;
    const legacyRatio=target>0?Math.max(0,Math.min(1,baseEstate/target)):1;
    const scoreRaw=100*(0.35*sc+0.35*(mc!=null?mc:sc)+0.20*legacyRatio+0.10*(ruin?0:1));
    const score=Math.round(Math.max(0,Math.min(100,scoreRaw)));
    const grade=score>=85?'A':score>=75?'B':score>=60?'C':score>=45?'D':'F';
    const label=score>=85?'Excellent':score>=75?'Strong':score>=60?'Fair':score>=45?'At Risk':'Fragile';
    const health={score,grade,label,sustainability:sc,mcSuccess:mc,legacyRatio,depletes:!!ruin,depletionAge:ruin?ruin.age:null,baseEstate,lastYrs};

    _cache={recs,health,generatedAt:Date.now()};
    return _cache;
  }
  // Apply a recommendation's one-click action by id (reuses existing apply handlers). Returns the rec.
  function apply(id){
    if(!_cache)return null;
    const r=(_cache.recs||[]).find(x=>x.id===id);
    if(!r||!r.action)return null;
    const a=r.action;
    if(a.type==='roth'){applyRothConversions(a.ceiling);}
    else if(a.type==='ss'){
      state.ssClaimAge=a.uClaim;
      if(a.married&&state.spouseDob)state.spouseSSClaim=a.sClaim;
      if(RIQ.SocialSecurity){RIQ.SocialSecurity._cache=null;RIQ.SocialSecurity._mcRan=false;}
      saveState();_renderedTabs.delete('configure');recalcNow();
    } else if(a.type==='withdrawalStrategy'){
      state.withdrawalStrategy=a.key;saveState();_renderedTabs.delete('configure');recalcNow();
    } else if(a.type==='stateSet'){
      Object.assign(state,a.patch);saveState();_renderedTabs.delete('configure');recalcNow();
    }
    return r;
  }
  return{generate,invalidate,get,apply};
})();

/* ================================================================
   RIQ.Report — REPORTING / DASHBOARD (Feature 7)
   ----------------------------------------------------------------
   Assembles a polished, printable plan summary from already-computed outputs
   (model, optimizers, recommendations, Monte Carlo). Generation runs the
   optimizers (all of which restore state), so it never changes live results.
   Printing forces a light, high-contrast theme so dark-mode reports stay
   legible on paper / in PDF (see printReport()).
   ================================================================ */
RIQ.Report=(function(){
  'use strict';
  let _data=null; // cached generated report payload
  function invalidate(){_data=null;}
  function get(){return _data;}
  // Choose condensed milestone years for the year-by-year table.
  function milestoneRows(m){
    const rows=m.rows||[];if(!rows.length)return[];
    const out=[],seen=new Set();
    const add=(r)=>{if(r&&!seen.has(r.age)){seen.add(r.age);out.push(r);}};
    const retAge=+state.retireAge,ss=+state.ssClaimAge;
    add(rows[0]);
    rows.forEach(r=>{
      if(r.age===retAge||r.age===ss||r.age===73) add(r);       // retirement, SS claim, RMD start
      else if(r.age%5===0) add(r);                              // every 5 years
      else if(r.isCrashYear||r.isRuined) add(r);                // crash / depletion
    });
    add(rows[rows.length-1]);
    out.sort((a,b)=>a.age-b.age);
    return out;
  }
  function generate(){
    if(!_model||!_model.rows||!_model.rows.length)return null;
    const m=_model;
    const recPayload=(RIQ.Recommendations?RIQ.Recommendations.generate(true):{recs:[],health:null});
    let ss=null;
    try{if(RIQ.SocialSecurity&&RIQ.SocialSecurity.optimize&&(+state.ssMonthly||0)>0)ss=RIQ.SocialSecurity.optimize({objective:state.ssOptObjective||'pv'});}catch(e){}
    let wd=null;
    try{
      if(RIQ.Withdrawal&&RIQ.Withdrawal.evaluateAll){
        const all=RIQ.Withdrawal.evaluateAll();
        const curKey=state.withdrawalStrategy||'required';
        const best=all.reduce((a,b)=>(b.endEstate||0)>(a.endEstate||0)?b:a,all[0]);
        wd={all,curKey,best};
      }
    }catch(e){}
    const mc=(RIQ.Simulation&&RIQ.Simulation._lastResults)?RIQ.Simulation._lastResults:null;
    const meta=m.meta||{},T=m.totals||{},rows=m.rows;
    const lastYrs=rows.length?rows[rows.length-1].age-m.curAge:0;
    const summary={
      estate:meta.estateAtEnd||0,portfolioAtRetire:meta.portfolioAtRetire||0,
      lifetimeTax:(T.fedTaxSum||0)+(T.stateTaxSum||0)+(T.convTaxSum||0),
      curAge:m.curAge,lastYrs,accYrs:m.accYrs||0,
      retireAge:+state.retireAge,lifeExpectancy:+state.lifeExpectancy,legacyTarget:+state.legacyTarget||0,
    };
    _data={generatedAt:Date.now(),milestones:milestoneRows(m),rec:recPayload,ss,wd,mc,summary,baseEstate:Math.round(meta.estateAtEnd||0)};
    return _data;
  }
  return{generate,invalidate,get,milestoneRows};
})();

/* ================================================================
   RIQ.PathToConfidence — CONSTRAINED GOAL-SEEK OPTIMIZER ("Path to N% Confidence")
   ----------------------------------------------------------------
   Searches an ALLOWED set of levers for the smallest / most efficient combination
   that lifts the Monte Carlo success probability to a tunable target WHILE keeping
   the ending estate at or above a legacy floor expressed in TODAY'S dollars — under
   two hard constraints: (1) NEVER reduce the spending floor, and (2) only shift the
   retirement age within a tunable delay band (0..+5y, default +2).

   Legacy-floor convention: the "ending estate / legacy" measured for the floor test
   is the Monte Carlo MEDIAN ending estate (res.endStats.median, nominal at the plan
   horizon) DEFLATED to today's dollars by (1+inflationRate)^(lifeAge-curAge) — the
   same deflation displayMoney() uses in Today's-$ mode. The $1,000,000 target the
   user enters is therefore already in today's dollars and compared directly.

   Levers (none reduce spending):
     1. Social Security claim age  → delay both claimers to 70 (reuses the model's SS).
     2. Contribution increases with cadence → add $X/month to a taxable/Roth account
        (recommended in a chosen cadence; IRS caps still enforced by effectiveContrib).
     3. ETF selection / allocation profile → swap the equity-sleeve return/vol/fee to a
        representative ILLUSTRATIVE profile (fed into the MC via the mc* return/vol +
        expense-ratio fields). Clearly labeled illustrative, NOT investment advice.
     4. Roth conversions → reuse RIQ.Withdrawal.optimizeRothConversions (lower lifetime tax).
     5. Fee reduction → the low-fee ETF profile lever also cuts the weighted expense ratio.
     6. Glide-path / bond-tent → a sequence-of-returns mitigation around retirement.
     7. Retirement delay → within the tunable band only.

   Algorithm: a GREEDY / BEAM search (never full brute-force). Phase A screens each
   lever independently vs the baseline (reduced-trial MC) and ranks by marginal success
   gain; Phase B STACKS levers highest-impact-first, re-measuring cumulatively and (for
   the scalable retire-delay & contribution levers) taking the SMALLEST magnitude that
   makes progress; Phase C re-confirms the winning combination at a higher trial count.

   ISOLATION: every candidate is measured by deep-snapshotting {state, accounts},
   applying the candidate override, running RIQ.Simulation, then restoring the snapshot
   in the run's onComplete (and on cancel) — so live state/accounts are byte-for-byte
   unchanged until the user clicks Apply. The deterministic default estate ($531,000)
   is never touched (these levers only affect the mc-prefixed / allocation / claim /
   contribution inputs, and only inside the isolated runs).
   ================================================================ */
RIQ.PathToConfidence=(function(){
  'use strict';
  const SEARCH_TRIALS=600;    // reduced-trial count for the combinatorial search (responsive)
  const CONFIRM_TRIALS=2500;  // higher-trial confirmation run for baseline + the winning path
  const SEED=987654321;       // FIXED seed → candidate comparisons are apples-to-apples (no MC noise)
  const EPS=0.004;            // minimum success gain (0.4 pts) for a lever to be worth committing
  const CONTRIB_STEP=250;     // monthly contribution search increment ($/mo)
  const CONTRIB_MAXLVL=8;     // up to +$2,000/mo

  // ── Illustrative ETF / allocation-cost profiles (MODELING ASSUMPTIONS ONLY — NOT investment advice) ──
  // expReturn = long-run nominal expected total return (%), vol = annual stdev (%), er = expense ratio (%).
  const ETF_PROFILES=[
    {key:'broad',    ticker:'VTI / VOO', name:'Broad U.S. Market (low-fee)', assetClass:'Total U.S. Equity',    expReturn:9.7,  vol:15.5, er:0.03},
    {key:'growth',   ticker:'QQQM',      name:'Growth-Tilted (Nasdaq-100)',  assetClass:'Large-Cap Growth',     expReturn:11.3, vol:19.5, er:0.15},
    {key:'dividend', ticker:'SCHD',      name:'Dividend / Low-Volatility',   assetClass:'Dividend Value',       expReturn:8.6,  vol:12.5, er:0.06},
    {key:'balanced', ticker:'VT+BND',    name:'Balanced Growth (70/30)',     assetClass:'Blended Equity+Bond',  expReturn:8.2,  vol:11.0, er:0.04},
    {key:'bonds',    ticker:'BND',       name:'Aggregate Bonds',             assetClass:'Investment-Grade Bonds',expReturn:4.6,  vol:5.5,  er:0.03},
    {key:'cash',     ticker:'SGOV',      name:'Short-Term Treasuries',       assetClass:'T-Bills / Cash',       expReturn:3.9,  vol:1.3,  er:0.09},
  ];
  // Which profiles the optimizer is allowed to try (return-raising / risk-adjusting only).
  const ETF_SEARCH_KEYS=['broad','growth','dividend','balanced'];

  function num(v,d){v=+v;return isFinite(v)?v:d;}

  function contribTarget(){
    // Prefer an uncapped taxable/brokerage account (so increments fully model), then Roth, then any non-401k.
    return accounts.find(a=>a.type==='taxable')||accounts.find(a=>a.type==='roth')
      ||accounts.find(a=>a.type!=='401k')||accounts[0]||null;
  }

  function resolveInputs(){
    const curAge=computeAge(state.dob);
    const retAge=num(state.retireAge,65);
    const lifeAge=num(state.lifeExpectancy,90);
    const infl=num(state.inflationRate,3)/100;
    const yearsToEnd=Math.max(1,lifeAge-curAge);
    return {
      curAge,retAge,lifeAge,infl,yearsToEnd,
      target:Math.max(1,Math.min(99,num(state.p2cTargetConf,90)))/100,
      maxDelay:Math.max(0,Math.min(5,Math.round(num(state.p2cMaxDelay,2)))),
      floorToday:Math.max(0,num(state.p2cLegacyFloor,0)),
      hasSpouse:!!state.spouseDob,
      curClaim:num(state.ssClaimAge,67),
      curSpouseClaim:num(state.spouseSSClaim,67),
      accumYrs:Math.max(0,retAge-curAge),
      hasSS:(num(state.ssMonthly,0)>0)||(!!state.spouseDob&&num(state.spouseSSMonthly,0)>0),
      hasPre:accounts.some(a=>['pretax','401k','traditional-ira'].includes(a.type)),
      hasRoth:accounts.some(a=>a.type==='roth'),
      contribAcc:contribTarget(),
    };
  }

  function bondTentSchedule(retAge){
    const r=Math.max(7,Math.round(retAge));
    return [
      {fromAge:0,     toAge:r-6,  equityPct:90, bondPct:7,  cashPct:3 },
      {fromAge:r-5,   toAge:r+5,  equityPct:55, bondPct:35, cashPct:10}, // the "tent": de-risk around retirement
      {fromAge:r+6,   toAge:120,  equityPct:70, bondPct:25, cashPct:5 }, // rising-equity glide back up afterward
    ];
  }

  // Deflate a nominal horizon $ to today's $ (same basis as displayMoney Today's-$ mode).
  function toToday(nominal,inp){return nominal/Math.pow(1+inp.infl,inp.yearsToEnd);}

  function metricsFromRes(res,inp){
    const median=(res.endStats&&res.endStats.median)||0;
    const worst10=(res.endStats&&res.endStats.worst10)||0;
    return {successProb:res.successProb,medianNominal:median,worst10Nominal:worst10,
      legacyToday:toToday(median,inp),legacyWorst10Today:toToday(worst10,inp)};
  }

  // ── Snapshot / restore (deep) of the live globals — the isolate-and-restore contract ──
  function snap(){return {state:JSON.parse(JSON.stringify(state)),accounts:JSON.parse(JSON.stringify(accounts))};}
  function restore(s){
    Object.keys(state).forEach(k=>{if(!(k in s.state))delete state[k];});
    Object.assign(state,s.state);
    accounts.length=0;s.accounts.forEach(a=>accounts.push(a));
  }

  // Mutate live globals to reflect a plan fragment. Used by BOTH isolated eval (restored after)
  // and the real Apply handlers (followed by saveState/recalcNow).
  function applyPlan(plan,inp){
    if(plan.retireDelay>0)state.retireAge=inp.retAge+plan.retireDelay; // set first: bond-tent + contrib stop key off it
    if(plan.ss){state.ssClaimAge=70;if(inp.hasSpouse)state.spouseSSClaim=70;}
    if(plan.roth!=null)state.rothConvCeilingBracket=plan.roth;
    if(plan.etf){
      const p=ETF_PROFILES.find(x=>x.key===plan.etf);
      if(p){
        const net=p.expReturn-p.er;
        state.mcAccumReturn=+net.toFixed(2);
        state.mcRetireReturn=+(net-0.5).toFixed(2); // preserve the accum→retire return step-down
        state.mcAccumVol=p.vol;
        state.mcRetireVol=+(p.vol*0.8).toFixed(1);  // preserve the ~0.8 retire/accum vol ratio
        state.feeExpenseRatio=p.er;
        state.p2cEtfProfile=p.key;
      }
    }
    if(plan.glide)state.glideSchedule=bondTentSchedule(state.retireAge),state.glidePath='manual';
    if(plan.contribMonthly>0&&inp.contribAcc){
      const acc=accounts.find(a=>a.id===inp.contribAcc.id);
      if(acc){
        acc.contributions=Array.isArray(acc.contributions)?acc.contributions.slice():[];
        acc.contributions.push({id:'c_p2c_'+acc.id+'_'+Math.round(plan.contribMonthly),amount:plan.contribMonthly,
          frequency:'monthly',startDate:todayISO(),stopDate:retireDateISO(),stopAtRetirement:true,label:'Path to Confidence boost'});
      }
    }
  }

  let _running=false,_cancelled=false,_activeCtrl=null,_lastResult=null;

  // Isolated evaluation of a plan → metrics via cb (async; restores snapshot in onComplete/cancel).
  function evalPlan(plan,inp,trials,cb){
    const s=snap();
    try{applyPlan(plan,inp);}
    catch(e){restore(s);cb(null);return;}
    _activeCtrl=RIQ.Simulation.run({trialsOverride:trials,seed:SEED,onComplete:function(res){
      restore(s);_activeCtrl=null;
      let m=null;try{m=metricsFromRes(res,inp);}catch(e){m=null;}
      cb(m);
    }});
    // If cancelled before completion, RIQ.Simulation won't fire onComplete → restore here defensively.
    const guardCtrl=_activeCtrl;
    _activeCtrl={cancel:function(){restore(s);if(guardCtrl)guardCtrl.cancel();}};
  }

  function clonePlan(p){return Object.assign({ss:false,roth:null,etf:null,glide:false,retireDelay:0,contribMonthly:0},p);}

  // Build the lever catalog for the current inputs.
  function buildLevers(inp){
    const L=[];
    if(inp.hasSS&&inp.curClaim<70)
      L.push({key:'ss',etf:false,scale:false,
        label:'Delay Social Security to 70'+(inp.hasSpouse?' (both of you)':''),
        set:(p)=>{p.ss=true;},change:{ss:true},
        stepLabel:'Delay Social Security to age 70'+(inp.hasSpouse?' for both of you':'')});

    if(inp.hasPre&&inp.hasRoth){
      try{
        const opt=RIQ.Withdrawal&&RIQ.Withdrawal.optimizeRothConversions?RIQ.Withdrawal.optimizeRothConversions():null;
        if(opt&&opt.best&&opt.best.key!=='none'&&(opt.best.savedVsNone||0)>0){
          inp._roth={ceiling:opt.best.ceiling,label:opt.best.label,saved:opt.best.savedVsNone,converted:opt.best.totalConverted};
          L.push({key:'roth',etf:false,scale:false,
            label:'Optimize Roth conversions — '+opt.best.label,
            set:(p)=>{p.roth=inp._roth.ceiling;},change:{roth:opt.best.ceiling},
            stepLabel:'Convert to Roth on a '+opt.best.label.toLowerCase()+' schedule (~'+fmtK(opt.best.totalConverted||0)+' total)'});
        }
      }catch(e){}
    }

    L.push({key:'glide',etf:false,scale:false,
      label:'Add a bond-tent glide path around retirement',
      set:(p)=>{p.glide=true;},change:{glide:true},
      stepLabel:'Add a bond-tent glide path (de-risk around retirement, then rising equity)'});

    ETF_SEARCH_KEYS.forEach(k=>{
      const pr=ETF_PROFILES.find(x=>x.key===k);
      L.push({key:'etf:'+k,etf:true,scale:false,
        label:'Shift equity sleeve to '+pr.name+' ('+pr.ticker+')',
        set:(p)=>{p.etf=k;},change:{etf:k},
        stepLabel:'Shift the equity sleeve to the '+pr.name+' profile ['+pr.ticker+']'});
    });

    if(inp.maxDelay>0)
      L.push({key:'retire',etf:false,scale:true,maxLevel:inp.maxDelay,
        label:'Delay retirement (within your +'+inp.maxDelay+'y band)',
        applyLvl:(p,lvl)=>{p.retireDelay=lvl;},
        changeLvl:(lvl)=>({retireDelay:lvl}),
        stepLabelLvl:(lvl)=>'Delay retirement '+lvl+' year'+(lvl>1?'s':'')+' → retire at '+(inp.retAge+lvl)});

    if(inp.accumYrs>0&&inp.contribAcc)
      L.push({key:'contrib',etf:false,scale:true,maxLevel:CONTRIB_MAXLVL,
        label:'Increase contributions to '+inp.contribAcc.name,
        applyLvl:(p,lvl)=>{p.contribMonthly=lvl*CONTRIB_STEP;},
        changeLvl:(lvl)=>({contribMonthly:lvl*CONTRIB_STEP}),
        stepLabelLvl:(lvl)=>'Add '+fmt(lvl*CONTRIB_STEP)+'/month to '+inp.contribAcc.name+' ('+cadenceEquivalents(lvl*CONTRIB_STEP)+')'});

    return L;
  }

  // Human cadence equivalents for a monthly amount.
  function cadenceEquivalents(monthly){
    const wk=monthly*12/52, day=monthly*12/252;
    return '≈ '+fmt(Math.round(wk))+'/week or '+fmt(Math.round(day))+'/trading-day';
  }

  // Accept a candidate over the current metrics: meaningful success gain AND legacy not sunk below the floor.
  function accepts(cur,cand,inp){
    if(!cand)return false;
    const gain=cand.successProb-cur.successProb;
    const legacyOK=cand.legacyToday>=inp.floorToday||cand.legacyToday>=cur.legacyToday-1;
    return gain>EPS&&legacyOK;
  }

  // ── Main optimizer (async, chained). opts.onProgress(pct,msg); opts.onComplete(result). ──
  function optimize(opts){
    opts=opts||{};
    if(_running){return {cancel:function(){}};}
    _running=true;_cancelled=false;
    const inp=resolveInputs();
    inp.contribAcc=inp.contribAcc;
    const levers=buildLevers(inp);
    let evalsDone=0;
    const softTotal=levers.length*2+4; // rough estimate for the progress bar
    const prog=(msg)=>{if(opts.onProgress)opts.onProgress(Math.min(0.98,evalsDone/softTotal),msg);};

    const finishAll=(result)=>{
      _running=false;_activeCtrl=null;_lastResult=result;
      if(opts.onProgress)opts.onProgress(1,'Done');
      if(!_cancelled&&opts.onComplete)opts.onComplete(result);
    };

    // Phase A — baseline at confirmation trials.
    prog('Measuring your baseline…');
    evalPlan(clonePlan({}),inp,CONFIRM_TRIALS,function(baseM){
      evalsDone++;
      if(_cancelled||!baseM){finishAll(_errResult(inp));return;}

      // Phase A2 — screen each lever independently vs baseline.
      const screened=[];
      let li=0;
      function screenNext(){
        if(_cancelled){finishAll(_errResult(inp));return;}
        if(li>=levers.length){rankAndStack();return;}
        const lev=levers[li++];
        const p=clonePlan({});
        if(lev.scale)lev.applyLvl(p,lev.maxLevel);else lev.set(p);
        prog('Screening: '+lev.label);
        evalPlan(p,inp,SEARCH_TRIALS,function(m){
          evalsDone++;
          if(m)screened.push({lev,gain:m.successProb-baseM.successProb,metrics:m});
          screenNext();
        });
      }

      // Phase B — rank by marginal gain, then stack highest-impact first (greedy/beam).
      function rankAndStack(){
        screened.sort((a,b)=>b.gain-a.gain);
        const ranked=screened.map(s=>s.lev);
        const committed=clonePlan({});
        let curM=baseM;
        let etfLocked=false;
        const steps=[];
        let ri=0;

        function stackNext(){
          if(_cancelled){confirm(committed,curM,steps,ranked);return;}
          if(curM.successProb>=inp.target&&curM.legacyToday>=inp.floorToday){confirm(committed,curM,steps,ranked);return;}
          if(ri>=ranked.length){confirm(committed,curM,steps,ranked);return;}
          const lev=ranked[ri++];
          if(lev.etf&&etfLocked){stackNext();return;} // only one ETF/return profile may be committed
          // Skip levers that screened with no positive marginal gain (rank already handles order).
          const scr=screened.find(s=>s.lev===lev);
          if(scr&&scr.gain<=EPS/2){stackNext();return;}

          if(!lev.scale){
            const cand=clonePlan(committed);lev.set(cand);
            prog('Testing: '+lev.label);
            evalPlan(cand,inp,SEARCH_TRIALS,function(m){
              evalsDone++;
              if(accepts(curM,m,inp)){
                steps.push({label:lev.stepLabel,key:lev.key,change:lev.change,
                  successBefore:curM.successProb,successAfter:m.successProb,
                  legacyBeforeToday:curM.legacyToday,legacyAfterToday:m.legacyToday});
                Object.assign(committed,lev.change);
                curM=m;if(lev.etf)etfLocked=true;
              }
              stackNext();
            });
          } else {
            // Scalable lever: ascending search for the SMALLEST magnitude that makes progress
            // (stops at target, or when marginal gain flattens, or at maxLevel).
            let lvl=0,bestLvl=0,bestM=curM,prevM=curM;
            function scaleNext(){
              if(_cancelled){commitScale();return;}
              if(lvl>=lev.maxLevel){commitScale();return;}
              lvl++;
              const cand=clonePlan(committed);lev.applyLvl(cand,lvl);
              prog('Testing: '+lev.label+' (lvl '+lvl+')');
              evalPlan(cand,inp,SEARCH_TRIALS,function(m){
                evalsDone++;
                if(m){
                  const legacyOK=m.legacyToday>=inp.floorToday||m.legacyToday>=curM.legacyToday-1;
                  if(m.successProb>bestM.successProb+1e-9&&legacyOK){bestM=m;bestLvl=lvl;}
                  const marg=m.successProb-prevM.successProb;prevM=m;
                  // Stop early once target reached, or gains flatten.
                  if(m.successProb>=inp.target){commitScale();return;}
                  if(lvl>=2&&marg<EPS/2){commitScale();return;}
                }
                scaleNext();
              });
            }
            function commitScale(){
              if(bestLvl>0&&accepts(curM,bestM,inp)){
                steps.push({label:lev.stepLabelLvl(bestLvl),key:lev.key,change:lev.changeLvl(bestLvl),
                  successBefore:curM.successProb,successAfter:bestM.successProb,
                  legacyBeforeToday:curM.legacyToday,legacyAfterToday:bestM.legacyToday,
                  maxedOut:bestLvl>=lev.maxLevel});
                Object.assign(committed,lev.changeLvl(bestLvl));
                curM=bestM;
              }
              stackNext();
            }
            scaleNext();
          }
        }

        // Phase C — confirm the winning combination at higher trials.
        function confirm(plan,workingM,steps,ranked){
          if(_cancelled){finishAll(_buildResult(inp,baseM,steps,plan,workingM,levers));return;}
          const hasAny=steps.length>0;
          if(!hasAny){finishAll(_buildResult(inp,baseM,[],plan,baseM,levers));return;}
          prog('Confirming the recommended path…');
          evalPlan(clonePlan(plan),inp,CONFIRM_TRIALS,function(m){
            evalsDone++;
            finishAll(_buildResult(inp,baseM,steps,plan,m||workingM,levers));
          });
        }

        stackNext();
      }

      screenNext();
    });

    return {cancel:function(){_cancelled=true;if(_activeCtrl)_activeCtrl.cancel();_running=false;}};
  }

  function _errResult(inp){
    return {error:true,inp,baseline:null,steps:[],finalPlan:clonePlan({}),final:null,
      target:inp.target,floorToday:inp.floorToday,maxDelay:inp.maxDelay,
      reached:false,legacyOk:false,shortfall:'Could not complete the search.',etfLibrary:ETF_PROFILES,generatedAt:Date.now()};
  }

  function _buildResult(inp,baseM,steps,finalPlan,finalM,levers){
    const reached=finalM.successProb>=inp.target-1e-9;
    const legacyOk=finalM.legacyToday>=inp.floorToday-1;
    let shortfall=null;
    if(!reached||!legacyOk){
      const gapPts=Math.round((inp.target-finalM.successProb)*1000)/10;
      const retMaxed=steps.some(s=>s.key==='retire'&&s.maxedOut)||(inp.maxDelay===0);
      const contribMaxed=steps.some(s=>s.key==='contrib'&&s.maxedOut);
      let relax;
      if(!reached&&inp.maxDelay<5&&(retMaxed||inp.maxDelay===0))
        relax='raise the retirement-delay band above +'+inp.maxDelay+' year'+(inp.maxDelay===1?'':'s')+' (you are at the band limit)';
      else if(!reached&&contribMaxed)
        relax='add more than '+fmt(CONTRIB_MAXLVL*CONTRIB_STEP)+'/month of new contributions';
      else if(!reached)
        relax='allow a modest, temporary spending reduction in the early retirement years';
      else
        relax='delay Social Security further or add contributions to rebuild the legacy';
      const parts=[];
      if(!reached)parts.push('Within your +'+inp.maxDelay+'y retirement-delay band and the no-spending-cut rule, the closest reachable confidence is '+Math.round(finalM.successProb*100)+'% (target '+Math.round(inp.target*100)+'%, about '+Math.abs(gapPts)+' pts short).');
      if(!legacyOk)parts.push('The projected today\u2019s-$ legacy of '+fmtK(finalM.legacyToday)+' is below your '+fmtK(inp.floorToday)+' floor.');
      parts.push('To close the gap you could '+relax+'.');
      shortfall=parts.join(' ');
    }
    return {error:false,inp,baseline:baseM,steps,finalPlan,final:finalM,
      target:inp.target,floorToday:inp.floorToday,maxDelay:inp.maxDelay,
      reached,legacyOk,shortfall,etfLibrary:ETF_PROFILES,contribAccName:inp.contribAcc?inp.contribAcc.name:null,
      generatedAt:Date.now()};
  }

  // ── Apply handlers (real mutations → saveState + recalcNow). Reuse existing handlers where possible. ──
  function _applyChangeToLive(change,inp){
    // Reuse the dedicated Roth handler's field; write the rest directly (mirrors applyPlan, live).
    applyPlan(clonePlan(change),inp);
    if(change.ss&&window.RIQ&&RIQ.SocialSecurity){RIQ.SocialSecurity._cache=null;RIQ.SocialSecurity._mcRan=false;}
  }
  function applyStep(idx){
    const r=_lastResult;if(!r||!r.steps||!r.steps[idx])return false;
    const inp=resolveInputs();
    _applyChangeToLive(r.steps[idx].change,inp);
    saveState();_renderedTabs.delete('configure');
    if(window.RIQ&&RIQ.Recommendations)RIQ.Recommendations.invalidate();
    recalcNow();
    return true;
  }
  function applyAll(){
    const r=_lastResult;if(!r||!r.steps||!r.steps.length)return false;
    const inp=resolveInputs();
    r.steps.forEach(s=>_applyChangeToLive(s.change,inp));
    saveState();_renderedTabs.delete('configure');
    if(window.RIQ&&RIQ.Recommendations)RIQ.Recommendations.invalidate();
    recalcNow();
    return true;
  }

  function getLast(){return _lastResult;}
  function invalidate(){_lastResult=null;}
  function isRunning(){return _running;}

  return {optimize,applyStep,applyAll,getLast,invalidate,isRunning,resolveInputs,
    ETF_PROFILES,ETF_SEARCH_KEYS,_toToday:toToday,SEARCH_TRIALS,CONFIRM_TRIALS};
})();

/* ================================================================
   RIQ.Healthcare — HEALTHCARE & IRMAA ENGINE (Phase 11)
   ----------------------------------------------------------------
   Models healthcare costs from early retirement through end-of-plan:

   • Pre-Medicare (age < 65): ACA marketplace silver-plan premiums or a
     custom monthly-premium override, plus estimated out-of-pocket costs
     (deductibles, copays, Rx). Both grow at the user-configurable
     healthcare inflation rate (default 5%/yr, ahead of CPI).

   • Medicare (age ≥ 65): Part B + Part D base premiums projected from
     2026 values at the same growth rate. IRMAA surcharges are applied
     on top using 2026 MFJ / Single thresholds indexed forward by CPI.
     MAGI for IRMAA uses a 2-year-lookback approximation from the prior
     model year's pre-tax draws + 85 % Social Security inclusion.

   • MFJ: both partners are costed (×2 on all per-person figures).
     Single / HOH / MFS: one person; IRMAA thresholds are halved.

   Isolation: healthcareEnabled = false by default → zero cost added →
   the deterministic default estate ($531,000) is unchanged.

   All $ figures are nominal (projected forward); callers must use
   displayMoney() to render in Today's-$ mode.
   ================================================================ */
RIQ.Healthcare=(function(){
  'use strict';

  // ── 2026 IRMAA Tiers (CMS-indexed; single = 50 % of MFJ MAGI threshold) ──
  // Per-person annual IRMAA surcharge combining Part B + Part D adjustments.
  // Source: CMS 2025 (2026 projected). Tiers grow with CPI forward.
  const IRMAA_TIERS=[
    {magiMFJ:212000, perPersonAnnual:0    }, // standard — no surcharge
    {magiMFJ:266000, perPersonAnnual:1052 }, // $74/mo Part B + $13.70/mo Part D × 12
    {magiMFJ:334000, perPersonAnnual:2641 }, // $185/mo + $35.30/mo × 12
    {magiMFJ:400000, perPersonAnnual:4236 }, // $296/mo + $57.00/mo × 12
    {magiMFJ:750000, perPersonAnnual:5826 }, // $407/mo + $78.60/mo × 12
    {magiMFJ:Infinity,perPersonAnnual:6358}, // $444/mo + $85.80/mo × 12
  ];

  // 2026 Medicare base monthly premiums (per person)
  const MEDICARE_B_MONTHLY=185.50;  // Part B standard 2026 (CMS official)
  const MEDICARE_D_MONTHLY=57.00;   // Part D national average 2026 (estimate)

  /**
   * Compute annual healthcare cost for one retirement model year.
   *
   * @param {number} age           Person's age this projection year
   * @param {number} retireAge     Configured retirement age
   * @param {number} magi          Estimated MAGI (pre-tax draw + 85 % SS) for IRMAA lookback
   * @param {string} filingStatus  'mfj'|'single'|'mfs'|'hoh'
   * @param {number} yearsFromToday Years elapsed from today (for premium growth)
   * @param {number} inflRate      CPI inflation rate (for IRMAA threshold indexing)
   * @returns {number} Total annual healthcare cost in nominal dollars
   */
  function annualCost(age, retireAge, magi, filingStatus, yearsFromToday, inflRate){
    if(!state.healthcareEnabled)return 0;
    const hcGr=(+state.healthcarePremiumGrowth||5)/100;
    const cpiGr=(+inflRate||3)/100;
    const isMFJ=(filingStatus==='mfj');
    const persons=isMFJ?2:1;
    const growFactor=Math.pow(1+hcGr,yearsFromToday);

    if(age<65){
      // ── Pre-Medicare: ACA or custom premium ──
      const mode=state.healthcareMode||'aca';
      const baseMonthly=mode==='custom'
        ?(+state.healthcareCustomMonthly||800)
        :(+state.healthcareACAMonthly||800);
      const annualPremium=Math.round(baseMonthly*persons*12*growFactor);
      const oopToday=+state.healthcareOOPAnnual||4000;
      const annualOOP=Math.round(oopToday*persons*growFactor);
      return annualPremium+annualOOP;
    }

    // ── Medicare (65+): Part B + Part D base + IRMAA ──
    if(!state.healthcareIncludeMedicare)return 0;
    const basePremiumAnnual=Math.round((MEDICARE_B_MONTHLY+MEDICARE_D_MONTHLY)*12*persons*growFactor);

    let irmaaAnnual=0;
    if(state.healthcareIncludeIRMAA&&magi>0){
      // IRMAA thresholds are CPI-indexed; scale from 2026 base
      const threshScale=Math.pow(1+cpiGr,yearsFromToday);
      const magiScale=isMFJ?1:0.5; // single/HOH/MFS use 50% of MFJ thresholds
      let surchargePerPerson=0;
      for(const tier of IRMAA_TIERS){
        if(magi<=tier.magiMFJ*threshScale*magiScale){
          surchargePerPerson=tier.perPersonAnnual;
          break;
        }
      }
      // Surcharges themselves grow with healthcare inflation from 2026 base
      irmaaAnnual=Math.round(surchargePerPerson*growFactor*persons);
    }

    // Out-of-pocket: Medicare still has deductibles, copays, dental, vision
    const oopToday=+state.healthcareOOPAnnual||4000;
    const annualOOP=Math.round(oopToday*persons*growFactor);
    return basePremiumAnnual+irmaaAnnual+annualOOP;
  }

  /**
   * Summarize healthcare costs from a completed model run.
   * @param {object} m  Result from buildModel()
   * @returns {{total, preMedicareSum, medicareSum, avgAnnual, years}}
   */
  function summarize(m){
    const retRows=(m&&m.rows||[]).filter(r=>r.phase==='Retirement');
    const preMedRows=retRows.filter(r=>r.age<65);
    const medRows=retRows.filter(r=>r.age>=65);
    const total=Math.round(retRows.reduce((s,r)=>s+(r.healthcareCost||0),0));
    const preMedicareSum=Math.round(preMedRows.reduce((s,r)=>s+(r.healthcareCost||0),0));
    const medicareSum=Math.round(medRows.reduce((s,r)=>s+(r.healthcareCost||0),0));
    const avgAnnual=retRows.length?Math.round(total/retRows.length):0;
    return{total,preMedicareSum,medicareSum,avgAnnual,
      years:retRows.length,preMedicareYears:preMedRows.length,medicareYears:medRows.length};
  }

  return{annualCost,summarize,IRMAA_TIERS,MEDICARE_B_MONTHLY,MEDICARE_D_MONTHLY};
})();

/* ================================================================
   RECALCULATE
   ================================================================ */
function _showModelError(err){
  console.error('Model build failed:',err);
  ['page-overview','page-projections','page-montecarlo','page-analytics','page-cashflow','page-actual','page-scenarios','page-report'].forEach(id=>{
    const pg=document.getElementById(id);
    if(pg&&pg.classList.contains('active'))
      pg.innerHTML=`<div style="padding:40px 48px"><div style="background:var(--danger-bg);border:1px solid rgba(239,68,68,.35);border-radius:10px;padding:20px 24px;color:var(--danger)"><strong style="font-size:15px">⚠ Calculation Error</strong><p style="margin-top:8px;font-size:13px;color:var(--text)">Something went wrong while computing the model. Please check your inputs.<br><code style="font-size:11px;color:var(--text-muted)">${escHtml(String(err&&err.message||err))}</code></p></div></div>`;
  });
}

function _rebuildModels(){
  try{
    _model=buildModel();
    // Build crash-free baseline only when master is on AND at least one scenario enabled
    const hasCrashes=state.crashMasterEnabled&&(state.crashes||[]).some(c=>c.enabled);
    _baselineModel=hasCrashes?buildModel(true):null;
  }catch(err){
    _model=null;_baselineModel=null;
    _showModelError(err);
  }
}
const recalculate=debounce(function(){
  _rebuildModels();
  if(activeTab==='overview')renderOverview();
  else if(activeTab==='configure')updateConfigPreviews();
  else if(activeTab==='projections')renderProjections();
  else if(activeTab==='montecarlo')renderMonteCarlo();
  else if(activeTab==='analytics'){const f=document.activeElement;if(!(f&&f.tagName==='INPUT'))renderAnalytics();}
  else if(activeTab==='cashflow')renderCashFlow();
  else if(activeTab==='actual')renderActual();
  else if(activeTab==='scenarios')renderScenarios();
  else if(activeTab==='report')renderReport();
  _renderedTabs.add(activeTab);
  _dirtyTabs=new Set(['overview','configure','projections','montecarlo','analytics','cashflow','actual','scenarios','report'].filter(t=>t!==activeTab));
  updateHdrDisplay();
  saveState();
},150);

function recalcNow(){
  _dirtyTabs=new Set(['overview','projections','montecarlo','analytics','cashflow','actual','scenarios','report']);
  // Clear rendered state so switchTab() always re-renders these tabs after a model change,
  // even if the tab was previously rendered and _dirtyTabs was cleaned up by recalculate().
  _renderedTabs.delete('overview');
  _renderedTabs.delete('projections');
  _renderedTabs.delete('montecarlo');
  _renderedTabs.delete('analytics');
  _renderedTabs.delete('cashflow');
  _renderedTabs.delete('actual');
  _renderedTabs.delete('scenarios');
  _renderedTabs.delete('report');
  // Recommendations depend on the live plan; invalidate the cache so stale advice isn't shown.
  if(window.RIQ&&RIQ.Recommendations&&RIQ.Recommendations.invalidate)RIQ.Recommendations.invalidate();
  // Path-to-Confidence results are tied to the live plan too — clear so we never show a stale path.
  if(window.RIQ&&RIQ.PathToConfidence&&RIQ.PathToConfidence.invalidate)RIQ.PathToConfidence.invalidate();
  _rebuildModels();
  // Focus guard: if an input is currently focused on the configure tab, skip renderConfigure()
  // to avoid destroying the active element mid-keystroke (which wipes multi-digit input).
  // updateConfigPreviews() still runs to refresh output labels without touching inputs.
  const _focused=document.activeElement;
  const _inputFocusedOnConfigure=activeTab==='configure'&&_focused&&_focused.tagName==='INPUT';
  // Analytics has editable assumption inputs (fee / risk-free) — same focus guard as Configure
  // so a re-render never wipes the field mid-keystroke. Values refresh on focusout.
  const _inputFocusedOnAnalytics=activeTab==='analytics'&&_focused&&_focused.tagName==='INPUT';
  // Always re-render the active tab immediately
  if(activeTab==='overview')renderOverview();
  else if(activeTab==='configure'){if(!_inputFocusedOnConfigure)renderConfigure();updateConfigPreviews();}
  else if(activeTab==='projections')renderProjections();
  else if(activeTab==='montecarlo')renderMonteCarlo();
  else if(activeTab==='analytics'){if(!_inputFocusedOnAnalytics)renderAnalytics();}
  else if(activeTab==='cashflow')renderCashFlow();
  else if(activeTab==='actual')renderActual();
  else if(activeTab==='scenarios')renderScenarios();
  else if(activeTab==='report')renderReport();
  // Mark the active tab as rendered so switchTab won't re-render it redundantly
  _renderedTabs.add(activeTab);
  updateHdrDisplay();
  saveState();
}

// Update only the crash impact metrics in-place — does NOT touch the crash input rows.
function updateCrashImpactZone(){
  const zone=document.getElementById('crash-impact-zone');
  if(zone) zone.innerHTML=(_model&&_baselineModel)?renderCrashImpact():'';
}

// Debounced recalc for crash numeric fields (Age/Drop/RecoveryYears).
// Rebuilds models and refreshes the impact zone + chart without re-rendering
// the crash scenario inputs, so the focused input is never destroyed mid-type.
const recalcCrashField=debounce(function(){
  _rebuildModels();
  updateCrashImpactZone();
  updateHdrDisplay();
  const c=document.getElementById('main-chart-container');
  if(c&&_model) requestAnimationFrame(()=>renderChart(c,_model,_baselineModel));
  _dirtyTabs=new Set(['overview','configure','projections','montecarlo','analytics','cashflow','actual','scenarios','report'].filter(t=>t!==activeTab));
  saveState();
},200);

function updateHdrDisplay(){
  const el=document.getElementById('hdr-age-display');
  if(el&&state.dob){const a=computeAge(state.dob);el.textContent=`Age ${a} · ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;}
  const banner=document.getElementById('crash-banner');
  if(banner){
    const active=state.crashMasterEnabled?(state.crashes||[]).filter(c=>c.enabled):[];
    if(active.length){
      const first=active[0];
      const more=active.length>1?` +${active.length-1} more`:'';
      banner.textContent=`⚠ Crash: ${first.label} (Age ${first.crashAge}, -${first.drop}%)${more}`;
      banner.style.display='';
    } else {
      banner.style.display='none';
    }
  }
